<html lang="zh-CN">

<meta charset="UTF-8">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#222230;
--bdr:#2a2a3a;--bdr2:#3a3a50;
--tx:#eee;--tx2:#aaa;--tx3:#666;
--ac:#00e89d;--ac2:rgba(0,232,157,.12);--ac3:rgba(0,232,157,.3);
--r:12px;--r2:8px;
--font:-apple-system,BlinkMacSystemFont,'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
--mono:'SF Mono','JetBrains Mono',Consolas,monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.7}
a{color:var(--ac);text-decoration:none}
a:hover{text-decoration:underline}

/* Progress */
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--ac),#7c6aef);z-index:1001;width:0;transition:width .1s}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,3vw,2rem);background:rgba(10,10,15,.5);backdrop-filter:blur(0);transition:all .3s;border-bottom:1px solid transparent}
.nav.scrolled{backdrop-filter:blur(20px);border-bottom-color:var(--bdr)}
.nav-logo{font-size:1rem;font-weight:700;color:var(--tx);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.nav-r{display:flex;gap:1rem;align-items:center}
.nav-r button{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--tx2)}
.nav-r button:hover{color:var(--tx)}

/* Layout */
.layout{display:flex;max-width:1200px;margin:0 auto;padding:calc(52px + 2rem) clamp(1rem,3vw,2rem) 3rem;gap:2rem}
.main{flex:7;min-width:0}
.side{flex:3;min-width:260px;max-width:320px}

/* Sidebar */
.side-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;position:sticky;top:calc(52px + 1.5rem)}
.side-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#7c6aef);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto .8rem;box-shadow:0 0 30px var(--ac3)}
.side-name{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.side-bio{font-size:.82rem;color:var(--tx2);text-align:center;line-height:1.6;margin-bottom:1rem}
.side-stats{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.side-stat{background:var(--bg3);border-radius:var(--r2);padding:.6rem;text-align:center}
.side-stat-num{font-size:1.1rem;font-weight:700;color:var(--ac)}
.side-stat-lbl{font-size:.7rem;color:var(--tx3)}
.side-links{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.side-link{padding:.35rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr);transition:all .2s}
.side-link:hover{border-color:var(--ac);color:var(--ac);text-decoration:none}
.side-section{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.side-section h4{font-size:.8rem;color:var(--tx3);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.08em}
.tag-btn{padding:.3rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tag-btn:hover,.tag-btn.active{background:var(--ac2);border-color:var(--ac);color:var(--ac)}

/* Search */
.search-wrap{display:none;margin-bottom:1rem}
.search-wrap.active{display:block}
.search-input{width:100%;padding:.65rem 1rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.88rem;font-family:var(--font);outline:none}
.search-input:focus{border-color:var(--ac)}
.search-input::placeholder{color:var(--tx3)}

/* Article Cards */
.articles{display:flex;flex-direction:column;gap:.8rem}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.1rem 1.3rem;cursor:pointer;transition:all .25s;opacity:0;transform:translateY(16px)}
.card.visible{opacity:1;transform:translateY(0)}
.card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.card-title{font-size:1rem;font-weight:600;flex:1}
.card-date{font-size:.72rem;color:var(--tx3);white-space:nowrap}
.card-summary{font-size:.85rem;color:var(--tx2);line-height:1.6;margin-bottom:.5rem}
.card-bottom{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.card-tag{font-size:.68rem;padding:.15rem .5rem;border-radius:999px;background:var(--ac2);color:var(--ac)}
.card-comments{font-size:.72rem;color:var(--tx3);margin-left:auto}

/* Detail */
.detail{display:none}
.detail.active{display:block}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--tx2);margin-bottom:1rem;cursor:pointer}
.back-btn:hover{color:var(--ac)}
.d-meta{margin-bottom:1.5rem}
.d-meta h1{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;margin-bottom:.4rem}
.d-meta .d-info{font-size:.8rem;color:var(--tx3);display:flex;gap:1rem;flex-wrap:wrap}
.d-content{font-size:.95rem;line-height:1.85;color:var(--tx)}
.d-content h2{font-size:1.3rem;font-weight:700;margin:1.8rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--bdr)}
.d-content h3{font-size:1.1rem;font-weight:600;margin:1.3rem 0 .5rem}
.d-content p{margin-bottom:.8rem}
.d-content pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:.8rem 1rem;overflow-x:auto;margin:1rem 0;position:relative}
.d-content code{font-family:var(--mono);font-size:.82rem}
.d-content :not(pre)>code{background:var(--bg3);padding:.12rem .35rem;border-radius:4px}
.d-content blockquote{border-left:3px solid var(--ac);padding:.6rem 1rem;margin:.8rem 0;background:var(--ac2);border-radius:0 var(--r2) var(--r2) 0;color:var(--tx2)}
.d-content img{max-width:100%;border-radius:var(--r2);cursor:zoom-in}
.d-content ul,.d-content ol{padding-left:1.3rem;margin-bottom:.8rem}
.d-content li{margin-bottom:.2rem}
.copy-btn{position:absolute;top:.4rem;right:.4rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:.2rem .5rem;font-size:.7rem;color:var(--tx2);cursor:pointer;font-family:var(--font)}
.copy-btn:hover{border-color:var(--ac);color:var(--ac)}

/* Music Player */
.music-player{background:var(--bg2);border:1px solid var(--ac3);border-radius:var(--r);padding:.8rem 1rem;margin:1rem 0;transition:border-color .2s}
.music-player:hover{border-color:var(--ac)}
.player-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.player-title{font-size:.9rem;font-weight:600;color:var(--tx)}
.player-hint{font-size:.72rem;color:var(--ac);opacity:.7}
.music-audio{width:100%;height:44px;border-radius:var(--r2);margin-top:.3rem;color-scheme:dark}
.music-audio::-webkit-media-controls-panel{background:var(--bg4);border-radius:var(--r2)}
.music-audio::-webkit-media-controls-enclosure{border-radius:var(--r2);background:var(--bg4);border:1px solid var(--bdr2)}
.music-audio::-webkit-media-controls-play-button,
.music-audio::-webkit-media-controls-timeline,
.music-audio::-webkit-media-controls-current-time-display,
.music-audio::-webkit-media-controls-time-remaining-display,
.music-audio::-webkit-media-controls-volume-slider,
.music-audio::-webkit-media-controls-mute-button{filter:brightness(1.2)}

/* Comments */
.comments{margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--bdr)}
.comments h3{font-size:1rem;font-weight:600;margin-bottom:1rem}
.comment-form{margin-bottom:1.5rem}
.comment-form textarea{width:100%;min-height:80px;padding:.7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-family:var(--font);font-size:.88rem;resize:vertical;outline:none}
.comment-form textarea:focus{border-color:var(--ac)}
.comment-form .row{display:flex;gap:.5rem;margin-top:.5rem}
.comment-form input{flex:1;padding:.5rem .7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.82rem;font-family:var(--font);outline:none}
.comment-form input:focus{border-color:var(--ac)}
.comment-form button{padding:.5rem 1rem;background:var(--ac);color:#0a0a0f;border:none;border-radius:var(--r2);font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.comment-form button:hover{opacity:.9}
.cmt-list{display:flex;flex-direction:column;gap:.8rem}
.cmt{background:var(--bg3);border-radius:var(--r2);padding:.8rem 1rem}
.cmt-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.cmt-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:.7rem}
.cmt-name{font-size:.82rem;font-weight:600}
.cmt-time{font-size:.68rem;color:var(--tx3);margin-left:auto}
.cmt-text{font-size:.85rem;color:var(--tx2);line-height:1.6}
.cmt-delete{font-size:.68rem;color:var(--tx3);cursor:pointer;margin-left:.5rem}
.cmt-delete:hover{color:#f44}

/* TOC */
.toc{position:fixed;top:calc(52px + 2rem);right:clamp(1rem,2vw,2rem);width:180px;font-size:.75rem;display:none;z-index:100}
.detail.active~.toc{display:block}
.toc a{display:block;padding:.2rem 0;color:var(--tx3);transition:color .2s;line-height:1.4}
.toc a:hover,.toc a.active{color:var(--ac);text-decoration:none}
.toc .h3{padding-left:.8rem}
@media(max-width:1100px){.toc{display:none!important}}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lb.on{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:var(--r2)}

/* Back top */
#btop{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--ac);color:#0a0a0f;border:none;font-size:1rem;cursor:pointer;opacity:0;transition:all .3s;z-index:1000;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#btop.on{opacity:1}
#btop:hover{box-shadow:0 0 20px var(--ac3)}

/* Responsive */
@media(max-width:768px){
  .layout{flex-direction:column;padding-top:calc(52px + 1rem)}
  .side{position:fixed;top:0;left:-300px;width:280px;height:100vh;max-width:280px;z-index:2000;overflow-y:auto;background:var(--bg);border-right:1px solid var(--bdr);transition:left .3s ease,padding .3s ease;padding:1rem;box-shadow:none;flex:none;min-width:0;pointer-events:none}
  .side.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.5);pointer-events:auto}
  .side-card{display:block;padding:0;border:none;background:none}
  .side-avatar{margin:0 auto .8rem;width:60px;height:60px;font-size:1.6rem}
  .side-name{text-align:center}
  .side-bio{text-align:center}
  .side-stats{grid-template-columns:repeat(2,1fr)}
  .side-links{justify-content:center}
  .side-section{text-align:left}
  .toc{display:none!important}
  .side-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1999}
  .side-mask.on{display:block}
  .menu-btn{display:flex!important}
}
/* ───── Table ───── */
.article-body .table-wrap{overflow-x:auto;margin:1.2em 0;-webkit-overflow-scrolling:touch}
.article-body table{width:100%;border-collapse:collapse;font-size:.93em}
.article-body table thead{background:var(--ac);color:#fff}
.article-body table th{padding:8px 14px;font-weight:600;text-align:left;border:1px solid var(--bdr2);white-space:nowrap}
.article-body table td{padding:6px 14px;border:1px solid var(--bdr2);vertical-align:top}
.article-body table td code,.article-body table th code{white-space:nowrap;font-size:.9em}
@media(max-width:768px){.article-body .table-wrap{margin:.8em 0}}
@media(max-width:768px){.article-body table{font-size:.85em}}
@media(max-width:768px){.article-body table th,.article-body table td{padding:5px 8px}}

.menu-btn{display:none;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--tx2);padding:4px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

</style>
</head>

{id:4,title:"时代的风口：Token 中转，一门被低估的生意",date:"2026-05-21",tags:["Token中转","AI Agent","大模型","API聚合","创业思考"],summary:"每天烧掉几万 Token 的时候我发现了一件事——模型厂商在卖 Token，开发者在买 Token，中间的流通环节却像一座乱糟糟的菜市场。这门生意，有人已经赚到钱了。",content:`<blockquote>用了半年 AI Agent，最大的感受不是 AI 多聪明，而是——交电费真是一件让人头疼的事。</blockquote>
<h2>💸 一、我的 Token 账单</h2>
<p>先说说我自己的情况。</p><p>我现在每天都在用 AI Agent。不是那种偶尔问一句"今天天气怎么样"的用法，而是把 Agent 当成真正的生产力工具——写代码、改文章、做调研、搭系统。DeepSeek、小米 MiMo、NVIDIA NIM……各种模型轮着用。</p><p>一天下来，<strong>2 到 3 块钱</strong>就没了。</p><p>听起来不多对吧？但请注意，这只是<strong>简单任务</strong>——问个问题、改段文字、查个资料。当我跑复杂任务的时候，比如让 Agent 分析整个代码库、批量处理数据、多轮迭代调试，Token 消耗就像开了水龙头一样往下流，<strong>根本是个无底洞</strong>。</p><p>为了省钱，我试过用 Ollama 跑本地模型。免费是免费了，但那体验——Qwen2.5:7b 跑个小任务都能卡半天，复杂一点的逻辑直接超时甚至挂死。省了钱，废了命。</p><p>就在这种"用付费 API 心疼钱，用免费本地模型心累"的纠结中，一个念头冒了出来——<strong>Token 能不能像自来水一样，有人专门做供应和分发？</strong></p>
<h2>🔍 二、需求从哪来？</h2>
<p>这个生意不是凭空想出来的。看看现在的 Token 市场有多分裂：</p><p><div class="table-wrap"></p>
<table>
<thead>
<tr><th>维度</th><th>现状</th></tr>
</thead>
<tbody>
<tr><td><strong>厂商多</strong></td><td>OpenAI、Anthropic、Google、DeepSeek、小米、智谱、阿里 Qwen……几十家</td></tr>
<tr><td><strong>计价乱</strong></td><td>按 Token 计费、按请求计费、按 Token 类型分别计价、按时间段计费</td></tr>
<tr><td><strong>价格差距大</strong></td><td>DeepSeek 输出约 ¥0.7/百万 Token，GPT-4o 输出 ¥70+/百万 Token，<strong>相差近百倍</strong></td></tr>
<tr><td><strong>无统一入口</strong></td><td>每家 SDK 不同，认证方式不同，结算货币不同</td></tr>
<tr><td><strong>Pay-as-you-go 的痛点</strong></td><td>每月跑量稳定了想包月？不存在的，每家用完都要手动充值</td></tr>
</tbody>
</table>
<p></div>简单问题用便宜模型（比如 DeepSeek）就够了，复杂编程任务必须上 GPT-4o 或 Claude Sonnet。如果你只用一种模型，要么浪费钱（杀鸡用牛刀），要么解决不了问题（杀牛用鸡刀）。</p><p>开发者真正需要的是这样的东西：<strong>一个地方充钱，一个接口调用，系统自动根据任务难度分配最合适的模型</strong>。</p><p>这就是 Token 中转站的核心价值——<strong>做模型和用户之间的"路由器"</strong>。</p>
<h2>📖 三、这个市场上已经有什么？</h2>
<p>我对这个领域做过一些调研，简单总结一下目前看到的几个方向：</p><p><strong>① OneAPI 开源项目（GitHub：songquanpeng/one-api）</strong><br>这是目前最流行的 API 聚合开源方案，Star 数超过 2 万。它本质上是做一个反向代理层：把各家模型的 API 统一成 OpenAI 的格式，管理员在后端配置多个渠道的 Key，然后分发出去。很多小团队和个人都基于它搭建了自己的"小水管"。它的 GitHub Issues 里你能看到各种真实需求——"如何控制用户额度"、"如何做路由分发"、"如何统计 Token 消耗"。</p><p><strong>② API2D 等商业化平台</strong><br>API2D 是国内较早开始做 Token 转售的平台之一。它们的做法挺聪明：搭建一个接入层，兼容 OpenAI 格式，然后后端接了多个模型来源。用户不用关心我用的是 DeepSeek 还是 GPT，反正接口一样，充钱一样。不过要注意的是，这种平台大多是"灰色"的——你很难确认它后端跑的是不是真模型。</p><p><strong>③ 企业级方案：Model-as-a-Service</strong><br>像 Amazon Bedrock、阿里云百炼这类平台，严格意义上也是 Token 中转站——它们自己不生产模型，而是把各个厂商的模型包装成统一服务提供给企业客户。区别在于，它们有合规通道，有 SLA 保障，稳定性也高得多。</p><p><strong>④ 灰色地带的各种"野路子"</strong><br>说实话，这才是市面上最常见的形态：</p>
<ul><li><strong>暗改倍率</strong>：首页写 0.7 倍计费，后台悄悄设 3 倍，用户不知情</li>
<li><strong>偷梁换柱</strong>：你付了 GPT-4o 的钱，实际调的是 DeepSeek 或者某个开源模型</li>
<li><strong>卖用户数据</strong>：把你的对话数据打包卖给模型厂商做训练</li>
<li><strong>白嫖号</strong>：批量注册大厂免费额度，风控一封就换号，用户体验间歇性瘫痪</li></ul>
<p>这些乱象说明一个道理——<strong>市场上行的时候，什么妖魔鬼怪都会冒出来。</strong> 但也反过来证明了一件事：需求是真实的，利润空间是存在的。</p>
<h2>📊 四、这个市场到底有多大？</h2>
<p>我不做预测，只说几个我看到的真实数据点：</p>
<ul><li><strong>OpenAI 2025 年 API 收入预计破 100 亿美元</strong>——这仅仅是 API 调用的直接收入，不包含下游增值服务</li>
<li><strong>DeepSeek R1 发布后，API 调用成本下降了约 90%</strong>——但调用量增长了不止 10 倍，总支出反而上升了。这就是杰文斯悖论在 AI 领域的重现：越便宜，用得越多，总花费越高</li>
<li><strong>一个典型 Agent 任务的 Token 消耗是普通聊天的 50-100 倍</strong>——我自己的账单就是证据</li>
<li><strong>OneAPI 项目的 GitHub Star 增速在过去半年翻了一倍</strong>——越来越多人开始自建 API 中转</li></ul>
<p>其实不用看数据，看看你周围有多少人在用 ChatGPT、Cursor、Claude 就知道了。<strong>每个 AI 用户背后，都有 Token 在流动。</strong></p>
<h2>🧭 五、未来会怎样？</h2>
<p>说到未来，我不想画大饼，说几个已经在发生的事：</p><p><strong>1. 模型路由会成为标配</strong><br>就像 CDN 会自动选择最近的节点给你提供服务一样，未来的 API 调用也会自动匹配最合适的模型。简单问题走小模型（快、便宜），复杂问题走大模型（强、贵），系统根据任务复杂度动态分配。这不是科幻，OneAPI 的社区版已经有人在做了。</p><p><strong>2. 合规中转会是蓝海</strong><br>现在的灰色地带之所以存在，是因为合规通道太少了。但大企业客户不可能用"暗改倍率"的平台。如果出现一个透明、合规、有 SLA 的 Token 分发平台，企业是愿意付溢价的——就像企业愿意买正版 Windows 而不是盗版一样。</p><p><strong>3. Token 会成为一种可计量的资源</strong><br>今天的 Token 是"用多少付多少"，未来的 Token 可能有更多形态：包月套餐、预付费折扣、高峰/低谷差价、批发与零售……这些在电力市场、云计算市场都已经验证过的商业模式，会在 Token 市场重演一遍。</p><p><strong>4. 从"卖模型"到"卖服务"</strong><br>真正赚钱的不是在 Token 上赚差价，而是基于 Token 构建增值服务。模型路由、用量监控、成本分析、异常告警、多租户管理……这些才是有护城河的生意。</p>
<blockquote>我不认为 Token 中转站会成为"下一个电力公司"。电力公司的故事是关于基础设施的垄断，而 AI 模型市场天然是多元竞争的。但 Token 流通的中间环节，确实是一块被低估的蛋糕。</blockquote>
<h2>🎯 六、写在最后</h2>
<p>我不是在怂恿谁去创业做 Token 中转站。这个赛道已经有巨头入场了（亚马逊、阿里云都在做），个人玩家很难正面硬刚。</p><p>但我的意思是：<strong>当一个新资源出现的时候，它周围的生态会催生无数机会。</strong> 就像云计算催生了云原生、SaaS、Serverless，Token 经济也会催生出我们现在想不到的东西。</p><p>至于那些靠暗改倍率、卖数据赚钱的人——走不远的。真正的机会，永远在那些让生态更透明、让用户少操心的方向上。</p>
<blockquote>Token 不是新时代的电力。但围绕着 Token 流通的那些生意，可能会是。</blockquote>`,image:"",audio:""},
{id:5,title:"从 OpenClaw 到 Hermes：一个普通人的 AI Agent 进化之路",date:"2026-05-20",tags:["Hermes","OpenClaw","AI Agent","大模型","DeepSeek","Xiaomi","NVIDIA","自建工具链"],summary:"一亿九千万 Token 烧完之后，我决定亲手给 AI 搭一套满配工具箱——从 OpenClaw 到 Hermes 的转型实录",content:`<blockquote>如果不是 OpenClaw 让我看见了 AI Agent 的潜力，我也不会走上这条折腾之路。但潜力归潜力，一亿九千万 Token 烧下去的账单不会说谎——是时候换个玩法了。</blockquote>
<h2>🔥 一、从「能用」到「好用」——为什么要换</h2>
<p>OpenClaw 带我入门了 AI Agent 的世界。我不能说它不好——没有它，我可能到现在还不知道 AI 能自动写代码、搭网站、操作浏览器。但用久了，痛点就像鞋里的沙子，一步两步不觉得，走远了就硌得慌。</p><p><strong>第一个痛点：Token 烧得太快了。</strong></p><p>OpenClaw 默认依赖付费 API，而我当时选的是小米 MiMo 的 Token Plan。一开始觉得"一亿 Token 够用了吧"，结果 AI Agent 跑起来才知道——这玩意儿就是个 Token 粉碎机。对话、代码、工具调用……每个动作都在烧 Token。最终一看账单：<strong>小米用了一亿九千万 Token，DeepSeek 用了一亿三千万 Token</strong>。加起来三亿多 Token 打水漂。</p><p><em>不算不知道，一算吓一跳。Agent 时代的 Token 消耗，远超你聊天时的体感。</em></p><p><strong>第二个痛点：UI 不友好，很多东西难以使用。</strong></p><p>OpenClaw 的功能很强大，但它的界面和操作逻辑对普通用户来说确实有门槛。配置项藏得深，文档分散，很多功能需要自己摸索。对于一个只想用 AI 干活的人来说，学习成本有点高了。</p><p>于是我动了换工具的心思——直到我发现 Hermes Agent。</p>
<h2>🌊 二、第一次碰壁：NVIDIA 免费 API 的诱惑与绝望</h2>
<p>转入 Hermes 后，第一件事就是配 API。有了 OpenClaw 的经验，配置 DeepSeek 和小米 MiMo 还算顺利——毕竟都是付费 Token，给钱就能用。</p><p>但我不甘心只花自己的钱。听说 <strong>NVIDIA NIM</strong> 提供了免费 API 额度，在线就能用，我眼睛都亮了——白嫖 NVIDIA 的顶级显卡推理能力，这谁顶得住？</p><p>于是我兴冲冲地去注册，准备回答问题领取免费额度。然后……我对着屏幕发呆。</p><p><strong>验证问题超时了。</strong></p><p>NVIDIA 的验证页面要求在一定时间内回答完问题，但我这边的网络延迟太高，每次填到一半就超时，页面刷新，一切重来。试了十几次，次次失败。那种感觉就像站在自助餐厅门口，闻着香味，但门就是打不开。</p>
<blockquote>🔴 <strong>这就是那天我的心情</strong><br>世界上最远的距离，不是生与死，而是 NVIDIA 的免费 API 就在那里，而我却注册不了。</blockquote>
<h2>🔧 三、柳暗花明：自配 API + Ollama Cloud + GitHub</h2>
<p>就在我快要放弃的时候，我突然发现——Hermes 其实支持自己配置 API，而且还有 <strong>Ollama Cloud</strong> 和 <strong>GitHub</strong> 的选项！</p><p>这就意味着：</p>
<ul><li><strong>Ollama Cloud</strong> — 可以用本地或云端部署的开源模型，灵活控制成本</li>
<li><strong>GitHub</strong> — 某些场景下能用 GitHub 的免费额度</li>
<li><strong>自配 API</strong> — 绕过官方渠道，直接用自己的 Key</li></ul>
<p>我花了点时间摸索配置，过程艰难但最终还是把基础搞定了。这感觉就像开了个隐藏关卡——原来还有这么多免费的"平民"路子可以走。</p><p><img src="/images/装配的模型.png" alt="装配的模型" loading="lazy"></p><p><em>Hermes 支持各类模型配置，自配 API + 厂商选项双管齐下，总算把模型跑起来了。</em></p>
<h2>💸 四、三亿 Token 的教训</h2>
<p>有了 Hermes，我终于可以清晰地看到 Token 的消耗情况。不看不知道，一看吓一跳：</p><p><div class="table-wrap"></p>
<table>
<thead>
<tr><th>厂商</th><th>Token 消耗</th><th>用途</th></tr>
</thead>
<tbody>
<tr><td><strong>小米 MiMo</strong></td><td><strong>1.9 亿</strong> Token</td><td>主力对话 + 工具调用</td></tr>
<tr><td><strong>DeepSeek</strong></td><td><strong>1.3 亿</strong> Token</td><td>代码生成 + 复杂推理</td></tr>
</tbody>
</table>
<p></div>为什么 Agent 这么费 Token？因为它不是简单的聊天——每个任务背后是模型调用 + 工具执行 + 结果处理的循环。一次"帮我抓取网页内容并整理成报告"的操作，背后可能消耗几十万 Token。</p>
<blockquote>从 OpenClaw 到 Hermes，我学到的最重要一课是：<strong>选对模型和工具链，比单纯堆 Token 重要一百倍。</strong></blockquote>
<h2>🛠️ 五、Hermes 满配化：从裸机到全模态</h2>
<p>既然 Token 这么贵，那就要让每个 Token 都花在刀刃上。我花了一晚上给 Hermes 装了全套工具链，让它的能力从"只会打字"升级到"能抓能搜能读能听能画"：</p>
<h3>内容抓取四件套</h3>
<p>给 AI 装上"全网浏览天眼"：</p>
<ul><li><strong>Scrapling</strong> — 反爬绕过，能抓被保护的页面</li>
<li><strong>Crawl4AI</strong> — 批量深度爬取，整站级别的数据采集</li>
<li><strong>CamoFox</strong> — 隐身浏览器，能跑动态 JS 页面</li>
<li><strong>Jina Reader</strong> — 单页内容精准提取，零成本</li></ul>
<h3>搜索与文档处理</h3>
<p>补齐信息获取的最后一块拼图：</p>
<ul><li><strong>Tavily</strong> — AI 搜索引擎，每月 1000 次免费额度</li>
<li><strong>DuckDuckGo</strong> — 零成本兜底搜索，无限制</li>
<li><strong>Pandoc</strong> — 上百种文档格式互转</li>
<li><strong>Marker</strong> — PDF 转 Markdown，几百页扫描件也能精准提取</li></ul>
<h3>全模态表达</h3>
<p>能听、能说、能画一步到位：</p>
<ul><li><strong>Whisper</strong> — 语音识别，99+ 语言支持</li>
<li><strong>Edge TTS</strong> — 免费语音合成，多音色真人质感</li>
<li><strong>Fal.ai + FLUX</strong> — 图片生成，商业级画质</li></ul>
<h2>🚀 六、三大神器的进场</h2>
<p>光有基础能力还不够。我又装了三个让 Hermes 真正"升华"的工具：</p>
<h3>① hermes-hudui — Token 烧在哪，一看便知</h3>
<p><img src="/images/hermes仪表盘工具，精确监控token和使用.png" alt="hermes仪表盘工具，精确监控token和使用" loading="lazy"></p><p>一个 Web 可视化仪表盘，14 个专属页面实时展示 Token 成本、模型消耗对比、会话拆解。之前 OpenClaw 让我看不清 Token 去哪了，现在一目了然。</p>
<h3>② RTK（Rust Token Killer）— 省 Token 神器</h3>
<p>用 Rust 写的终端压缩代理。它能智能过滤 ls、git status 等命令的输出，<strong>直接减少 60%-90% 的无效 Token 消耗</strong>。装在 Hermes 上后，所有终端命令自动走 RTK，省下的 Token 肉眼可见。</p>
<h3>③ Self-Evolution — AI 自己调教自己</h3>
<p>最科幻的一个——基于 DSPy + GEPA 遗传进化算法，Hermes 能自动优化自己的 Skill、System Prompt 和工具描述。你不用手动改 prompt，AI 自己就会变得更好用。</p>
<h2>📊 七、客观评价：从 OpenClaw 到 Hermes 的得与失</h2>
<p><div class="table-wrap"></p>
<table>
<thead>
<tr><th>维度</th><th>OpenClaw</th><th>Hermes</th></tr>
</thead>
<tbody>
<tr><td><strong>上手难度</strong></td><td>中等（Windows 适配不全）</td><td>中等（需自配工具链）</td></tr>
<tr><td><strong>Token 管控</strong></td><td>不透明，烧得快</td><td>✅ HUDUI 实时监控 + RTK 省 Token</td></tr>
<tr><td><strong>工具链</strong></td><td>内置丰富</td><td>灵活可扩展，但需自行安装</td></tr>
<tr><td><strong>UI 友好度</strong></td><td>学习成本高</td><td>CLI + Web 仪表盘双模式</td></tr>
<tr><td><strong>扩展性</strong></td><td>插件生态</td><td>技能系统 + 自定义更灵活</td></tr>
</tbody>
</table>
<p></div><strong>OpenClaw 是最好的启蒙老师</strong>——它让我看到了 AI Agent 的可能性。而 <strong>Hermes 是我现在的选择</strong>——它让我花的每一分 Token 都物有所值。</p>
<blockquote>从 OpenClaw 到 Hermes，追根到底不是二选一，而是从"学习使用 AI"到"掌控 AI"的成长过程。前者让我入了门，后者让我能自由发挥。</blockquote>
<h2>🌟 写在最后：Agent 时代，省 Token 就是省钱</h2>
<p>大模型时代不缺聪明的大脑，缺的是吃 Token 不眨眼的胃口。一亿九千万 Token烧完之后我明白了——未来的竞争优势不在于谁的模型更强，而在于谁能用更少的 Token 完成同样的任务。</p><p>从 OpenClaw 到 Hermes，我从"被 Token 牵着走"变成了"管着 Token 花"。这套工具链让我花的每一分钱都看得清清楚楚。</p><p><em>工具可以换，但省 Token 的直觉不能丢。</em></p>`,image:"",audio:""},

<p style="text-align:center;color:var(--ac);font-size:0.85em;margin-top:-15px;margin-bottom:35px;">🌌 宇宙无言，却最清醒——在它面前，所有的幸存者视角都显得荒诞</p>

---

> **核心问题**：当算法只推送「幸存者」给你看时，你如何辨别什么是真实，什么是滤镜？

---

<div style="background:var(--bg3);border:1px solid var(--bdr2);border-radius:12px;padding:1.5rem 1.8rem;margin:1.5rem 0;">

**📌 太长不看版**

<div style="margin-top:0.8rem;display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">

<div style="background:var(--bg4);border-radius:8px;padding:0.8rem 1rem;">
<div style="font-size:1.1rem;margin-bottom:0.3rem;">🔍</div>

</div>

<div style="background:var(--bg4);border-radius:8px;padding:0.8rem 1rem;">
<div style="font-size:1.1rem;margin-bottom:0.3rem;">⚠️</div>
<div style="font-weight:600;font-size:0.88rem;color:var(--tx);">为什么值得警惕</div>
<div style="font-size:0.78rem;color:var(--tx2);">它让你把极端当常态、把运气当能力，在无声无息中摧毁你的内心秩序。</div>
</div>

<div style="background:var(--bg4);border-radius:8px;padding:0.8rem 1rem;">
<div style="font-size:1.1rem;margin-bottom:0.3rem;">🛠️</div>
<div style="font-weight:600;font-size:0.88rem;color:var(--tx);">如何避免</div>
<div style="font-size:0.78rem;color:var(--tx2);">主动寻找沉默的数据、警惕表面、把自己放回宇宙的尺度里。</div>
</div>

<div style="background:var(--bg4);border-radius:8px;padding:0.8rem 1rem;">
<div style="font-size:1.1rem;margin-bottom:0.3rem;">✨</div>
<div style="font-weight:600;font-size:0.88rem;color:var(--tx);">最终答案</div>
<div style="font-size:0.78rem;color:var(--tx2);">做一粒清醒的尘埃：不把片面当全部，不把幸存当必然。</div>

</div>

## 一、什么是幸存者视角

幸存者视角，顾名思义——**你只看到了"活下来"的那一部分，却误以为那就是全部。**

### 一个经典案例

二战时，盟军统计返航战机身上的弹孔，发现机翼最密集，于是准备加固机翼。

然而一位统计学家指出：恰恰相反。被击中机翼的飞机还能返航，被击中油箱和发动机的早已坠毁——它们根本没有出现在统计里。**最后加固的，是那些没有弹孔的部位。**

> 这就是幸存者偏差的核心：你看见的，其实是过滤器让你看见的。沉默的证据，永远消失了。

### 流媒体时代：放大到极致

在抖音、快手、小红书时代，这种偏差被机器算法放大了无数倍。你刷到的每一条视频，都是千军万马过独木桥之后的"幸存者"：

<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:1rem 1.5rem;margin:1rem 0;">

| 你刷到的「幸存者」 | 你没看到的「沉默的大多数」 |
|:---|:---|
| 📱 "25岁月入百万" | 数千万正在挣扎谋生的年轻人 |
| 💪 "自律逆袭变美" | 大量努力却效果平平的普通人 |
| 💑 "神仙爱情" | 无数默默离场的破碎关系 |
| 🚀 "裸辞创业成功" | 更多亏光积蓄、灰头土脸回归的失败者 |

</div>

**幸存者视角，就是把这些万里挑一的碎片，拼凑成了你心中"世界本该如此"的幻象。**

---

## 二、幸存者视角为什么值得被注意

<div style="background:linear-gradient(135deg,rgba(244,67,54,0.08),rgba(244,67,54,0.02));border:1px solid rgba(244,67,54,0.2);border-radius:12px;padding:1.2rem 1.5rem;margin:1rem 0;">
<p style="margin:0 0 0.5rem 0;font-weight:600;color:#f44;">⚠️ 因为它正在摧毁普通人的内心秩序——以一种悄无声息的方式。</p>
</div>

当你每天浸泡在"幸存者"的图景里，你会不自觉地把极端当成常态，把运气当成能力，把包装当成本质。

**于是焦虑滋生了**——为什么别人的人生如此精彩，而我如此平庸？

**于是自我怀疑涌来**——是不是我不够努力、不够聪明、不够好看，才没有过上那种生活？

### 更可怕的是：失去对真实世界的感知力

我们开始用那一小撮"被看见"的标准去衡量一切：

- 要求爱情必须永远浪漫 ❤️
- 要求工作必须热血沸腾 💼
- 要求外貌必须毫无瑕疵 ✨

一旦现实露出粗糙的质地，我们就认为自己"失败"了——而不是意识到：**那本来就是生活的常态。**

尤其对年轻人，这种视角的影响尤为深远：

> 它让人变得浮躁，追逐表面的光鲜，却失去深耕一件事的耐心。
> 
> 它让人只信"看得见的结果"，却看不见背后庞大的基数、看不见运气与时运、看不见那些同样付出却没能站到聚光灯下的努力。

于是偏见产生了——对他人苛刻，对自己更苛刻。

流媒体让我们"容易看见"。但看见越多，并不意味着了解越多。**当你误以为自己掌握了全部真相，恰恰是离真相最远的时候。**

---

## 三、如何避免幸存者视角

要跳出这一陷阱，需要清醒的自觉，也需要一份更辽阔的哲学。

### 🔹 方法一：问自己"我没看见的是什么？"

每当你被一个极端案例刺激得热血沸腾或自惭形秽时，**主动去寻找那些沉默的数据：**

- 看到"靠副业月入十万" → 查一查该行业的平均收入、失败概率
- 看到一个完美人设 → 提醒自己那是无数次重拍 + 精心剪辑 + 脚本设计
- 看到"别人的成功" → 去找失败者的自述，听那些没有活成"幸存者"的普通声音

> 只有当你主动寻找看不见的部分，世界才开始恢复本来的厚度。

### 🔹 方法二：培养对"表面"的警惕

流媒体的本质是眼球经济——越是极端、稀缺、反差的内容，越容易被传播。

这意味着你看到的，本身就是被筛选过数次的**"奇观"**。

把短视频里的世界当成小说电影来看。**欣赏它的戏剧性，但不把它当成人生指南。** 让信息经过思考的沉淀，而不是直接内化为自我标准。

### 🔹 方法三：把我们自己放回宇宙的尺度里

<div style="background:linear-gradient(135deg,rgba(0,232,157,0.08),rgba(0,232,157,0.02));border:1px solid rgba(0,232,157,0.2);border-radius:12px;padding:1.5rem;margin:1.5rem 0;text-align:center;">
<p style="font-size:1rem;line-height:1.8;margin:0;">
我们生活的星球，不过是悬在无尽黑暗中的一粒微尘。<br>
整个人类文明，在宇宙的时间里连一瞬都算不上。<br><br>
你今天为之焦虑到失眠的那件事——<br>
那场没有得到的认可，那个让你觉得自己一文不值的比较对象——<br>
<strong style="color:var(--ac);font-size:1.1rem;">放在这样的背景下，究竟有多重？</strong>
</p>
</div>

这绝非虚无主义的逃避，而是一种清醒的豁达。正因为我们是宇宙的尘埃，所以许多人为构建出来的"正确活法"，**根本不值得你放弃内心的自由去苦苦追随。**

> 真正的独立个体，从不是看遍所有热门视频之后随波逐流，而是明白世界有无数个侧面，任何一种被算法推到极致的光鲜，都只是沧海一粟。

**看过繁华，仍然安于自己的节奏；知悉奇观，却不把它当作人生的唯一答案。**

那些让你纠结不放的得失，那些反复比较的执念，那些"不够好"的自我攻击——在宇宙的沉默面前，轻如鸿毛。不知变通地纠结一个片面视角告诉你的"应该"，才是对生命最大的浪费。

---

## 四、做一粒清醒的尘埃

幸存者视角不会消失。只要信息在筛选，它就会一直存在。**但我们可以选择不被它驯化。**

流媒体给了我们看见的机会，却未必给了我们看清的能力。真正的"看见"，是知道自己看见的永远只是冰山一角，从而保持谦卑、保持追问、保持对世界复杂性的敬畏。

所以，继续刷那些美好的视频没关系，但别忘了在关掉屏幕之后，回到自己真实的生活里——

<div style="background:var(--bg3);border:1px solid var(--bdr2);border-radius:12px;padding:1.5rem;margin:1.5rem 0;text-align:center;">
<p style="margin:0 0 0.8rem 0;font-size:0.95rem;color:var(--tx2);">
那儿可能平淡，可能粗糙，可能没有那么多高光时刻——<br>
<strong style="color:var(--tx);font-size:1.05rem;">但它完整而真实地属于你。</strong>
</p>
</div>

<p style="text-align:center;font-size:1.1rem;font-weight:700;line-height:2;margin:2rem 0;">
宇宙无边，我们皆是尘埃。<br>
那就做一粒<strong style="color:var(--ac);font-size:1.3rem;">清醒的尘埃</strong>：
</p>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;max-width:500px;margin:1.5rem auto;">

<div style="background:var(--bg4);border-radius:8px;padding:0.8rem;text-align:center;font-size:0.88rem;">
❌ 不把片面当全部
</div>

<div style="background:var(--bg4);border-radius:8px;padding:0.8rem;text-align:center;font-size:0.88rem;">
🚫 不把滤镜当真相
</div>

<div style="background:var(--bg4);border-radius:8px;padding:0.8rem;text-align:center;font-size:0.88rem;">
❌ 不把幸存当必然
</div>

<div style="background:var(--bg4);border:1px solid var(--ac3);border-radius:8px;padding:0.8rem;text-align:center;font-size:0.88rem;color:var(--ac);font-weight:600;">
✅ 在有限的生命里，活出自己的宽度
</div>

</div>

<p style="text-align:center;font-size:0.92rem;margin-top:1rem;color:var(--tx2);">
而不是被几个短暂的画面，定义了全部的信念。
</p>

---

<p style="text-align:center;color:var(--tx3);font-size:0.85rem;margin-top:1.5rem;">
这，才是幸存者视角带给我们的，最值得被记取的提醒。
</p>`,image:"",audio:""},
{id:9,title:"从历史分工到现代对立：两性议题的深层溯源",date:"2026-05-18",tags:["性别研究","社会观察","进化心理学"],summary:"最近，知乎上一篇关于“计算机考试插排分配”的讨论再次点燃了两性话题的争论。表面上，这只是一个插排分配的琐事，但其背后折射出的男女思维差异、信任程度与群体互动逻辑，远比事件本身复杂得多。",content:`<h2>开篇：问题的起点</h2>
<p>最近，知乎上一篇关于“计算机考试插排分配”的讨论再次点燃了两性话题的争论。表面上，这只是一个插排分配的琐事，但其背后折射出的男女思维差异、信任程度与群体互动逻辑，远比事件本身复杂得多。</p><p>我认为，理解这一现象的核心，在于正视从古至今男女生产地位、生产职能及所扮演角色的本质差异。父系社会的长期延续，直接塑造了我们在性别互动上的集体潜意识。</p>
<h2>溯源：狩猎协作与采集精算</h2>
<p>远古时期，社会分工的雏形便已深植于两性的生存策略之中。</p>
<h3>男性的生产模式：以协作为核心的狩猎</h3>
<p>在漫长的进化历程中，男性多承担狩猎职能。大型狩猎活动具有高风险、高回报的不可控性，这天然地要求男性之间建立高度信任与分工协作。</p><p>“狩猎一采集理论”指出，原始社会中男女获取食物的活动方式不同，导致了空间认知能力的差异——女性因从事采集活动进化出较好的位置记忆能力，男性因进行狩猎活动则进化出较好的空间旋转能力。</p><p>长期的协作传统，加上父系社会赋予的公共生产地位，塑造了男性相对大度、顿感更强的社会化特质，其自我认同较少来源于同性间的攀比与微妙的资源戒备。</p>
<h3>女性的生产模式：以精算为核心的采集与管理</h3>
<p>与此同时，女性在父系社会中长期扮演着资源精算者的角色。面对生产物资的匮乏，女性需要更细腻地规划分配，这促使其天然养成了更强的私有主义意识和细腻的性格。</p><p>此外，进化心理学研究发现，女性更容易嫉妒同伴在资源上的优势，而男性则更容易嫉妒同伴在择偶上的优势。在等级森严的古代家庭体系中，激烈的妻妾之争更是进一步催化了女性之间的防备心理与心力耗费。</p><p>据记载，中国古代法律对妻、妾地位作出严格区分，妻的地位远高于妾，而妾不过是丈夫的生育工具——这种以“内室竞争”为核心的生存结构，与男性在公共领域的协作逻辑形成了鲜明的对照。</p>
<h2>现状：性别平等的“百年之遥”与认知分歧</h2>
<p>这些由历史分工和制度演变带来的集体潜意识，是“父系社会长时间的弊端”，绝非一朝一夕可以改变。</p>
<blockquote><strong>世界经济论坛发布的《2025年全球性别差距报告》</strong> 给出了一个客观的注脚：目前全球性别差距已缩小至68.8%，但按照当前的进步速度，实现完全平等仍需123年之久。</blockquote>
<p>更值得关注的是认知层面的分歧。一份覆盖2万样本的《中国性别观念调查报告》显示，在18-35岁群体中，67%的女性认为性别平等仍需大力推进，而同年龄段男性持此观点的仅占39%。</p><p>职场数据同样印证了这种差异：调研显示54%的职场女性表示曾遭遇过性别歧视，而男性仅为6.6%。这种认知鸿沟正是历史惯性在当代的投射。</p><p><div class="table-wrap"></p>
<table>
<thead>
<tr><th>维度</th><th>女性</th><th>男性</th></tr>
</thead>
<tbody>
<tr><td>遭遇性别歧视比例</td><td>54%</td><td>6.6%</td></tr>
<tr><td>认为平等仍需大力推进</td><td>67%</td><td>39%</td></tr>
</tbody>
</table>
<p></div>## 困境：当下网络性别对立的三点原因</p><p>然而，纵观整个互联网，当下的男女对立情绪却愈演愈烈。我认为根源在以下三点：</p>
<h3>脱离生产地位的权利追求</h3>
<p>随着思想逐渐开放，一部分女性开始脱离实际的“生产地位”关系去追逐抽象的“绝对权利”，违背了“地位与能力相统一”的底层逻辑，引发了男性群体的反感和对立扩大化。</p>
<h3>对男性贡献的全盘否定</h3>
<p>女性在最近几年刚刚大规模取得话语权，急切地想要提高权力。但数千年的男权社会积重难返，这种急躁导致一部分声音开始对男性的历史贡献与社会价值进行全盘否定，进一步撕裂了共识。</p>
<h3>资本主义陷阱的推波助澜</h3>
<p>我们必须警惕消费主义对两性关系的扭曲。多年前，部分资本力量利用女性心理，大幅拉高男性在物质层面的供养标准，制造出虚幻的性别提升感，使多数人背离了朴素的生活本质。</p><p>男性对此的不适，本质上是一种对资本强行绑架生活方式的集体反抗。</p>
<h2>总结：在争辩中走向理性</h2>
<p>男女在思维和角色上的这些现象，是父系社会长期弊端导致的必然结果，短时间的确难以根除。但我并不认为这种讨论是不正确的，恰恰相反，只有在客观的讨论与争辩中，我们才能寻找到真正正确的方向。</p><p>最后我们需要警醒：不能犯矫枉过正的错误。一味片面地追求脱离现实的“绝对平等”，只会违背了自然演化和生产实践所赋予两性的自然规律与协作美感。承认差异、尊重历史、警惕资本，这才是修复两性关系、达成良好布局的正确路径。</p>`,image:"",audio:""},

{id:11,title:"我的AI工具折腾之路",date:"2026-05-17",tags:["AI","技术","工具"],summary:"从云端API到本地部署，我的AI工具使用体验与思考",content:`<h2>前言 🚀</h2>
<p>最近在AI工具的使用上经历了不少折腾，从最初的云端API调用，到后来尝试本地部署，这段经历让我对AI的使用成本和技术选型有了更深的理解。今天就来记录一下我的整个探索过程。</p>
<h2>小米平台API的消耗困境 📊</h2>
<p>事情要从我的小米平台API说起。最近发现我的API调用量已经消耗了<strong>70%</strong>，这个消耗速度确实让我有些意外。</p><p>说实话，云端API的使用成本比我想象的要高得多。每次调用都需要消耗token，而现在的AI模型动辄就是几K甚至几M的上下文窗口，累积下来的消耗确实不容小觑。</p>
<h2>飞书连接与OpenClaw的尝试 💬</h2>
<p>在思考如何优化成本的同时，我也在尝试扩展更多的应用场景。比如想要连接飞书平台，通过OpenClaw来实现一些自动化的功能。</p><p>然而事与愿违，在更新OpenClaw之后，原本正常使用的小米API竟然无法继续使用了。这让我不得不重新审视API的选择和配置问题。</p>
<h2>DeepSeek：性价比之选 💰</h2>
<p>在寻找替代方案的过程中，我尝试了DeepSeek的API。说实话，DeepSeek的价格策略确实让人眼前一亮：</p>
<ul><li>💎 <strong>超低价格</strong>：两千多万token才花了一块钱</li>
<li>⚡ <strong>响应速度快</strong>：实际使用中反应非常迅速</li>
<li>🧠 <strong>效果超预期</strong>：生成质量出乎意料地好</li></ul>
<p>然而，即便是这样"便宜"的API，面对海量的token消耗，长期使用下来依然是一笔不小的开支。这让我开始思考另一个问题：<strong>能否完全本地化部署AI能力？</strong></p>
<h2>Ollama本地部署：回归本地化 🤖</h2>
<p>经过一番考量，我决定尝试在本地部署AI模型。我的方案是：</p><p>1. 在主机上安装Ollama<br>2. 部署一个体积较小的本地模型<br>3. 用本地模型处理一些简单的日常任务</p><p>这个方案的优势显而易见：</p>
<ul><li>✅ <strong>零成本调用</strong>：本地运行，不消耗任何API额度</li>
<li>✅ <strong>响应更快</strong>：本地计算，没有网络延迟</li>
<li>✅ <strong>隐私更安全</strong>：数据不需要上传到云端</li></ul>
<p>当然，本地模型的最终效果如何，还需要进一步验证和调优。这个问题还有待商榷。</p>
<h2>Claude Code：开发利器 🛠️</h2>
<p>在部署本地AI的同时，我也安装了Claude Code。通过OpenClaw来部署在Linux系统上，确实非常方便。开发效率有了明显的提升，很多重复性的编码工作现在可以交给AI来完成了。</p>
<h2>硬件升级的遗憾 💻</h2>
<p>说起来，这段时间的使用也让我有了一个"后悔"——<strong>没有给电脑升级内存</strong>。</p><p>现在的AI应用，尤其是本地部署的模型，对内存和存储的要求都不低：</p>
<ul><li><strong>内存不足</strong>：运行稍大一点的模型就开始吃力</li>
<li><strong>存储紧张</strong>：模型文件本身就非常大，再加上各种数据</li></ul>
<h2>AI时代存储的疯狂涨价 📈</h2>
<p>说到存储，这个问题不得不提。随着AI的快速发展，固态存储的价格简直是<strong>疯涨</strong>。曾经的"白菜价"SSD，如今价格已经翻了原来的数倍，让人望其项背。</p><p>不过话说回来，这也反映了市场对高性能存储的迫切需求。AI训练需要大量的高速读写，固态存储的涨价似乎也在情理之中。</p>
<h2>总结与思考 💡</h2>
<p>这一路折腾下来，我最大的感受是：<strong>AI工具的使用需要综合考虑成本、效果和便利性</strong>。</p>
<ul><li>对于简单的日常任务，本地模型完全可以胜任</li>
<li>对于复杂的专业任务，云端API仍然是首选</li>
<li>合理组合使用，才能达到性价比的最优解</li></ul>
<p>未来的AI使用之路还很长，且用且探索吧！</p>
<hr>
<blockquote>技术在进步，成本在变化，保持学习和探索的心态最重要 🌟</blockquote>`,image:"",audio:""},
{id:12,title:"疲惫的一天",date:"2026-05-17",tags:["生活","随笔"],summary:"记录这疲惫但充实的一天",content:`<h2>疲惫的一天 ☕</h2>
<p>今天真的是疲惫的一天，从早上忙到晚上，感觉身体被掏空了。但想想，好像也做了不少事情。</p>

{id:13,title:"OpenClaw 使用后感：从踩坑到真香，一个普通人的 AI Agent 之旅",date:"2026-05-16",tags:["OpenClaw","AI Agent","大模型","DeepSeek","个人博客","Cloudflare","GitHub Pages","AI 思考"],summary:"从第一次满怀期待却铩羽而归，到如今将它作为日常生产力工具——聊聊我与 OpenClaw 的真实故事",content:`<blockquote>如果说 2024 年是 AI 大模型的元年，那么 2026 年就是 AI Agent 真正走入普通人生活的拐点。作为一名技术小白，我想聊聊我与 OpenClaw 的故事——从第一次满怀期待却铩羽而归，到如今将它作为日常生产力工具的真实体验。</blockquote>
<h2>🚀 一、初识 OpenClaw：满怀期待的第一次</h2>
<p>去年 OpenClaw 刚发布时，我在社交平台刷到了它的介绍——一个可以完全自主执行任务的 AI Agent，能写代码、管理文件、操作浏览器。对于一个对技术充满好奇但毫无基础的人来说，这简直是致命的吸引力。我第一时间就去下载了，然而现实很快给了我一记闷棍。</p>
<blockquote>⚠️ <strong>当时的困境</strong><br>安装教程寥寥无几，OpenClaw 优先适配 macOS 和 Linux。作为 Windows 用户，我几乎找不到针对自己系统的详细指引，网上教程大多一笔带过，仿佛 Windows 用户不配使用。</blockquote>
<h2>🔧 二、Windows 上的艰难安装之路</h2>
<p>第一次安装时我连命令行都输错了——是的，作为一个纯小白，我对终端的认知还停留在电影里黑客敲键盘的画面。通读文档后我才明白，Windows 上使用 OpenClaw 需要先装两个关键依赖：</p>
<ul><li><strong>Node.js</strong> — JS 运行时环境，OpenClaw 核心依赖</li>
<li><strong>Git</strong> — 版本控制工具，拉取和更新代码</li></ul>
<p>装好依赖后，还需要在 PowerShell 中解除脚本执行限制，然后运行一键安装脚本：</p>
<pre><code>powershell
# 解除脚本执行限制
Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser

# 一键安装
iwr -useb https://openclaw.ai/install.ps1 | iex
</code></pre>
<p>终端里终于出现安装成功的提示时，我几乎要从椅子上跳起来。但兴奋还没持续多久，新的问题就来了——</p>
<blockquote>🚫 <strong>初始化配置缺失</strong><br>安装完成后并没有出现教程里提到的配置向导。后来才了解到，这是 Windows 适配问题，需要手动启动 Gateway 服务后才能进行配置。</blockquote>
<h2>⚙️ 三、第一次配置：手忙脚乱中摸索</h2>
<p>找到更详细的教程后，我按步骤依次执行了以下命令：</p>
<pre><code>bash
# 1. 健康检查（推荐第一步执行）
openclaw doctor

# 2. 启动 Gateway 网关服务
openclaw gateway start

# 3. 执行初始化配置
openclaw onboard
</code></pre>
<p><strong>第一步：openclaw doctor</strong></p><p>第一次运行就报错说没有安装相关服务组件。Windows 兼容性问题开始显现——很多在 macOS/Linux 上默认就有的东西，Windows 上需要手动处理。</p><p><strong>第二步：openclaw gateway start</strong></p><p>成功启动 Gateway 服务。它是 OpenClaw 的核心运行时，相当于控制入口和路由层，所有会话、渠道和工具都通过它连接。</p><p><strong>第三步：openclaw onboard</strong></p><p>终于进入配置向导！首次配置时很多地方出错，好在后来找到了详细的教学视频，跟着一步步操作，最终顺利完成了配置。</p><p>第一次使用时我没有配置付费 API，而是选择了阿里云百炼平台的免费 Token——每个模型赠送 100 万 Token，对初次体验来说足够了。</p><p><img src="/images/aliyun-bailian.png" alt="阿里云百炼大模型平台" loading="lazy"></p>
<blockquote>💡 <strong>浏览器界面打不开？</strong><br>选择使用 UI 时页面显示"无法连接"，排查很久才发现——我把 <code>openclaw gateway start</code> 的服务窗口给关了！Gateway 必须保持运行，浏览器界面才能正常访问。这个低级错误让我哭笑不得。</blockquote>
<h2>💸 四、免费 Token 的甜蜜与苦涩</h2>
<p>配置完成后我迫不及待地开始体验。让 OpenClaw 整理文件、从网上爬取图片（效果嘛……全是免费小图片，质量一般），但确实挺方便。然而甜蜜期很快就结束了——免费模型的 Token 开始限速，每分钟只能处理很少的请求，稍微复杂一点的任务就要等很久。</p><p><img src="/images/xiaomi-mimo.png" alt="小米百亿 Token 计划" loading="lazy"></p><p>我试着自己配置 Token，但作为纯小白，连配置在哪里都不知道。好在阿里云每个模型都提供了 100 万免费额度，我就用免费额度让 OpenClaw 自己帮我配置——没错，用 AI 来配置 AI，这操作我自己都觉得离谱。</p>
<blockquote>坏处也很明显：每个模型只有 100 万 Token，很快就用完了。这点额度只够聊聊天、做做简单任务，完全无法支撑长任务执行。于是第一次的 OpenClaw 体验就这样不了了之，我最终选择了卸载。</blockquote>
<hr>
<h2>🔄 五、再次归来：大模型时代的必然选择</h2>
<p>第二次开始使用 OpenClaw 是最近。短短一年间，AI 的发展速度远超我的想象。之前最大的痛点是<strong>模型不够聪明</strong>和<strong>上下文不够长</strong>，但如今新一代大模型已经彻底改变了这个局面：</p><p><div class="table-wrap"></p>

<p></div>尤其是 <strong>DeepSeek</strong>，定价策略堪称"价格屠夫"——V4-Flash 版本缓存命中场景下，百万 Token 低至 <strong>0.02 元</strong>，一亿 Token 才两块钱左右。这种极致性价比，完美适配了 AI Agent 的发展需求。</p>
<blockquote>✅ <strong>价格对比感受</strong><br>以前用免费 Token，100 万很快就用完还限速。现在用 DeepSeek，同样价格可以买到几百倍的 Token 量，再也不用小心翼翼地"省着用"了。这才是 Agent 能够真正跑起来的基础设施。</blockquote>
<h2>🌐 六、实战体验：从零搭建个人网站</h2>
<p>就我个人体验而言，OpenClaw 最直观的价值就是——<strong>打破知识壁垒</strong>。</p><p>我对网站搭建一窍不通。DNS 解析、前端代码、GitHub 部署、Cloudflare 配置……这些名词对我来说就像外星语言。但有了 OpenClaw，我只需要告诉它"我需要搭建一个个人网站"，它就会帮我处理几乎所有事情：</p>
<ul><li><strong>需求沟通</strong> — 告诉 OpenClaw 我想要什么样的网站，包括页面设计和功能需求</li>
<li><strong>前端开发</strong> — 自动生成 HTML/CSS/JS 代码，包括 3D 樱花浮岛、粒子效果等复杂交互</li>
<li><strong>DNS 配置</strong> — 帮我解决域名解析和 Cloudflare 上的 DNS 设置</li>
<li><strong>GitHub 部署</strong> — 通过 GitHub 仓库直接上传代码，配置 Cloudflare Pages 自动部署</li>
<li><strong>上线运行</strong> — 网站成功上线，包括个人介绍站和博客站</li></ul>
<p><img src="/images/openclaw-usage.png" alt="OpenClaw 实际使用截图" loading="lazy"></p><p><img src="/images/cloudflare-dashboard.png" alt="Cloudflare 配置截图" loading="lazy"></p><p><img src="/images/github-projects.png" alt="GitHub 项目截图" loading="lazy"></p><p>全程我只需要少量基础知识。页面设计、代码编写、文件上传，OpenClaw 都能很好地完成。虽然有时结果不够完美需要精雕细琢，但<strong>三四天时间就可以完成网站的搭建、运行和各种配置</strong>。对于一个普通人而言，这在以前是无法想象的。</p>
<h2>📊 七、客观评价：打破知识壁垒的利器</h2>
<p>使用 OpenClaw 期间，我查看了它的使用数据：</p><p><img src="/images/openclaw-stats.png" alt="OpenClaw 使用统计" loading="lazy"></p>
<ul><li><strong>317</strong> 条消息总数</li>
<li><strong>14.1M</strong> Token 消耗</li>
<li><strong>202</strong> 次工具调用</li>
<li><strong>97.6%</strong> 缓存命中率</li></ul>
<p>这些数据背后，是我从一个完全不懂网站搭建的小白，到拥有两个运行中网站的过程。OpenClaw 调用了 140 次 <code>exec</code>（命令执行）、38 次 <code>process</code>（进程管理）、7 次 <code>write</code>（文件写入）和 7 次 <code>edit</code>（文件编辑）——这些原本需要手动完成的操作，全部由 AI Agent 自动执行了。</p>
<blockquote>大模型加持下的全自动工程，最主要的优点是可以<strong>打破知识壁垒，加速普通人对于新事物的学习和使用</strong>。你不需要成为程序员才能搭建网站，不需要成为设计师才能做出漂亮的页面。AI Agent 让"想法"到"实现"之间的距离，缩短到了前所未有的程度。</blockquote>
<h2>🤔 八、大模型的问题与冲击</h2>
<p>但每一次技术革命都伴随着阵痛。大模型的到来，我想百分之八十的人都没有做好准备。</p>
<h3>劳动方式的转变：从打工人到审核员</h3>
<p>搭建网站这几天，我的工作模式变成了：把需求告诉 OpenClaw → 喝着水刷着抖音等待 → 检查结果 → 提出修改意见 → 再次等待。这种模式更像是从<strong>"打工人"</strong>变成了<strong>"审核员"</strong>。AI 的工作效率毋庸置疑——一个 AI 加一个人，就能做一个团队的活。</p>
<blockquote>🔴 <strong>不可避免的冲击</strong><br>设计、编程、内容创作等职业会面临巨大市场冲击。尤其是以机械重复为主的工作岗位，会被 AI 优先替代。这不是危言耸听，而是正在发生的现实。</blockquote>
<h3>大模型能替代人类吗？</h3>
<p>我的答案是：<strong>部分能，但不能全部</strong>。大模型终究是按部就班的机器，程序是死的。就算学习能力再强，它也无法承担责任。因此，<strong>越依赖经验、越需要承担责任的行业，被替代率越低</strong>。</p><p><div class="table-wrap"></p>
<table>
<thead>
<tr><th>类别</th><th>被替代风险</th><th>原因</th></tr>
</thead>
<tbody>
<tr><td>机械重复型工作</td><td>极高</td><td>AI 擅长模式化和标准化任务</td></tr>
<tr><td>设计 / 编程 / 内容创作</td><td>较高</td><td>AI 效率远超个人，但顶级创意仍需人类</td></tr>
<tr><td>需要承担责任的工作</td><td>较低</td><td>法律、医疗决策等需要人类担责</td></tr>
<tr><td>依赖深度经验的工作</td><td>很低</td><td>复杂判断和人际互动难以被替代</td></tr>
</tbody>
</table>
<p></div>### 失业问题的本质</p><p>未来的 AI 是"提出建议和执行建议的行为人"，而我们则是"审核员"和"监督员"。很多岗位会被替代，失业人口会增加，生产力会极速提高。但我认为，失业的主要原因<strong>不是大模型在代替人类</strong>，而是<strong>生产力和需求的长期不平衡</strong>——需求少于生产力引起的结构性失业。</p>
<blockquote>解决 AI 和人类就业问题的最主要方式，不是阻止 AI 发展，而是<strong>增加需求、扩大消费</strong>，确保经济可以内外循环，让经济具备弹性。当生产力极大提升时，我们需要新的需求增长点来吸纳这些生产力。</blockquote>
<p>不过这个问题在最近一段时间不必过度关心。目前的需求和算力资源都是富余的，大模型也没有大规模入场，对于普通生产生活还需要一段适配期。</p>
<hr>
<h2>🌟 九、写在最后：未来已来</h2>
<p>回顾使用 OpenClaw 的这段经历，从第一次满怀期待却铩羽而归，到如今的得心应手，我深刻感受到了 AI 技术的飞速进步。以前搭建网站需要学习 HTML、CSS、JavaScript，需要了解服务器配置、域名解析、DNS 设置……现在，你只需要会"说话"就行。</p><p>未来已来，大模型必将成为生产发展中不可或缺的力量。与其恐惧被替代，不如学会与 AI 协作，成为那个"审核员"和"监督员"。毕竟，<strong>淘汰你的不是 AI，而是会用 AI 的人</strong>。</p>
<blockquote>💡 <strong>写在最后的话</strong><br>这篇文章本身就是我用 OpenClaw 辅助完成的。从内容梳理到排版优化，AI 帮了我很多忙。但最终的观点、感受和判断，都是我自己的。这或许就是未来人机协作的最佳模式——AI 负责执行，人类负责思考和决策。</blockquote>`,image:"",audio:""},

// ===== ARTICLES_END =====

// 按日期倒序排列（最新在最上面）
articles.sort((a,b) => new Date(b.date) - new Date(a.date));

// ===== 评论系统（Cloudflare KV + 管理员） =====
const API_BASE = '/api/comments';

// 用文章标题生成固定 slug
function artSlug(a) {
  return a.title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g,'-').replace(/^-|-$/g,'') || 'post-'+a.id;
}

// 缓存评论（异步加载）
let _cmtCache = {};

async function loadComments(a) {
  const slug = artSlug(a);
  if (_cmtCache[slug]) return _cmtCache[slug];
  try {
    const r = await fetch(API_BASE + '?slug=' + encodeURIComponent(slug));
    const d = await r.json();
    _cmtCache[slug] = d.comments || [];
    return _cmtCache[slug];
  } catch(e) {
    return [];
  }
}

async function totalComments() {
  let n = 0;
  for (const a of articles) {
    n += (await loadComments(a)).length;
  }
  return n;
}

// 管理员状态
let _isAdmin = sessionStorage.getItem('cmt_admin') === '1';

async function checkAdmin() {
  return _isAdmin;
}

async function showAdminLogin() {
  const pw = prompt('请输入管理员密码：');
  if (!pw) return;
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_action: 'verify', password: pw}),
    });
    const d = await r.json();
    if (d.ok) {
      _isAdmin = true;
      sessionStorage.setItem('cmt_admin', '1');
      await loadDeletedArticles();
      if (curArt) showDetail(curArt.id, true);
      alert('✅ 管理员登录成功');
    } else {
      alert('❌ 密码错误');
    }
  } catch(e) {
    alert('❌ 验证失败');
  }
}

function adminLogout() {
  _isAdmin = false;
  _deletedArticles = [];
  sessionStorage.removeItem('cmt_admin');
  showHome();
}

async function postComment(a) {
  const text = document.getElementById('cmtText').value.trim();
  const name = document.getElementById('cmtName').value.trim() || '匿名';
  if (!text) return;
  localStorage.setItem('cmt_name', name);
  const slug = artSlug(a);
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({slug, name, content: text}),
    });
    const d = await r.json();
    if (d.ok) {
      // 清除缓存，重新加载
      delete _cmtCache[slug];
      document.getElementById('cmtText').value = '';
      await renderDetailComments(a);
    } else {
      alert('发表失败：' + (d.error || '未知错误'));
    }
  } catch(e) {
    alert('网络错误，请稍后重试');
  }
}

async function deleteComment(a, cid) {
  if (!_isAdmin) { alert('请先登录管理员'); return; }
  const slug = artSlug(a);
  const r = await fetch(API_BASE, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({_action: 'delete', slug, id: cid, password: 'wyd73199254110'}),
  });
  const d = await r.json();
  if (d.ok) {
    delete _cmtCache[slug];
    await renderDetailComments(a);
  } else {
    alert('删除失败：' + (d.error || '未知错误'));
  }
}

// ===== 状态 =====
let curArt=null,isDark=true;

// ===== Init =====
document.addEventListener('DOMContentLoaded',async ()=>{
  history.scrollRestoration='manual';window.scrollTo(0,0);
  renderCards();updateStats();initScroll();initQuote();initUptime();initArchives();
  if (_isAdmin) await loadDeletedArticles();
  await loadPinned();
});

// ===== Render Cards =====
const PER_PAGE=30;let curPage=1;
function renderCards(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const mf=window._monthFilter;
  const list=articles.filter(a=>{
    if (isArticleDeleted(a)) return false;
    const monthOk=!mf||a.date.startsWith(mf);
    const sOk=!q||a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)||a.content.toLowerCase().includes(q);
    return monthOk&&sOk;
  });
  const pinned=list.filter(a=>_pinnedArticles.includes(a.title));
  const regular=list.filter(a=>!_pinnedArticles.includes(a.title));
  const totalPages=Math.ceil(regular.length/PER_PAGE)||1;
  if(curPage>totalPages)curPage=totalPages;
  const paged=regular.slice((curPage-1)*PER_PAGE,curPage*PER_PAGE);
  const el=document.getElementById('cards');
  var html='';
  // 置顶文章区
  if(pinned.length>0){
    html+='<div style=\"font-size:.78rem;color:var(--ac);margin-bottom:.4rem;letter-spacing:.05em\">📌 置顶</div>';
    html+=pinned.map((a,i)=>{
      const cmts=_cmtCountCache[a.title]||0;
      return '<div class=\"card pinned\" onclick=\"showDetail('+a.id+')\" style=\"animation-delay:'+(i*60)+'ms;border-color:var(--ac3);background:var(--ac2)\">\n      <div class=\"card-top\">\n        <div class=\"card-title\">📌 '+a.title+'</div>\n        <div class=\"card-date\">📅 '+a.date+'</div>\n      </div>\n      <div class=\"card-summary\">'+a.summary+'</div>\n      <div class=\"card-bottom\">\n        '+a.tags.map(function(t){return '<span class=\"card-tag\">'+t+'</span>'}).join('')+'\n        <span class=\"card-comments\">💬 '+cmts+'</span>\n      </div>\n    </div>';
    }).join('');
  }
  html+=paged.map((a,i)=>{
    const cmts=_cmtCountCache[a.title]||0;
    return `<div class="card" onclick="showDetail(${a.id})" style="animation-delay:${i*60}ms">
      <div class="card-top">
        <div class="card-title">${a.title}</div>
        <div class="card-date">📅 ${a.date}</div>
      </div>
      <div class="card-summary">${a.summary}</div>
      <div class="card-bottom">
        ${a.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}
        <span class="card-comments">💬 ${cmts}</span>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=html;
  // Pagination
  let pag='';
  if(totalPages>1){
    pag='<div style="display:flex;justify-content:center;gap:.5rem;margin-top:1.5rem;flex-wrap:wrap">';
    if(curPage>1)pag+=`<button onclick="goPage(${curPage-1})" class="tag-btn">← 上一页</button>`;
    for(let p=1;p<=totalPages;p++){
      pag+=`<button onclick="goPage(${p})" class="tag-btn${p===curPage?' active':''}">${p}</button>`;
    }
    if(curPage<totalPages)pag+=`<button onclick="goPage(${curPage+1})" class="tag-btn">下一页 →</button>`;
    pag+='</div>';
  }
  el.innerHTML+=pag;
  requestAnimationFrame(()=>el.querySelectorAll('.card').forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),i*60)));
  // Side recent
  document.getElementById('sideRecent').innerHTML=articles.slice(0,4).map(a=>`<div style="font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--tx2)" onclick="showDetail(${a.id})">${a.title}</div>`).join('');
}
function goPage(p){curPage=p;renderCards();window.scrollTo({top:0,behavior:'smooth'})}

// ===== Detail =====
function showDetail(id,noPush){
  const a=articles.find(x=>x.id===id);if(!a)return;curArt=a;
  document.getElementById('homeView').style.display='none';
  const d=document.getElementById('detailView');
  d.className='detail active';
  const adminBtn = _isAdmin
    ? '<span style="font-size:.72rem;color:var(--ac);cursor:pointer;margin-left:auto" onclick="adminLogout()">退出管理</span>'
    : '<span style="font-size:.72rem;color:var(--tx3);cursor:pointer;margin-left:auto" onclick="showAdminLogin()">🔑 管理</span>';
  d.innerHTML=`
    <div class="back-btn" onclick="showHome()">← 返回</div>
    <div class="d-meta">
      <h1>${a.title}</h1>
      <div class="d-info"><span>📅 ${a.date}</span><span>🏷️ ${a.tags.join(', ')}</span><span>💬 <span id="cmtCountLabel">...</span> 条评论</span>${adminBtn}</div>
      ${_isAdmin ? `<div style="margin-top:.6rem;display:flex;gap:.5rem"><span style="font-size:.75rem;color:#ffd700;cursor:pointer;border:1px solid #ffd700;border-radius:6px;padding:.2rem .6rem" onclick="togglePin(curArt)">📌 置顶</span><span style="font-size:.75rem;color:#f44;cursor:pointer;border:1px solid #f44;border-radius:6px;padding:.2rem .6rem" onclick="deleteArticle(curArt)">🗑️ 删除本文</span><span style="font-size:.75rem;color:var(--tx3);cursor:pointer;border:1px solid var(--bdr);border-radius:6px;padding:.2rem .6rem" onclick="showDeletedArticles()">📂 管理已删文章</span></div>` : ''}
    </div>
    <div class="d-content" id="dContent">${a.content}</div>
    <div class="comments">
      <h3>💬 评论 (<span id="cmtCountTitle">...</span>)</h3>
      <div class="comment-form">
        <textarea id="cmtText" placeholder="写下你的评论..."></textarea>
        <div class="row">
          <input id="cmtName" placeholder="你的名字" value="${localStorage.getItem('cmt_name')||''}">
          <button onclick="postComment(curArt)">发表</button>
        </div>
      </div>
      <div class="cmt-list" id="cmtList">加载中...</div>
    </div>`;
  // 异步加载评论
  renderDetailComments(a).then(() => {});
  // Code copy
  d.querySelectorAll('pre').forEach(pre=>{
    const w=document.createElement('div');w.className='code-wrap';w.style.position='relative';
    pre.parentNode.insertBefore(w,pre);w.appendChild(pre);
    const b=document.createElement('button');b.className='copy-btn';b.textContent='复制';
    b.onclick=e=>{e.stopPropagation();navigator.clipboard.writeText(pre.textContent).then(()=>{b.textContent='✓';setTimeout(()=>b.textContent='复制',1200)})};
    w.appendChild(b);
  });
  d.querySelectorAll('.d-content img').forEach(img=>{img.style.cursor='zoom-in';img.onclick=()=>openLB(img.src)});
  // Audio: only one song at a time
  d.querySelectorAll('.d-content audio').forEach(audio=>{audio.addEventListener('play',function(){d.querySelectorAll('.d-content audio').forEach(other=>{if(other!==this)other.pause()})})});
  buildTOC();
  scrollTo({top:0,behavior:'smooth'});
  // 重新执行文章内的 <script> 标签（innerHTML 不会自动执行）
  d.querySelectorAll('script').forEach(function(s){
    var ns=document.createElement('script');
    if(s.src)ns.src=s.src;
    else ns.textContent=s.textContent;
    s.parentNode.replaceChild(ns,s);
  });
  if(!noPush) history.pushState({id:id},'',location.pathname+'#/post/'+id);
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ===== 文章管理（管理员） =====
let _deletedArticles = [];
let _pinnedArticles = [];

async function loadPinned() {
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_action: 'get_pinned'}),
    });
    const d = await r.json();
    if (d.ok) _pinnedArticles = d.pinned || [];
  } catch(e) {}
  renderCards();
}

async function togglePin(a) {
  if (!_isAdmin) return;
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_action: 'toggle_pin', title: a.title, password: 'wyd73199254110'}),
    });
    const d = await r.json();
    if (d.ok) {
      _pinnedArticles = d.pinned || [];
      renderCards();
      if (curArt) showDetail(curArt.id, true);
      alert(_pinnedArticles.includes(a.title) ? '✅ 已置顶' : '✅ 已取消置顶');
    }
  } catch(e) {
    alert('操作失败');
  }
}

async function loadDeletedArticles() {
  if (!_isAdmin) return;
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_action: 'get_deleted', password: 'wyd73199254110'}),
    });
    const d = await r.json();
    if (d.ok) _deletedArticles = d.deleted || [];
  } catch(e) {}
  renderCards();
}

async function deleteArticle(a) {
  if (!_isAdmin || !confirm('确定要删除「' + a.title + '」吗？删除后可从"管理已删"恢复。')) return;
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_action: 'delete_article', title: a.title, password: 'wyd73199254110'}),
    });
    const d = await r.json();
    if (d.ok) {
      _deletedArticles.push(a.title);
      showHome();
    } else {
      alert('删除失败：' + (d.error || '未知错误'));
    }
  } catch(e) {
    alert('网络错误');
  }
}

async function restoreArticle(title) {
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_action: 'restore_article', title, password: 'wyd73199254110'}),
    });
    const d = await r.json();
    if (d.ok) {
      _deletedArticles = _deletedArticles.filter(t => t !== title);
      showHome();
    } else {
      alert('恢复失败');
    }
  } catch(e) {
    alert('网络错误');
  }
}

function isArticleDeleted(a) {
  return _deletedArticles.includes(a.title);
}

function showDeletedArticles() {
  if (!_isAdmin) return;
  const deleted = articles.filter(a => isArticleDeleted(a));
  if (deleted.length === 0) {
    alert('没有已删除的文章');
    return;
  }
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('detailView').className = 'detail';
  document.getElementById('toc').innerHTML = '';
  const el = document.getElementById('cards');
  el.innerHTML = '<div style="margin-bottom:.8rem;font-size:.82rem;color:var(--tx2)">📂 已删除文章（点击恢复）</div>' +
    deleted.map((a,i) => `<div class="card" onclick="restoreArticle('${esc(a.title)}')" style="animation-delay:${i*60}ms;border-color:#f44">
      <div class="card-top">
        <div class="card-title">${a.title}</div>
        <div class="card-date">📅 ${a.date}</div>
      </div>
      <div class="card-summary" style="color:var(--tx3)">${a.summary}</div>
      <div class="card-bottom"><span style="font-size:.68rem;color:#f44">已删除 — 点击恢复</span></div>
    </div>`).join('') +
    '<div style="margin-top:1rem"><span style="font-size:.82rem;color:var(--ac);cursor:pointer" onclick="showHome()">← 返回文章列表</span></div>';
  requestAnimationFrame(() => el.querySelectorAll('.card').forEach((c,i) => setTimeout(() => c.classList.add('visible'), i*60)));
  curArt = null;
  history.pushState({id:null}, '', location.pathname + '#/');
}

function showHome(noPush){
  curArt=null;
  document.getElementById('homeView').style.display='block';
  document.getElementById('detailView').className='detail';
  document.getElementById('toc').innerHTML='';
  renderCards();
  if(!noPush) history.pushState({id:null},'',location.pathname+'#/');
}

// ===== TOC =====
function buildTOC(){
  const c=document.getElementById('dContent');const t=document.getElementById('toc');
  const hs=c.querySelectorAll('h2,h3');if(hs.length<2){t.innerHTML='';return}
  t.innerHTML='<div style="font-weight:600;margin-bottom:.4rem;color:var(--tx);font-size:.8rem">目录</div>'+
    [...hs].map((h,i)=>{h.id='h'+i;return`<a class="${h.tagName==='H3'?'h3':''}" href="#h${i}" onclick="event.preventDefault();document.getElementById('h${i}').scrollIntoView({behavior:'smooth',block:'start'})">${h.textContent}</a>`}).join('');
  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){t.querySelectorAll('a').forEach(a=>a.classList.remove('active'));const l=t.querySelector(`a[href="#${e.target.id}"]`);if(l)l.classList.add('active')}}),{rootMargin:'-20% 0px -70% 0px'});
  hs.forEach(h=>obs.observe(h));
}

// ===== Search =====
function toggleSearch(){document.getElementById('searchWrap').classList.toggle('active');if(document.getElementById('searchWrap').classList.contains('active'))document.getElementById('searchInput').focus()}
function toggleSide(){document.getElementById('side').classList.toggle('open');document.getElementById('sideMask').classList.toggle('on')}

// ===== Theme =====
function toggleTheme(){
  isDark=!isDark;
  const s=document.documentElement.style;
  s.setProperty('--bg',isDark?'#0a0a0f':'#f5f5f5');
  s.setProperty('--bg2',isDark?'#12121a':'#fff');
  s.setProperty('--bg3',isDark?'#1a1a25':'#f0f0f0');
  s.setProperty('--bg4',isDark?'#222230':'#e0e0e0');
  s.setProperty('--bdr',isDark?'#2a2a3a':'#ddd');
  s.setProperty('--bdr2',isDark?'#3a3a50':'#ccc');
  s.setProperty('--tx',isDark?'#eee':'#1a1a1a');
  s.setProperty('--tx2',isDark?'#aaa':'#555');
  s.setProperty('--tx3',isDark?'#666':'#999');
  document.querySelector('.nav-r button:last-child').textContent=isDark?'🌙':'☀️';
}

// ===== Stats =====
// 异步更新评论数缓存
let _cmtCountCache = {};

async function updateStats(){
  document.getElementById('statPosts').textContent=articles.length;
  const tags=new Set();articles.forEach(a=>a.tags.forEach(t=>tags.add(t)));
  document.getElementById('statTags').textContent=tags.size;
  let total = 0;
  for (const a of articles) {
    const cmts = await loadComments(a);
    _cmtCountCache[a.title] = cmts.length;
    total += cmts.length;
  }
  document.getElementById('statComments').textContent = total;
  renderCards();
}

// ===== 站点运行时间 =====
const SITE_START=new Date('2026-05-15');
function initUptime(){
  function update(){
    const now=new Date();
    const diff=now-SITE_START;
    const days=Math.floor(diff/(1000*60*60*24));
    const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const mins=Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById('sideUptime').innerHTML=`<span style="color:var(--ac)">●</span> 已运行 <b>${days}</b> 天 <b>${hours}</b> 时 <b>${mins}</b> 分`;
  }
  update();setInterval(update,60000);
}

// ===== 文章归档 =====
let curArchiveYear=null,curArchiveMonth=null;
function initArchives(){
  const years={};
  articles.forEach(a=>{
    const y=a.date.substring(0,4);
    const m=a.date.substring(0,7);
    if(!years[y])years[y]={};
    if(!years[y][m])years[y][m]=0;
    years[y][m]++;
  });
  const sorted=Object.keys(years).sort().reverse();
  renderArchives(sorted,years);
}
function renderArchives(sorted,years){
  const el=document.getElementById('sideArchives');
  if(!curArchiveYear){
    // Show years
    el.innerHTML=sorted.map(y=>{
      const count=Object.values(years[y]).reduce((a,b)=>a+b,0);
      return `<div style="display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--tx2)" onclick="pickYear('${y}')"><span>📁 ${y} 年</span><span style="color:var(--tx3)">${count} 篇 ▸</span></div>`;
    }).join('');
  } else {
    // Show months for selected year
    const months=years[curArchiveYear];
    const sortedM=Object.keys(months).sort().reverse();
    let html=`<div style="font-size:.78rem;color:var(--tx3);padding:.3rem 0;cursor:pointer;margin-bottom:.3rem" onclick="pickYear(null)">← 返回全部年份</div>`;
    html+=`<div style="font-size:.82rem;font-weight:600;color:var(--ac);padding:.3rem 0;border-bottom:1px solid var(--bdr);margin-bottom:.3rem">${curArchiveYear} 年</div>`;
    html+=sortedM.map(m=>{
      const mo=parseInt(m.split('-')[1]);
      const active=curArchiveMonth===m;
      return `<div style="display:flex;justify-content:space-between;font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:${active?'var(--ac)':'var(--tx2)'};font-weight:${active?'600':'400'}" onclick="pickMonth('${m}')"><span>${mo} 月</span><span style="color:var(--tx3)">${months[m]} 篇</span></div>`;
    }).join('');
    html+=`<div style="font-size:.78rem;color:var(--ac);padding:.4rem 0;cursor:pointer;text-align:center;margin-top:.3rem" onclick="pickMonth(null)">查看全部</div>`;
    el.innerHTML=html;
  }
}
function pickYear(y){
  curArchiveYear=y;curArchiveMonth=null;curPage=1;
  window._monthFilter=null;
  const years={};
  articles.forEach(a=>{
    const yr=a.date.substring(0,4);
    const m=a.date.substring(0,7);
    if(!years[yr])years[yr]={};
    if(!years[yr][m])years[yr][m]=0;
    years[yr][m]++;
  });
  renderArchives(Object.keys(years).sort().reverse(),years);
  renderCards();
}
function pickMonth(m){
  curArchiveMonth=m;curPage=1;
  window._monthFilter=m;
  const years={};
  articles.forEach(a=>{
    const yr=a.date.substring(0,4);
    const mo=a.date.substring(0,7);
    if(!years[yr])years[yr]={};
    if(!years[yr][mo])years[yr][mo]=0;
    years[yr][mo]++;
  });
  renderArchives(Object.keys(years).sort().reverse(),years);
  renderCards();
}

// ===== Lightbox =====
function openLB(s){document.getElementById('lbImg').src=s;document.getElementById('lb').classList.add('on')}

// ===== Scroll =====
function initScroll(){
  const nav=document.getElementById('nav'),prog=document.getElementById('progress'),bt=document.getElementById('btop');
  window.addEventListener('scroll',()=>{
    const y=scrollY;
    nav.classList.toggle('scrolled',y>10);
    const h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=h>0?(y/h*100)+'%':'0%';
    bt.classList.toggle('on',y>400);
  });
  window.addEventListener('popstate',e=>{
    if(e.state&&e.state.id)showDetail(e.state.id,true);
    else showHome(true);
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('lb').classList.contains('on'))document.getElementById('lb').classList.remove('on');else if(curArt)showHome()}});
}
