<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yadong's Blog</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#222230;
--bdr:#2a2a3a;--bdr2:#3a3a50;
--tx:#eee;--tx2:#aaa;--tx3:#666;
--ac:#00e89d;--ac2:rgba(0,232,157,.12);--ac3:rgba(0,232,157,.3);
--r:12px;--r2:8px;
--font:-apple-system,BlinkMacSystemFont,'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
--mono:'SF Mono','JetBrains Mono',Consolas,monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.7}
a{color:var(--ac);text-decoration:none}
a:hover{text-decoration:underline}

/* Progress */
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--ac),#7c6aef);z-index:1001;width:0;transition:width .1s}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,3vw,2rem);background:rgba(10,10,15,.5);backdrop-filter:blur(0);transition:all .3s;border-bottom:1px solid transparent}
.nav.scrolled{backdrop-filter:blur(20px);border-bottom-color:var(--bdr)}
.nav-logo{font-size:1rem;font-weight:700;color:var(--tx)}
.nav-r{display:flex;gap:1rem;align-items:center}
.nav-r button{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--tx2)}
.nav-r button:hover{color:var(--tx)}

/* Layout */
.layout{display:flex;max-width:1200px;margin:0 auto;padding:calc(52px + 2rem) clamp(1rem,3vw,2rem) 3rem;gap:2rem}
.main{flex:7;min-width:0}
.side{flex:3;min-width:260px;max-width:320px}

/* Sidebar */
.side-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;position:sticky;top:calc(52px + 1.5rem)}
.side-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#7c6aef);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto .8rem;box-shadow:0 0 30px var(--ac3)}
.side-name{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.side-bio{font-size:.82rem;color:var(--tx2);text-align:center;line-height:1.6;margin-bottom:1rem}
.side-stats{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.side-stat{background:var(--bg3);border-radius:var(--r2);padding:.6rem;text-align:center}
.side-stat-num{font-size:1.1rem;font-weight:700;color:var(--ac)}
.side-stat-lbl{font-size:.7rem;color:var(--tx3)}
.side-links{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.side-link{padding:.35rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr);transition:all .2s}
.side-link:hover{border-color:var(--ac);color:var(--ac);text-decoration:none}
.side-section{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.side-section h4{font-size:.8rem;color:var(--tx3);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.08em}
.side-tags{display:flex;gap:.3rem;flex-wrap:wrap}

/* Tags */
.tags-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.2rem}
.tag-btn{padding:.3rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tag-btn:hover,.tag-btn.active{background:var(--ac2);border-color:var(--ac);color:var(--ac)}

/* Search */
.search-wrap{display:none;margin-bottom:1rem}
.search-wrap.active{display:block}
.search-input{width:100%;padding:.65rem 1rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.88rem;font-family:var(--font);outline:none}
.search-input:focus{border-color:var(--ac)}
.search-input::placeholder{color:var(--tx3)}

/* Article Cards */
.articles{display:flex;flex-direction:column;gap:.8rem}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.1rem 1.3rem;cursor:pointer;transition:all .25s;opacity:0;transform:translateY(16px)}
.card.visible{opacity:1;transform:translateY(0)}
.card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.card-title{font-size:1rem;font-weight:600;flex:1}
.card-date{font-size:.72rem;color:var(--tx3);white-space:nowrap}
.card-summary{font-size:.85rem;color:var(--tx2);line-height:1.6;margin-bottom:.5rem}
.card-bottom{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.card-tag{font-size:.68rem;padding:.15rem .5rem;border-radius:999px;background:var(--ac2);color:var(--ac)}
.card-comments{font-size:.72rem;color:var(--tx3);margin-left:auto}

/* Detail */
.detail{display:none}
.detail.active{display:block}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--tx2);margin-bottom:1rem;cursor:pointer}
.back-btn:hover{color:var(--ac)}
.d-meta{margin-bottom:1.5rem}
.d-meta h1{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;margin-bottom:.4rem}
.d-meta .d-info{font-size:.8rem;color:var(--tx3);display:flex;gap:1rem;flex-wrap:wrap}
.d-content{font-size:.95rem;line-height:1.85;color:var(--tx)}
.d-content h2{font-size:1.3rem;font-weight:700;margin:1.8rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--bdr)}
.d-content h3{font-size:1.1rem;font-weight:600;margin:1.3rem 0 .5rem}
.d-content p{margin-bottom:.8rem}
.d-content pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:.8rem 1rem;overflow-x:auto;margin:1rem 0;position:relative}
.d-content code{font-family:var(--mono);font-size:.82rem}
.d-content :not(pre)>code{background:var(--bg3);padding:.12rem .35rem;border-radius:4px}
.d-content blockquote{border-left:3px solid var(--ac);padding:.6rem 1rem;margin:.8rem 0;background:var(--ac2);border-radius:0 var(--r2) var(--r2) 0;color:var(--tx2)}
.d-content img{max-width:100%;border-radius:var(--r2);cursor:zoom-in}
.d-content ul,.d-content ol{padding-left:1.3rem;margin-bottom:.8rem}
.d-content li{margin-bottom:.2rem}
.copy-btn{position:absolute;top:.4rem;right:.4rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:.2rem .5rem;font-size:.7rem;color:var(--tx2);cursor:pointer;font-family:var(--font)}
.copy-btn:hover{border-color:var(--ac);color:var(--ac)}

/* Comments */
.comments{margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--bdr)}
.comments h3{font-size:1rem;font-weight:600;margin-bottom:1rem}
.comment-form{margin-bottom:1.5rem}
.comment-form textarea{width:100%;min-height:80px;padding:.7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-family:var(--font);font-size:.88rem;resize:vertical;outline:none}
.comment-form textarea:focus{border-color:var(--ac)}
.comment-form .row{display:flex;gap:.5rem;margin-top:.5rem}
.comment-form input{flex:1;padding:.5rem .7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.82rem;font-family:var(--font);outline:none}
.comment-form input:focus{border-color:var(--ac)}
.comment-form button{padding:.5rem 1rem;background:var(--ac);color:#0a0a0f;border:none;border-radius:var(--r2);font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.comment-form button:hover{opacity:.9}
.cmt-list{display:flex;flex-direction:column;gap:.8rem}
.cmt{background:var(--bg3);border-radius:var(--r2);padding:.8rem 1rem}
.cmt-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.cmt-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:.7rem}
.cmt-name{font-size:.82rem;font-weight:600}
.cmt-time{font-size:.68rem;color:var(--tx3);margin-left:auto}
.cmt-text{font-size:.85rem;color:var(--tx2);line-height:1.6}
.cmt-delete{font-size:.68rem;color:var(--tx3);cursor:pointer;margin-left:.5rem}
.cmt-delete:hover{color:#f44}

/* TOC */
.toc{position:fixed;top:calc(52px + 2rem);right:clamp(1rem,2vw,2rem);width:180px;font-size:.75rem;display:none;z-index:100}
.detail.active~.toc{display:block}
.toc a{display:block;padding:.2rem 0;color:var(--tx3);transition:color .2s;line-height:1.4}
.toc a:hover,.toc a.active{color:var(--ac);text-decoration:none}
.toc .h3{padding-left:.8rem}
@media(max-width:1100px){.toc{display:none!important}}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lb.on{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:var(--r2)}

/* Back top */
#btop{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--ac);color:#0a0a0f;border:none;font-size:1rem;cursor:pointer;opacity:0;transition:all .3s;z-index:1000;display:flex;align-items:center;justify-content:center}
#btop.on{opacity:1}
#btop:hover{box-shadow:0 0 20px var(--ac3)}

/* Responsive */
@media(max-width:768px){
  .layout{flex-direction:column;padding-top:calc(52px + 1rem)}
  .side{max-width:100%;position:relative;top:0}
  .side-card{display:flex;flex-wrap:wrap;gap:1rem;align-items:center}
  .side-avatar{margin:0;width:50px;height:50px;font-size:1.4rem}
  .side-name,.side-bio,.side-stats,.side-links,.side-section{text-align:left}
  .side-stats{grid-template-columns:repeat(4,1fr)}
  .toc{display:none!important}
}
</style>
</head>
<body>

<div id="progress"></div>

<nav class="nav" id="nav">
  <a href="#" class="nav-logo" onclick="showHome();return false">📝 Yadong</a>
  <div class="nav-r">
    <button onclick="toggleSearch()" title="搜索">🔍</button>
    <button onclick="toggleTheme()" title="主题">🌙</button>
  </div>
</nav>

<div class="layout" id="layout">
  <!-- Main -->
  <div class="main" id="mainArea">
    <div id="homeView">
      <div class="search-wrap" id="searchWrap">
        <input class="search-input" id="searchInput" placeholder="搜索文章..." oninput="curPage=1;renderCards()">

    </div>
    <div class="detail" id="detailView"></div>
  </div>

  <!-- Sidebar -->
  <div class="side">
    <div class="side-card">
      <div class="side-avatar">🧑‍💻</div>
      <div class="side-name">Yadong</div>
      <div class="side-bio">写代码的，偶尔写点别的。<br>喜欢折腾，喜欢把想法变成现实。</div>
      <div class="side-stats">
        <div class="side-stat"><div class="side-stat-num" id="statPosts">0</div><div class="side-stat-lbl">文章</div></div>
        <div class="side-stat"><div class="side-stat-num" id="statTags">0</div><div class="side-stat-lbl">标签</div></div>
        <div class="side-stat"><div class="side-stat-num" id="statComments">0</div><div class="side-stat-lbl">评论</div></div>
        <div class="side-stat"><div class="side-stat-num">☕</div><div class="side-stat-lbl">续命中</div></div>
      </div>
      <div class="side-links">
        <a class="side-link" href="https://github.com/2326239842" target="_blank">🐙 GitHub</a>

        <h4>热门标签</h4>

      </div>
      <div class="side-section">
        <h4>最近文章</h4>
        <div id="sideRecent"></div>
      </div>
    </div>
  </div>
</div>

<div class="toc" id="toc"></div>
<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lbImg"></div>
<button id="btop" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>

{id:1,title:"OpenClaw 使用后感：从踩坑到真香",date:"2026-05-16",tags:["OpenClaw","AI Agent","技术"],summary:"从第一次满怀期待却铩羽而归，到如今将它作为日常生产力工具的真实体验。",content:`<p><br><blockquote>如果说 2024 年是 AI 大模型的元年，那么 2026 年就是 AI Agent 真正走入普通人生活的拐点。作为一名技术小白，我想聊聊我与 OpenClaw 的故事——从第一次满怀期待却铩羽而归，到如今将它作为日常生产力工具的真实体验。</blockquote><h2>🚀 一、初识 OpenClaw：满怀期待的第一次</h2><p>时间回到去年，OpenClaw 刚刚发布的时候，我在社交平台上刷到了它的介绍——一个可以完全自主执行任务的 AI Agent，能写代码、管理文件、操作浏览器……这些描述对于一个对技术充满好奇但又毫无基础的人来说，简直是致命的吸引力。</p><p>我第一时间就去下载了。然而，现实很快给了我当头一棒。</p><p>⚠️ 当时的困境<br>安装教程寥寥无几，而且 OpenClaw 优先适配的是 macOS 和 Linux 系统。作为一个 Windows 用户，我几乎找不到针对自己系统的详细指引。网上的教程大多一笔带过，仿佛 Windows 用户不配使用一样。</p><h2>🔧 二、Windows 上的艰难安装之路</h2><p>第一次安装的时候，我连命令行都输错了——是的，作为一个纯小白，我对终端的认知还停留在电影里黑客敲键盘的画面。通读文档之后我才明白，在 Windows 上使用 OpenClaw，需要先安装两个关键依赖：</p><p>Node.js<br>JavaScript 运行时环境<br>OpenClaw 的核心依赖</p><p>Git<br>版本控制系统<br>用于拉取和更新代码</p><p>Node.js 是 OpenClaw 运行的核心环境，而 Git 则是版本控制工具，两者缺一不可。安装好这两个依赖之后，还需要在 PowerShell 中解除脚本执行限制：</p><p>\\<code>\\</code>\\<code>powershell<br>Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser<br>\\</code>\\<code>\\</code></p><p>然后运行一键安装脚本：</p><p>\\<code>\\</code>\\<code>powershell<br>iwr -useb https://openclaw.ai/install.ps1 | iex<br>\\</code>\\<code>\\</code></p><p>当终端里终于出现安装成功的提示时，我几乎要从椅子上跳起来。但兴奋还没持续多久，新的问题就来了——</p><p>🚫 初始化配置缺失<br>安装完成后，并没有出现教程里提到的初始化配置向导。后来我才了解到，这是因为 Windows 的适配问题，需要手动启动 Gateway 服务后才能进行配置。</p><h2>⚙️ 三、第一次配置：手忙脚乱中摸索</h2><p>找到更详细的教程后，我按照步骤依次执行了以下命令：</p><p>\\<code>\\</code>\\<code>bash<br><h1>1. 先运行健康检查（推荐第一步执行）</h1><br>openclaw doctor</p><h1>2. 启动 Gateway 网关服务</h1><br>openclaw gateway start</p><h1>3. 执行初始化配置</h1><br>openclaw onboard<br>\\</code>\\<code>\\</code></p><p>第一步：openclaw doctor<br>第一次运行时甚至报错说没有安装相关服务组件。Windows 的兼容性问题开始显现——很多在 macOS 和 Linux 上默认就有的东西，在 Windows 上需要手动处理。</p><p>第二步：openclaw gateway start<br>成功启动了 Gateway 服务。这个服务是 OpenClaw 的核心运行时，相当于控制入口和路由层，所有的会话、渠道和工具都通过它来连接。</p><p>第三步：openclaw onboard<br>终于进入了配置向导！第一次配置时很多地方都出错了，不过好在后来在网上找到了详细的教学视频，跟着一步步操作，最终顺利完成了配置。</p><p>第一次使用时，我没有配置付费 API，而是选择了阿里云百炼平台的免费 Token。每个模型赠送了 100 万 Token 的免费额度，对于初次体验来说足够了。</p><p><img src="/images/aliyun-bailian.png" alt="阿里云百炼大模型平台" loading="lazy">><br>🖼️ 阿里云百炼大模型平台 —— 提供 155 个模型的免费额度，每个模型 100 万 Token</p><p>💡 浏览器界面打不开？<br>当我选择使用 UI（浏览器界面）时，页面显示"无法连接"。排查了很久才发现——我把 <code>openclaw gateway start</code> 的服务窗口给关了！Gateway 服务必须保持运行状态，浏览器界面才能正常访问。这个低级错误让我哭笑不得。</p><h2>💸 四、免费 Token 的甜蜜与苦涩</h2><p>配置完成后，我迫不及待地开始体验。让 OpenClaw 整理文件、从网上爬取图片（效果嘛……全是免费小图片，质量一般），但确实挺方便的。</p><p>然而甜蜜期很快就结束了——免费模型的 Token 开始限速了。每分钟只能处理很少的请求，做稍微复杂一点的任务就要等很久。</p><p><img src="/images/xiaomi-mimo.png" alt="小米百亿Token计划" loading="lazy">><br>🖼️ 小米 MiMo 百亿 Token 计划 —— Standard 月度套餐提供 2 亿 Credits，支持 OpenClaw 等主流编程工具</p><p>我试着自己配置 Token，但作为第一次使用的纯小白，我连 Token 配置在哪里都不知道。好在阿里云平台给每个模型都提供了 100 万的免费额度，我就用免费额度让 OpenClaw 自己帮我配置 Token——没错，用 AI 来配置 AI，这操作我自己都觉得离谱。</p><p>坏处也很明显：每个模型只有 100 万 Token，很快就用完了。这点额度只够聊聊天、做做简单任务，完全无法支撑长任务的执行。于是，第一次的 OpenClaw 体验就这样不了了之，我最终选择了卸载。</p><p>🌊</p><h2>🔄 五、再次归来：大模型时代的必然选择</h2><p>第二次开始使用 OpenClaw 是最近这段时间。短短一年间，AI 的发展速度远超我的想象。</p><p>之前最大的痛点是<strong>AI 模型不够聪明</strong>和<strong>上下文对话量不够</strong>。但如今，新一代大模型已经彻底改变了这个局面：</p><p>模型<br>厂商<br>核心优势</p><p><strong>GPT-5.5</strong><br>OpenAI<br>综合能力之王，逻辑推理全面领先</p><p><strong>Claude Opus 4.6</strong><br>Anthropic<br>代码工程能力 SWE-bench 80.8%</p><p><strong>Gemini 3.1 Pro</strong><br>Google<br>多模态与搜索整合，长上下文处理</p><p><strong>DeepSeek V4</strong><br>深度求索<br>国产性价比之王，百万 Token 仅 0.02 元</p><p><strong>Grok 4</strong><br>xAI<br>实时信息获取与联网能力</p><p><strong>通义千问 Qwen3</strong><br>阿里云<br>中文理解能力出色，生态完善</p><p><strong>MiMo V2.5</strong><br>小米<br>高性价比 Token Plan，编程助手友好</p><p>尤其是 <strong>DeepSeek</strong>，它的定价策略堪称"价格屠夫"——V4-Flash 版本缓存命中场景下，百万 Token 低至 <strong>0.02 元</strong>，一亿 Token 才两块钱左右。这种极致性价比，完美适配了 AI Agent 的发展需求。</p><p>✅ 价格对比感受<br>以前用免费 Token，100 万很快就用完了，而且还会限速。现在用 DeepSeek，同样的价格可以买到几百倍的 Token 量，再也不用小心翼翼地"省着用"了。这才是 Agent 能够真正跑起来的基础设施。</p><h2>🌐 六、实战体验：从零搭建个人网站</h2><p>就我个人使用 OpenClaw 的体验而言，最直观的感受就是——<strong>它真的能打破知识壁垒</strong>。</p><p>比如我对于网站搭建是一窍不通的。DNS 解析、前端代码、GitHub 部署、Cloudflare 配置……这些名词对我来说就像是外星语言。但是有了 OpenClaw，我只需要告诉它"我需要搭建一个个人网站"，它就会帮我处理几乎所有的事情：</p><p>📋 需求沟通<br>告诉 OpenClaw 我想要一个什么样的网站，包括页面设计、功能需求等</p><p>🎨 前端开发<br>OpenClaw 自动生成 HTML/CSS/JavaScript 代码，包括 3D 樱花浮岛、粒子效果等复杂交互</p><p>🌐 DNS 配置<br>帮我解决域名解析和 Cloudflare 上的 DNS 设置</p><p>🚀 GitHub 部署<br>通过 GitHub 仓库直接上传代码，配置 Cloudflare Pages 自动部署</p><p>✅ 上线运行<br>网站成功上线，包括个人介绍站和博客站</p><p><img src="/images/openclaw-usage.png" alt="OpenClaw 实际使用截图" loading="lazy">><br>🖼️ OpenClaw 实际使用截图 —— 告诉它需求，它就帮你搞定一切，包括 3D 樱花浮岛、粒子花瓣飘落等复杂效果</p><p><img src="/images/cloudflare-dashboard.png" alt="Cloudflare 配置截图" loading="lazy">><br>🖼️ Cloudflare 控制台 —— 网站部署后的管理界面，可以看到域名、Workers 和流量数据</p><p><img src="/images/github-projects.png" alt="GitHub 项目截图" loading="lazy">><br>🖼️ GitHub 仓库 —— 通过 OpenClaw 直接管理代码仓库，实现网站的版本控制和部署</p><p>全程我只需要少量的知识基础就可以做到。很多东西——页面设计、代码编写、文件上传——OpenClaw 都可以很完美地实现。虽然有些时候结果不够完美，需要进行精雕细琢，但<strong>三四天时间就可以完成网站的搭建、运行和各种数据库配置</strong>。</p><p>对于一个普通人而言，这在以前是无法想象的。</p><h2>📊 七、客观评价：打破知识壁垒的利器</h2><p>使用 OpenClaw 期间，我查看了它的使用数据：</p><p><img src="/images/openclaw-stats.png" alt="OpenClaw 使用统计" loading="lazy">><br>🖼️ OpenClaw 使用统计 —— 317 条消息，14.1M Token 消耗，202 次工具调用，缓存命中率 97.6%</p><p>317<br>消息总数</p><p>14.1M<br>Token 消耗</p><p>202<br>工具调用次数</p><p>97.6%<br>缓存命中率</p><p>这些数据背后，是我从一个完全不懂网站搭建的小白，到拥有两个运行中的网站的过程。OpenClaw 调用了 140 次 <code>exec</code>（命令执行）、38 次 <code>process</code>（进程管理）、7 次 <code>write</code>（文件写入）和 7 次 <code>edit</code>（文件编辑）——这些原本需要我手动完成的操作，全部由 AI Agent 自动执行了。</p><p>大模型加持下的全自动工程，最主要的优点是可以<strong>打破知识壁垒，加速普通人对于新事物的学习和使用</strong>。你不需要成为程序员才能搭建网站，不需要成为设计师才能做出漂亮的页面。AI Agent 让"想法"到"实现"之间的距离，缩短到了前所未有的程度。</p><h2>🤔 八、大模型的问题与冲击</h2><p>但每一次技术革命都伴随着阵痛。大模型的到来，我想百分之八十的人都没有做好准备。</p><h3>劳动方式的转变：从打工人到审核员</h3><p>这几天搭建网站的过程中，我的工作模式变成了这样：把需求告诉 OpenClaw → 喝着水刷着抖音等待完成 → 检查结果 → 提出修改意见 → 再次等待。</p><p>这种劳动方式，更像是从一个<strong>"打工人"</strong>变成了一个<strong>"审核员"</strong>。AI 的工作效率毋庸置疑——一个 AI 加一个人，就能做一个团队的活。</p><p>🔴 不可避免的冲击<br>像设计、编程、内容创作等职业，绝对会面临巨大的市场冲击。尤其是那些以机械重复为主的工作岗位，会被 AI 优先替代。这不是危言耸听，而是正在发生的现实。</p><h3>大模型能替代人类吗？</h3><p>我的答案是：<strong>部分能，但不能全部</strong>。</p><p>大模型终究只是按部就班的机器，程序是死的。就算学习能力再强，它也无法承担责任。因此，<strong>越依赖经验、越需要承担责任的行业，被替代率越低</strong>。</p><p>类别<br>被替代风险<br>原因</p><p>机械重复型工作<br>极高 🔴<br>AI 擅长模式化和标准化任务</p><p>设计 / 编程 / 内容创作<br>较高 🟠<br>AI 效率远超个人，但顶级创意仍需人类</p><p>需要承担责任的工作<br>较低 🟢<br>法律、医疗决策等需要人类担责</p><p>依赖深度经验的工作<br>很低 🟢<br>复杂判断和人际互动难以被替代</p><h3>失业问题的本质</h3><p>未来的 AI 是"提出建议和执行建议的行为人"，而我们则是"审核员"和"对 AI 的监督员"。是的，很多岗位会被替代，失业人口会增加，生产力会极速提高。</p><p>但我认为，失业的主要原因<strong>不是大模型在代替人类</strong>，而是<strong>生产力和需求的长期不平衡</strong>——需求少于生产力引起的结构性失业。</p><p>解决 AI 和人类就业问题的最主要方式，不是阻止 AI 发展，而是<strong>增加需求、扩大消费</strong>，确保经济可以内外循环，让经济具备弹性。当生产力极大提升时，我们需要新的需求增长点来吸纳这些生产力。</p><p>不过这个问题在最近一段时间不必过度关心。目前的需求和算力资源都是富余的，大模型也没有大规模入场。大模型对于普通生产生活还需要一段时间的适配期。</p><p>✨</p><h2>🌟 九、写在最后：未来已来</h2><p>回顾我使用 OpenClaw 的这段经历，从第一次的满怀期待却铩羽而归，到如今的得心应手，我深刻感受到了 AI 技术的飞速进步。</p><p>以前，搭建一个网站需要学习 HTML、CSS、JavaScript，需要了解服务器配置、域名解析、DNS 设置……现在，你只需要会"说话"就行。</p><p>未来已来，大模型必将成为生产发展中不可或缺的力量。与其恐惧被替代，不如学会与 AI 协作，成为那个"审核员"和"监督员"。毕竟，<strong>淘汰你的不是 AI，而是会用 AI 的人</strong>。</p><p>💡 写在最后的话<br>这篇文章本身就是我用 OpenClaw 辅助完成的。从内容梳理到排版优化，AI 帮了我很多忙。但最终的观点、感受和判断，都是我自己的。这或许就是未来人机协作的最佳模式——AI 负责执行，人类负责思考和决策。</p><p>// 阅读进度条 + 回到顶部<br>(function(){<br>    var prog = document.getElementById('ocProgress');<br>    var btn = document.getElementById('ocTopBtn');<br>    if(!prog || !btn) return;<br>    window.addEventListener('scroll', function(){<br>        var st = document.documentElement.scrollTop || document.body.scrollTop;<br>        var sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;<br>        prog.style.width = (st/sh*100)+'%';<br>        if(st > 400) btn.classList.add('oc-show');<br>        else btn.classList.remove('oc-show');<br>    });<br>})();</p><p>// 滚动触发动画<br>(function(){<br>    var items = document.querySelectorAll('.oc-anim');<br>    if(!items.length) return;<br>    var obs = new IntersectionObserver(function(entries){<br>        entries.forEach(function(e){<br>            if(e.isIntersecting){<br>                e.target.classList.add('oc-visible');<br>                obs.unobserve(e.target);<br>            }<br>        });<br>    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });<br>    items.forEach(function(el){ obs.observe(el); });<br>})();<br></p>`,image:"",audio:""},
{id:2,title:"周末的一天",date:"2026-05-16",tags:["生活","随笔"],summary:"记录这个周末的点点滴滴，从早到晚的琐碎日常。",content:`<p><br><h2>清晨</h2><br>周末的早晨总是醒得比工作日早。拉开窗帘，阳光洒进来，又是新的一天。</p><h2>上午</h2><br>泡了一杯咖啡，打开电脑看了会代码。最近在研究 Three.js，想做个3D小岛的互动页面。</p><blockquote>好的工具能让生活更高效，所以总是在造轮子的路上。</blockquote><h2>下午</h2><br>出门走了走，春天的风很舒服。路过一家新开的咖啡店，装修很有格调。</p><h3>关于设计</h3><br>好的设计不是加法，而是减法。留白、节奏、层次，这些比花哨的效果更重要。</p><h2>晚上</h2><br>回来继续写博客系统。用纯 HTML + CSS + JS 搭了一个单文件博客，零依赖。</p><pre><code>const articles = [{ id: 1, title: "周末的一天" }];<br></code></pre><br>这就是我的周末，平淡但充实。<br></p>`,image:"",audio:""},
{id:3,title:"用 OpenClaw 搭建双站的一天",date:"2026-05-16",tags:["OpenClaw","Three.js","Cloudflare"],summary:"从零搭建个人介绍站和博客站，包含 3D 樱花浮岛、匿名评论系统的完整过程。",content:`<p><br><h2>今天做了什么</h2><br>一个下午 + 晚上，用 OpenClaw 从零搭建了两个网站。</p><h2>个人介绍站：3D 樱花浮岛</h2><br><ul><li>Three.js 低多边形浮岛- 点击树枝花瓣爆发 + 对白气泡- 月亮月相变化 + 音乐播放器- 深浅色模式 + 响应式适配</li></ul><br><h2>博客站：匿名评论系统</h2><br>使用 Cloudflare Workers + KV 自建评论系统，完全匿名，任何人可评论。</p><pre><code>// 评论 API\\nPOST /api/comments\\n{ slug, name, content }<br></code></pre><blockquote>这证明了一件事：有了 AI Agent，一个人也能做出看起来很专业的网站。</blockquote><br></p>`,image:"",audio:""},
{id:4,title:"Hello World - 我的第一篇博客",date:"2026-05-15",tags:["技术","前端"],summary:"欢迎来到我的博客！这是我的第一篇文章，记录搭建博客的过程。",content:`<p><br><h2>为什么写博客</h2><br>一直想有个自己的博客，记录学习和生活。之前用过 WordPress、Hugo，这次想试试最纯粹的方式：纯静态 HTML，一个文件搞定一切。</p><h2>技术选型</h2><br>最终选择了：<br><ul><li>HTML5 + CSS3 + 原生 JavaScript- 零 npm 依赖- Cloudflare Pages 部署</li></ul><br><h2>Hello World</h2><br>这是每程序员的第一步。从这个简单的输出开始，到搭建完整的博客系统，每一步都是学习。</p><pre><code>console.log("Hello World!");<br></code></pre><br>期待在这里记录更多有趣的故事。<br></p>`,image:"",audio:""},
{id:5,title:"前端性能优化笔记",date:"2026-05-10",tags:["技术","前端","性能"],summary:"整理前端性能优化的常见手段，从加载到渲染全覆盖。",content:`<p><br><h2>加载优化</h2><br>首屏加载速度直接影响用户体验。</p><h3>资源优化</h3><br><ul><li><strong>代码分割</strong>：按路由拆分- <strong>图片优化</strong>：WebP、懒加载- <strong>字体优化</strong>：font-display: swap</li></ul><br><h2>渲染优化</h2><pre><code>.card{will-change:transform;transition:transform .3s}<br>.card:hover{transform:translateY(-4px)}<br></code></pre><blockquote>性能优化不是一次性的工作，而是持续的过程。</blockquote><br></p>`,image:"",audio:""},
{id:6,title:"Three.js 低多边形场景入门",date:"2026-05-08",tags:["技术","3D"],summary:"用 Three.js 创建 Low Poly 3D 场景的入门教程。",content:`<p><br><h2>什么是 Low Poly</h2><br>Low Poly 是一种用少量多边形建模的3D风格。</p><h2>搭建场景</h2><pre><code>const scene = new THREE.Scene();<br>const camera = new THREE.PerspectiveCamera(75,w/h,.1,1000);<br>const renderer = new THREE.WebGLRenderer({antialias:true});<br></code></pre><h2>创建几何体</h2><pre><code>const geo = new THREE.IcosahedronGeometry(1,1);<br>const mat = new THREE.MeshPhongMaterial({color:0x00e89d,flatShading:true});<br></code></pre><br>这就是低多边形的入门，后面会尝试更复杂的场景。<br></p>`,image:"",audio:""},

];
// ===== ARTICLES_END =====

// 按日期倒序排列（最新在最上面）
articles.sort((a,b) => new Date(b.date) - new Date(a.date));

// ===== 评论系统 =====
function getComments(id){try{return JSON.parse(localStorage.getItem('cmt_'+id)||'[]}')}catch{return[]}}
function saveComment(id,c){const list=getComments(id);list.push(c);localStorage.setItem('cmt_'+id,JSON.stringify(list))}
function deleteComment(id,idx){const list=getComments(id);list.splice(idx,1);localStorage.setItem('cmt_'+id,JSON.stringify(list))}
function totalComments(){let n=0;articles.forEach(a=>n+=getComments(a.id).length);return n}

// ===== 状态 =====
let curTag=null,curArt=null,isDark=true;

// ===== Init =====
document.addEventListener('DOMContentLoaded',()=>{
  initTags();renderCards();updateStats();initScroll();
});

// ===== Tags =====
function initTags(){
  const s=new Set();articles.forEach(a=>a.tags.forEach(t=>s.add(t)));
  const bar=document.getElementById('tagsBar');
  bar.innerHTML='<button class="tag-btn active" onclick="pickTag(null)">全部</button>';
  [...s].sort().forEach(t=>bar.innerHTML+=`<button class="tag-btn" onclick="pickTag('${t}')">${t}</button>`);
  // Side tags
  const st=document.getElementById('sideTags');
  st.innerHTML=[...s].map(t=>`<button class="tag-btn" onclick="pickTag('${t}')" style="font-size:.7rem;padding:.2rem .5rem">${t}</button>`).join('');
}
function pickTag(t){
  curTag=t;curPage=1;
  document.querySelectorAll('.tag-btn').forEach(b=>b.classList.toggle('active',(t===null&&b.textContent==='全部')||b.textContent===t));
  renderCards();
}

// ===== Render Cards =====
const PER_PAGE=30;let curPage=1;
function renderCards(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const list=articles.filter(a=>{
    const tagOk=!curTag||a.tags.includes(curTag);
    const sOk=!q||a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)||a.content.toLowerCase().includes(q);
    return tagOk&&sOk;
  });
  const totalPages=Math.ceil(list.length/PER_PAGE)||1;
  if(curPage>totalPages)curPage=totalPages;
  const paged=list.slice((curPage-1)*PER_PAGE,curPage*PER_PAGE);
  const el=document.getElementById('cards');
  el.innerHTML=paged.map((a,i)=>{
    const cmts=getComments(a.id).length;
    return `<div class="card" onclick="showDetail(${a.id})" style="animation-delay:${i*60}ms">
      <div class="card-top">
        <div class="card-title">${a.title}</div>
        <div class="card-date">📅 ${a.date}</div>
      </div>
      <div class="card-summary">${a.summary}</div>
      <div class="card-bottom">
        ${a.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}
        <span class="card-comments">💬 ${cmts}</span>
      </div>
    </div>`;
  }).join('');
  // Pagination
  let pag='';
  if(totalPages>1){
    pag='<div style="display:flex;justify-content:center;gap:.5rem;margin-top:1.5rem;flex-wrap:wrap">';
    if(curPage>1)pag+=`<button onclick="goPage(${curPage-1})" class="tag-btn">← 上一页</button>`;
    for(let p=1;p<=totalPages;p++){
      pag+=`<button onclick="goPage(${p})" class="tag-btn${p===curPage?' active':''}">${p}</button>`;
    }
    if(curPage<totalPages)pag+=`<button onclick="goPage(${curPage+1})" class="tag-btn">下一页 →</button>`;
    pag+='</div>';
  }
  el.innerHTML+=pag;
  requestAnimationFrame(()=>el.querySelectorAll('.card').forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),i*60)));
  // Side recent
  document.getElementById('sideRecent').innerHTML=articles.slice(0,4).map(a=>`<div style="font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--tx2)" onclick="showDetail(${a.id})">${a.title}</div>`).join('');
}
function goPage(p){curPage=p;renderCards();window.scrollTo({top:0,behavior:'smooth'})}

// ===== Detail =====
function showDetail(id){
  const a=articles.find(x=>x.id===id);if(!a)return;curArt=a;
  document.getElementById('homeView').style.display='none';
  const d=document.getElementById('detailView');
  d.className='detail active';
  const cmts=getComments(a.id);
  d.innerHTML=`
    <div class="back-btn" onclick="showHome()">← 返回</div>
    <div class="d-meta">
      <h1>${a.title}</h1>
      <div class="d-info"><span>📅 ${a.date}</span><span>🏷️ ${a.tags.join(', ')}</span><span>💬 ${cmts.length} 条评论</span></div>
    </div>
    <div class="d-content" id="dContent">${a.content}</div>
    <div class="comments">
      <h3>💬 评论 (${cmts.length})</h3>
      <div class="comment-form">
        <textarea id="cmtText" placeholder="写下你的评论..."></textarea>
        <div class="row">
          <input id="cmtName" placeholder="你的名字" value="${localStorage.getItem('cmt_name')||''}">
          <button onclick="postComment(${a.id})">发表</button>
        </div>
      </div>
      <div class="cmt-list" id="cmtList">${renderCmts(a.id)}</div>
    </div>`;
  // Code copy
  d.querySelectorAll('pre').forEach(pre=>{
    const w=document.createElement('div');w.className='code-wrap';w.style.position='relative';
    pre.parentNode.insertBefore(w,pre);w.appendChild(pre);
    const b=document.createElement('button');b.className='copy-btn';b.textContent='复制';
    b.onclick=e=>{e.stopPropagation();navigator.clipboard.writeText(pre.textContent).then(()=>{b.textContent='✓';setTimeout(()=>b.textContent='复制',1200)})};
    w.appendChild(b);
  });
  d.querySelectorAll('.d-content img').forEach(img=>{img.style.cursor='zoom-in';img.onclick=()=>openLB(img.src)});
  buildTOC();
  scrollTo({top:0,behavior:'smooth'});
}

function renderCmts(id){
  return getComments(id).map((c,i)=>`<div class="cmt">
    <div class="cmt-top"><div class="cmt-avatar">👤</div><div class="cmt-name">${esc(c.name)}</div><div class="cmt-time">${c.time}</div><span class="cmt-delete" onclick="delCmt(${id},${i})">删除</span></div>
    <div class="cmt-text">${esc(c.text)}</div>
  </div>`).join('')||'<div style="font-size:.85rem;color:var(--tx3)">暂无评论，来说点什么吧 ✍️</div>';
}

function postComment(id){
  const text=document.getElementById('cmtText').value.trim();
  const name=document.getElementById('cmtName').value.trim()||'匿名';
  if(!text)return;
  localStorage.setItem('cmt_name',name);
  saveComment(id,{name,text,time:new Date().toLocaleString('zh-CN')});
  document.getElementById('cmtText').value='';
  document.getElementById('cmtList').innerHTML=renderCmts(id);
  updateStats();
}

function delCmt(id,idx){deleteComment(id,idx);document.getElementById('cmtList').innerHTML=renderCmts(id);updateStats()}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function showHome(){
  curArt=null;
  document.getElementById('homeView').style.display='block';
  document.getElementById('detailView').className='detail';
  document.getElementById('toc').innerHTML='';
  renderCards();
}

// ===== TOC =====
function buildTOC(){
  const c=document.getElementById('dContent');const t=document.getElementById('toc');
  const hs=c.querySelectorAll('h2,h3');if(hs.length<2){t.innerHTML='';return}
  t.innerHTML='<div style="font-weight:600;margin-bottom:.4rem;color:var(--tx);font-size:.8rem">目录</div>'+
    [...hs].map((h,i)=>{h.id='h'+i;return`<a class="${h.tagName==='H3'?'h3':''}" href="#h${i}" onclick="event.preventDefault();document.getElementById('h${i}').scrollIntoView({behavior:'smooth',block:'start'})">${h.textContent}</a>`}).join('');
  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){t.querySelectorAll('a').forEach(a=>a.classList.remove('active'));const l=t.querySelector(`a[href="#${e.target.id}"]`);if(l)l.classList.add('active')}}),{rootMargin:'-20% 0px -70% 0px'});
  hs.forEach(h=>obs.observe(h));
}

// ===== Search =====
function toggleSearch(){document.getElementById('searchWrap').classList.toggle('active');if(document.getElementById('searchWrap').classList.contains('active'))document.getElementById('searchInput').focus()}

// ===== Theme =====
function toggleTheme(){
  isDark=!isDark;
  const s=document.documentElement.style;
  s.setProperty('--bg',isDark?'#0a0a0f':'#f5f5f5');
  s.setProperty('--bg2',isDark?'#12121a':'#fff');
  s.setProperty('--bg3',isDark?'#1a1a25':'#f0f0f0');
  s.setProperty('--bg4',isDark?'#222230':'#e0e0e0');
  s.setProperty('--bdr',isDark?'#2a2a3a':'#ddd');
  s.setProperty('--bdr2',isDark?'#3a3a50':'#ccc');
  s.setProperty('--tx',isDark?'#eee':'#1a1a1a');
  s.setProperty('--tx2',isDark?'#aaa':'#555');
  s.setProperty('--tx3',isDark?'#666':'#999');
  document.querySelector('.nav-r button:last-child').textContent=isDark?'🌙':'☀️';
}

// ===== Stats =====
function updateStats(){
  document.getElementById('statPosts').textContent=articles.length;
  const tags=new Set();articles.forEach(a=>a.tags.forEach(t=>tags.add(t)));
  document.getElementById('statTags').textContent=tags.size;
  document.getElementById('statComments').textContent=totalComments();
}

// ===== Lightbox =====
function openLB(s){document.getElementById('lbImg').src=s;document.getElementById('lb').classList.add('on')}

// ===== Scroll =====
function initScroll(){
  const nav=document.getElementById('nav'),prog=document.getElementById('progress'),bt=document.getElementById('btop');
  window.addEventListener('scroll',()=>{
    const y=scrollY;
    nav.classList.toggle('scrolled',y>10);
    const h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=h>0?(y/h*100)+'%':'0%';
    bt.classList.toggle('on',y>400);
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('lb').classList.contains('on'))document.getElementById('lb').classList.remove('on');else if(curArt)showHome()}});
}
</script>
</body>
</html>
