<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Yadong's Blog</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#222230;
--bdr:#2a2a3a;--bdr2:#3a3a50;
--tx:#eee;--tx2:#aaa;--tx3:#666;
--ac:#00e89d;--ac2:rgba(0,232,157,.12);--ac3:rgba(0,232,157,.3);
--r:12px;--r2:8px;
--font:-apple-system,BlinkMacSystemFont,'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
--mono:'SF Mono','JetBrains Mono',Consolas,monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.7}
a{color:var(--ac);text-decoration:none}
a:hover{text-decoration:underline}

/* Progress */
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--ac),#7c6aef);z-index:1001;width:0;transition:width .1s}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,3vw,2rem);background:rgba(10,10,15,.5);backdrop-filter:blur(0);transition:all .3s;border-bottom:1px solid transparent}
.nav.scrolled{backdrop-filter:blur(20px);border-bottom-color:var(--bdr)}
.nav-logo{font-size:1rem;font-weight:700;color:var(--tx);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.nav-r{display:flex;gap:1rem;align-items:center}
.nav-r button{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--tx2)}
.nav-r button:hover{color:var(--tx)}
.nav-copy-btn{padding:.35rem .75rem;border-radius:999px;font-size:.78rem;background:linear-gradient(135deg,var(--ac),#7c6aef);color:#0a0a0f;border:none;cursor:pointer;font-weight:600;transition:.2s;font-family:var(--font)}
.nav-copy-btn:hover{color:#0a0a0f;transform:scale(1.05);box-shadow:0 0 12px var(--ac3)}

/* Layout */
.layout{display:flex;max-width:1200px;margin:0 auto;padding:calc(52px + 2rem) clamp(1rem,3vw,2rem) 3rem;gap:2rem}
.main{flex:7;min-width:0}
.side{flex:3;min-width:260px;max-width:320px}

/* Sidebar */
.side-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;position:sticky;top:calc(52px + 1.5rem)}
.side-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#7c6aef);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto .8rem;box-shadow:0 0 30px var(--ac3)}
.side-name{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.side-bio{font-size:.82rem;color:var(--tx2);text-align:center;line-height:1.6;margin-bottom:1rem}
.side-stats{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.side-stat{background:var(--bg3);border-radius:var(--r2);padding:.6rem;text-align:center}
.side-stat-num{font-size:1.1rem;font-weight:700;color:var(--ac)}
.side-stat-lbl{font-size:.7rem;color:var(--tx3)}
.side-links{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.side-link{padding:.35rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr);transition:all .2s}
.side-link:hover{border-color:var(--ac);color:var(--ac);text-decoration:none}
.side-section{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.side-section h4{font-size:.8rem;color:var(--tx3);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.08em}
.tag-btn{padding:.3rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tag-btn:hover,.tag-btn.active{background:var(--ac2);border-color:var(--ac);color:var(--ac)}

/* Search */
.search-wrap{display:none;margin-bottom:1rem}
.search-wrap.active{display:block}
.search-input{width:100%;padding:.65rem 1rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.88rem;font-family:var(--font);outline:none}
.search-input:focus{border-color:var(--ac)}
.search-input::placeholder{color:var(--tx3)}

/* Sort & Count Bar */
.sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem}
.sort-btn{padding:.3rem .7rem;border-radius:999px;font-size:.72rem;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);cursor:pointer;transition:all .2s;font-family:var(--font);white-space:nowrap}
.sort-btn:hover,.sort-btn.active{background:var(--ac2);border-color:var(--ac);color:var(--ac)}
.article-count{font-size:.72rem;color:var(--tx3)}

/* Enhanced Pagination */
.pag-info{font-size:.72rem;color:var(--tx3);text-align:center;margin-top:.8rem}

/* Article Cards */
.articles{display:flex;flex-direction:column;gap:.8rem}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.1rem 1.3rem;cursor:pointer;transition:all .25s;opacity:0;transform:translateY(16px)}
.card.visible{opacity:1;transform:translateY(0)}
.card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,232,157,.15)}
.card-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.card-title{font-size:1rem;font-weight:600;flex:1}
.card-date{font-size:.72rem;color:var(--tx3);white-space:nowrap}
.card-summary{font-size:.85rem;color:var(--tx2);line-height:1.6;margin-bottom:.5rem}
.card-bottom{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.card-tag{font-size:.68rem;padding:.15rem .5rem;border-radius:999px;background:var(--ac2);color:var(--ac)}
.card-comments{font-size:.72rem;color:var(--tx3);margin-left:auto}

/* Detail */
.detail{display:none}
.detail.active{display:block}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--tx2);margin-bottom:1rem;cursor:pointer}
.back-btn:hover{color:var(--ac)}
.d-meta{margin-bottom:1.5rem}
.d-meta h1{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;margin-bottom:.4rem;background:linear-gradient(135deg,var(--ac),#7c6aef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.d-meta .d-info{font-size:.8rem;color:var(--tx3);display:flex;gap:1rem;flex-wrap:wrap}
.d-content{font-size:.95rem;line-height:1.85;color:var(--tx)}
.d-content h2{font-size:1.3rem;font-weight:700;margin:1.8rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--bdr)}
.d-content h3{font-size:1.1rem;font-weight:600;margin:1.3rem 0 .5rem}
.d-content p{margin-bottom:.8rem}
.d-content pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:.8rem 1rem;overflow-x:auto;margin:1rem 0;position:relative}
.d-content code{font-family:var(--mono);font-size:.82rem}
.d-content :not(pre)>code{background:var(--bg3);padding:.12rem .35rem;border-radius:4px}
.d-content blockquote{border-left:3px solid var(--ac);padding:.6rem 1rem;margin:.8rem 0;background:var(--ac2);border-radius:0 var(--r2) var(--r2) 0;color:var(--tx2)}
.d-content img{max-width:100%;border-radius:var(--r2);cursor:zoom-in}
.d-content ul,.d-content ol{padding-left:1.3rem;margin-bottom:.8rem}
.d-content li{margin-bottom:.2rem}
.copy-btn{position:absolute;top:.4rem;right:.4rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:.2rem .5rem;font-size:.7rem;color:var(--tx2);cursor:pointer;font-family:var(--font)}
.copy-btn:hover{border-color:var(--ac);color:var(--ac)}

/* Music Player */
.music-player{background:var(--bg2);border:1px solid var(--ac3);border-radius:var(--r);padding:.8rem 1rem;margin:1rem 0;transition:border-color .2s}
.music-player:hover{border-color:var(--ac)}
.player-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.player-title{font-size:.9rem;font-weight:600;color:var(--tx)}
.player-hint{font-size:.72rem;color:var(--ac);opacity:.7}
.music-audio{width:100%;height:44px;border-radius:var(--r2);margin-top:.3rem;color-scheme:dark}
.music-audio::-webkit-media-controls-panel{background:var(--bg4);border-radius:var(--r2)}
.music-audio::-webkit-media-controls-enclosure{border-radius:var(--r2);background:var(--bg4);border:1px solid var(--bdr2)}
.music-audio::-webkit-media-controls-play-button,
.music-audio::-webkit-media-controls-timeline,
.music-audio::-webkit-media-controls-current-time-display,
.music-audio::-webkit-media-controls-time-remaining-display,
.music-audio::-webkit-media-controls-volume-slider,
.music-audio::-webkit-media-controls-mute-button{filter:brightness(1.2)}

/* Comments */
.comments{margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--bdr)}
.comments h3{font-size:1rem;font-weight:600;margin-bottom:1rem}
.comment-form{margin-bottom:1.5rem}
.comment-form textarea{width:100%;min-height:80px;padding:.7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-family:var(--font);font-size:.88rem;resize:vertical;outline:none}
.comment-form textarea:focus{border-color:var(--ac)}
.comment-form .row{display:flex;gap:.5rem;margin-top:.5rem}
.comment-form input{flex:1;padding:.5rem .7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.82rem;font-family:var(--font);outline:none}
.comment-form input:focus{border-color:var(--ac)}
.comment-form button{padding:.5rem 1rem;background:var(--ac);color:#0a0a0f;border:none;border-radius:var(--r2);font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.comment-form button:hover{opacity:.9}
.cmt-list{display:flex;flex-direction:column;gap:.8rem}
.cmt{background:var(--bg3);border-radius:var(--r2);padding:.8rem 1rem}
.cmt-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.cmt-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:.7rem}
.cmt-name{font-size:.82rem;font-weight:600}
.cmt-time{font-size:.68rem;color:var(--tx3);margin-left:auto}
.cmt-text{font-size:.85rem;color:var(--tx2);line-height:1.6}
.cmt-delete{font-size:.68rem;color:var(--tx3);cursor:pointer;margin-left:.5rem}
.cmt-delete:hover{color:#f44}

/* TOC */
.toc{position:fixed;top:calc(52px + 2rem);right:clamp(1rem,2vw,2rem);width:180px;font-size:.75rem;display:none;z-index:100}
.detail.active~.toc{display:block}
.toc a{display:block;padding:.2rem 0;color:var(--tx3);transition:color .2s;line-height:1.4}
.toc a:hover,.toc a.active{color:var(--ac);text-decoration:none}
.toc .h3{padding-left:.8rem}
@media(max-width:1100px){.toc{display:none!important}}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out;animation:lbFadeIn .25s ease}
.lb.on{display:flex}
.lb img{max-width:90vw;max-height:85vh;border-radius:var(--r2);object-fit:contain;animation:lbImgIn .25s ease;touch-action:manipulation}
.lb-close{position:absolute;top:1rem;right:1.2rem;color:#fff;font-size:2rem;cursor:pointer;z-index:2001;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1);transition:background .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.lb-close:hover{background:rgba(255,255,255,.25)}
.lb-counter{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);color:#fff;font-size:.85rem;background:rgba(0,0,0,.5);padding:.3rem .8rem;border-radius:12px;pointer-events:none}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:2.2rem;cursor:pointer;padding:.5rem .8rem;border-radius:8px;background:rgba(255,255,255,.08);transition:background .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.lb-nav:hover{background:rgba(255,255,255,.2)}
.lb-prev{left:.8rem}
.lb-next{right:.8rem}
@keyframes lbFadeIn{from{opacity:0}to{opacity:1}}
@keyframes lbImgIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@media(max-width:600px){.lb img{max-width:100vw;max-height:80vh}.lb-nav{font-size:1.6rem;padding:.3rem .5rem}.lb-prev{left:.2rem}.lb-next{right:.2rem}}

/* Back top */
#btop{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--ac);color:#0a0a0f;border:none;font-size:1rem;cursor:pointer;opacity:0;transition:all .3s;z-index:1000;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#btop.on{opacity:1}
#btop:hover{box-shadow:0 0 20px var(--ac3)}

/* Responsive */
@media(max-width:768px){
  .layout{flex-direction:column;padding-top:calc(52px + 1rem)}
  .side{position:fixed;top:0;left:-300px;width:280px;height:100vh;max-width:280px;z-index:2000;overflow-y:auto;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--bdr);transition:left .3s ease,padding .3s ease;padding:1rem;box-shadow:none;flex:none;min-width:0;pointer-events:none}
  .side.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.5);pointer-events:auto}
  .side-card{display:block;padding:0;border:none;background:none}
  .side-avatar{margin:0 auto .8rem;width:60px;height:60px;font-size:1.6rem}
  .side-name{text-align:center}
  .side-bio{text-align:center}
  .side-stats{grid-template-columns:repeat(2,1fr)}
  .side-links{justify-content:center}
  .side-section{text-align:left}
  .toc{display:none!important}
  .side-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1999}
  .side-mask.on{display:block}
  .menu-btn{display:flex!important}
}
/* ───── Table ───── */
.article-body .table-wrap{overflow-x:auto;margin:1.2em 0;-webkit-overflow-scrolling:touch}
.article-body table{width:100%;border-collapse:collapse;font-size:.93em}
.article-body table thead{background:var(--ac);color:#fff}
/* ───── Like Button ───── */
.like-bar{display:flex;align-items:center;gap:.6rem;margin:1.5rem 0;padding:1rem;border-radius:var(--r);border:1px solid var(--bdr);background:var(--bg3)}
.like-btn{display:flex;align-items:center;gap:.4rem;padding:.5rem 1.2rem;border:2px solid var(--bdr);border-radius:999px;background:none;color:var(--tx2);cursor:pointer;font-size:.9rem;font-family:var(--font);transition:all .3s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.like-btn:hover{border-color:#f44;color:#f44}
.like-btn.liked{border-color:#f44;color:#f44;background:rgba(255,68,68,.1)}
.like-btn .heart{font-size:1.1rem;transition:transform .3s}
.like-btn.liked .heart{transform:scale(1.2)}
.like-count{font-size:1.1rem;font-weight:700;color:var(--tx)}
.like-count.maxed{color:#ffd700}
@keyframes heartPop{0%{transform:scale(1)}30%{transform:scale(1.35)}60%{transform:scale(.9)}100%{transform:scale(1)}}
.like-btn.animating{animation:heartPop .5s ease}
.article-body table th{padding:8px 14px;font-weight:600;text-align:left;border:1px solid var(--bdr2);white-space:nowrap}
.article-body table td{padding:6px 14px;border:1px solid var(--bdr2);vertical-align:top}
.article-body table td code,.article-body table th code{white-space:nowrap;font-size:.9em}
@media(max-width:768px){.article-body .table-wrap{margin:.8em 0}}
@media(max-width:768px){.article-body table{font-size:.85em}}
@media(max-width:768px){.article-body table th,.article-body table td{padding:5px 8px}}

.menu-btn{display:none;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--tx2);padding:4px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

</style>
</head>
<body>

<div id="progress"></div>

<nav class="nav" id="nav">
  <a href="#" class="nav-logo" onclick="showHome();return false">📝 Yadong</a>
  <div class="nav-r">
    <button class="nav-copy-btn" onclick="navigator.clipboard.writeText('https://yadongw118.dpdns.org').then(()=>{var t=document.createElement('span');t.textContent='✅ 已复制!';t.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--ac);color:#0a0a0f;padding:8px 20px;border-radius:20px;font-size:.85rem;z-index:9999;pointer-events:none;font-weight:600';document.body.appendChild(t);setTimeout(()=>t.remove(),2000)})">📋 复制网址</button>
    <button onclick="location.reload()" title="刷新" style="font-size:.75rem">🔄 刷新</button>
    <button onclick="clearCache()" title="清理缓存" style="font-size:.75rem;color:#f55">🗑️ 清缓存</button>
    <button class="menu-btn" onclick="toggleSide()" title="菜单">☰</button>
    <button onclick="toggleSearch()" title="搜索">🔍</button>
    <button onclick="toggleTheme()" title="主题">🌙</button>
  </div>
</nav>

<div class="side-mask" id="sideMask" onclick="toggleSide()"></div>
<div class="layout" id="layout">
  <!-- Main -->
  <div class="main" id="mainArea">
    <div id="homeView">
      <div class="search-wrap" id="searchWrap">
        <input class="search-input" id="searchInput" placeholder="搜索文章..." oninput="curPage=1;renderCards()">
      </div>
      <div class="sort-bar" id="sortBar">
        <div>
          <button class="sort-btn active" id="sortNew" onclick="setSort('new')">📅 最新优先</button>
          <button class="sort-btn" id="sortOld" onclick="setSort('old')">📅 最早优先</button>
        </div>
        <span class="article-count" id="articleCount"></span>
      </div>
      <div class="articles" id="cards"></div>
    </div>
    <div class="detail" id="detailView"></div>
  </div>

  <!-- Sidebar -->
  <div class="side" id="side">
    <div class="side-card">
      <div class="side-avatar">🧑‍💻</div>
      <div class="side-name">Yadong</div>
      <div class="side-bio">写代码的，偶尔写点别的。<br>喜欢折腾，喜欢把想法变成现实。</div>
      <div class="side-stats">
        <div class="side-stat"><div class="side-stat-num" id="statPosts">0</div><div class="side-stat-lbl">文章</div></div>
        <div class="side-stat"><div class="side-stat-num" id="statTags">0</div><div class="side-stat-lbl">标签</div></div>
        <div class="side-stat"><div class="side-stat-num" id="statComments">0</div><div class="side-stat-lbl">评论</div></div>
        <div class="side-stat"><div class="side-stat-num" id="statLikes">0</div><div class="side-stat-lbl">红心</div></div>
      </div>
      <div class="side-links">
        <a class="side-link" href="https://github.com/2326239842" target="_blank" rel="noopener" onclick="window.open(this.href,'_blank');return false">🐙 GitHub</a>
        <a class="side-link" href="mailto:wyd2326239842@outlook.com" onclick="window.location.href=this.href;return false">📧 邮件</a>
        <a class="side-link" href="https://yadongw.dpdns.org" target="_blank" rel="noopener" onclick="window.open(this.href,'_blank');return false">🏠 个人主页</a>
      </div>
      <div class="side-section">
        <h4>💭 随机一句</h4>
        <div id="sideQuote" style="font-size:.8rem;color:var(--tx2);line-height:1.6;font-style:italic;padding:.5rem 0"></div>
      </div>
      <div class="side-section">
        <h4>⏱️ 站点运行</h4>
        <div id="sideUptime" style="font-size:.82rem;color:var(--tx2)"></div>
      </div>
      <div class="side-section">
        <h4>📁 文章归档</h4>
        <div id="sideArchives"></div>
      </div>

      <div class="side-section">
        <h4>最近文章</h4>
        <div id="sideRecent"></div>
      </div>
    </div>
  </div>
</div>

<div class="toc" id="toc"></div>
<div class="lb" id="lb" onclick="if(event.target===this)closeLB()"><span class="lb-close" onclick="closeLB()">×</span><span class="lb-nav lb-prev" onclick="event.stopPropagation();navLB(-1)">‹</span><img id="lbImg"><span class="lb-nav lb-next" onclick="event.stopPropagation();navLB(1)">›</span><span class="lb-counter" id="lbCounter"></span></div>
<button id="btop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ===== 数据 =====

const fmtDate = d => d ? d.replace('T',' ').substring(0,10) : d;
const API_BASE = '/api/comments';

// 用文章标题生成固定 slug
function artSlug(a) {
  return a.title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g,'-').replace(/^-|-$/g,'') || 'post-'+a.id;
}

// 缓存评论（异步加载）
let _cmtCache = {};

async function loadComments(a) {
  const slug = artSlug(a);
  if (_cmtCache[slug]) return _cmtCache[slug];
  try {
    const r = await fetch(API_BASE + '?slug=' + encodeURIComponent(slug));
    const d = await r.json();
    _cmtCache[slug] = d.comments || [];
    return _cmtCache[slug];
  } catch(e) {
    return [];
  }
}

async function totalComments() {
  let n = 0;
  for (const a of articles) {
    n += (await loadComments(a)).length;
  }
  return n;
}

async function showAdminLogin() {
  const pw = prompt('请输入管理员密码：');

  try {
    const r = await fetch(API_BASE, {

async function postComment(a) {
  const text = document.getElementById('cmtText').value.trim();
  const name = document.getElementById('cmtName').value.trim() || '匿名';
  if (!text) return;
  localStorage.setItem('cmt_name', name);
  const slug = artSlug(a);
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({slug, name, content: text}),
    });
    const d = await r.json();
    if (d.ok) {
      // 清除缓存，重新加载
      delete _cmtCache[slug];
      document.getElementById('cmtText').value = '';
      await renderDetailComments(a);
    } else {
      alert('发表失败：' + (d.error || '未知错误'));
    }
  } catch(e) {
    alert('网络错误，请稍后重试');
  }
}

async function deleteComment(a, cid) {
  if (!_isAdmin) { alert('请先登录管理员'); return; }
  const slug = artSlug(a);
  const r = await fetch(API_BASE, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({_action: 'delete', slug, id: cid, password: 'wyd73199254110'}),
  });
  const d = await r.json();
  if (d.ok) {
    delete _cmtCache[slug];
    await renderDetailComments(a);
  } else {
    alert('删除失败：' + (d.error || '未知错误'));
  }
}

async function renderDetailComments(a) {
  const cmts = await loadComments(a);
  const el = document.getElementById('cmtList');
  if (!el) return;
  const admin = await checkAdmin();
  const avatarColors = [
    'linear-gradient(135deg,#ff9a9e,#fad0c4)',
    'linear-gradient(135deg,#a18cd1,#fbc2eb)',
    'linear-gradient(135deg,#667eea,#764ba2)',
    'linear-gradient(135deg,#f093fb,#f5576c)',
    'linear-gradient(135deg,#4facfe,#00f2fe)',
    'linear-gradient(135deg,#43e97b,#38f9d7)',
    'linear-gradient(135deg,#fa709a,#fee140)',
    'linear-gradient(135deg,#a1c4fd,#c2e9fb)',
  ];
  el.innerHTML = cmts.map(c => {
    let hash = 0;
    for (let i = 0; i < c.name.length; i++) hash = c.name.charCodeAt(i) + ((hash << 5) - hash);
    const bg = avatarColors[Math.abs(hash) % avatarColors.length];
    return `<div class="cmt">
    <div class="cmt-top"><div class="cmt-avatar" style="background:${bg};color:#fff;font-weight:600;font-size:.75rem">${esc(c.name).charAt(0).toUpperCase()}</div><div class="cmt-name">${esc(c.name)}</div><div class="cmt-time">${new Date(c.time).toLocaleString('zh-CN')}</div>${admin ? `<span class="cmt-delete" onclick="deleteComment(curArt,'${c.id}')">删除</span>` : ''}</div>
    <div class="cmt-text">${esc(c.content)}</div>
  </div>`;
  }).join('') || '<div style="font-size:.85rem;color:var(--tx3)">暂无评论，来说点什么吧 ✍️</div>';
  // 更新评论数
  const infoEl = document.querySelector('.d-info span:last-child');
  if (infoEl) infoEl.textContent = '💬 ' + cmts.length + ' 条评论';
  const titleEl = document.querySelector('.comments h3');
  if (titleEl) titleEl.textContent = '💬 评论 (' + cmts.length + ')';
}

const PER_PAGE=30;let curPage=1;let _sortOrder='new';
let _savedScrollY=0;
function setSort(order){_sortOrder=order;curPage=1;
  document.getElementById('sortNew').classList.toggle('active',order==='new');
  document.getElementById('sortOld').classList.toggle('active',order==='old');
  renderCards();}
function renderCards(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const mf=window._monthFilter;
  const list=articles.filter(a=>{
    if (isArticleDeleted(a)) return false;
    const monthOk=!mf||a.date.startsWith(mf);
    const sOk=!q||a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)||a.content.toLowerCase().includes(q);
    return monthOk&&sOk;
  });
  const pinned=list.filter(a=>_pinnedArticles.includes(a.title));
  const regular=list.filter(a=>!_pinnedArticles.includes(a.title));
  // Sort by date
  const sorted=regular.sort((a,b)=>{
    const da=new Date(a.date),db=new Date(b.date);
    return _sortOrder==='new'?db-da:da-db;
  });
  const totalArticles=sorted.length;
  const totalPages=Math.ceil(totalArticles/PER_PAGE)||1;
  if(curPage>totalPages)curPage=totalPages;
  const paged=sorted.slice((curPage-1)*PER_PAGE,curPage*PER_PAGE);
  // Article count
  const countEl=document.getElementById('articleCount');
  if(countEl){
    const start=(curPage-1)*PER_PAGE+1;
    const end=Math.min(curPage*PER_PAGE,totalArticles);
    countEl.textContent=totalArticles>0?`共 ${totalArticles} 篇 · 显示 ${start}-${end}`:'';
  }
  const el=document.getElementById('cards');
  var html='';
  // 置顶文章区
  if(pinned.length>0){
    html+='<div style=\"font-size:.78rem;color:var(--ac);margin-bottom:.4rem;letter-spacing:.05em\">📌 置顶</div>';
    html+=pinned.map((a,i)=>{
      const cmts=_cmtCountCache[a.title]||0;
      return '<div class=\"card pinned\" onclick=\"showDetail('+a.id+')\" style=\"animation-delay:'+(i*60)+'ms;border-color:var(--ac3);background:var(--ac2)\">\n      <div class=\"card-top\">\n        <div class=\"card-title\">📌 '+a.title+'</div>\n        <div class=\"card-date\">📅 '+fmtDate(a.date)+'</div>\n      </div>\n      <div class=\"card-summary\">'+a.summary+'</div>\n      <div class=\"card-bottom\">\n        '+a.tags.map(function(t){return '<span class=\"card-tag\">'+t+'</span>'}).join('')+'\n        <span class=\"card-comments\">💬 '+cmts+'</span>\n      </div>\n    </div>';
    }).join('');
  }
  html+=paged.map((a,i)=>{
    const cmts=_cmtCountCache[a.title]||0;
    return `<div class="card" onclick="showDetail(${a.id})" style="animation-delay:${i*60}ms">
      <div class="card-top">
        <div class="card-title">${a.title}</div>
        <div class="card-date">📅 ${fmtDate(a.date)}</div>
      </div>
      <div class="card-summary">${a.summary}</div>
      <div class="card-bottom">
        ${a.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}
        <span class="card-comments">💬 ${cmts}</span>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=html;
  // Pagination
  let pag='';
  if(totalPages>1){
    pag='<div style="display:flex;justify-content:center;align-items:center;gap:.4rem;margin-top:1.5rem;flex-wrap:wrap">';
    if(curPage>1){
      pag+=`<button onclick="goPage(1)" class="tag-btn" title="首页">⟪</button>`;
      pag+=`<button onclick="goPage(${curPage-1})" class="tag-btn">← 上一页</button>`;
    }
    // Smart page numbers: show first, last, and nearby pages
    const pages=[];
    if(totalPages<=7){for(let i=1;i<=totalPages;i++)pages.push(i);}
    else{
      pages.push(1);
      if(curPage>3)pages.push('...');
      for(let i=Math.max(2,curPage-1);i<=Math.min(totalPages-1,curPage+1);i++)pages.push(i);
      if(curPage<totalPages-2)pages.push('...');
      pages.push(totalPages);
    }
    pages.forEach(p=>{
      if(p==='...')pag+=`<span style="color:var(--tx3);font-size:.75rem;padding:0 .2rem">…</span>`;
      else pag+=`<button onclick="goPage(${p})" class="tag-btn${p===curPage?' active':''}">${p}</button>`;
    });
    if(curPage<totalPages){
      pag+=`<button onclick="goPage(${curPage+1})" class="tag-btn">下一页 →</button>`;
      pag+=`<button onclick="goPage(${totalPages})" class="tag-btn" title="末页">⟫</button>`;
    }
    pag+='</div>';
    pag+=`<div class="pag-info">第 ${curPage} / ${totalPages} 页</div>`;
  }
  el.innerHTML+=pag;
  requestAnimationFrame(()=>el.querySelectorAll('.card').forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),i*60)));
  // Side recent
  document.getElementById('sideRecent').innerHTML=articles.slice(0,4).map(a=>`<div style="font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--tx2)" onclick="showDetail(${a.id})">${a.title}</div>`).join('');
}
function goPage(p){curPage=p;renderCards();window.scrollTo({top:0,behavior:'smooth'})}

  if (!_contentFetchPromise) {
    _contentFetchPromise = fetch('articles-content.json').then(r => r.json()).then(d => { _contentCache = d; return d; });

let _myLikes = JSON.parse(localStorage.getItem('my_likes') || '{}');
let _likeCounts = {};

async function loadAllLikes() {
  try {
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_action: 'get_all_likes'}),
    });
    const data = await res.json();
    if (data.ok && data.likes) _likeCounts = data.likes;
    // 更新侧边栏总计
    let total = 0;
    for (const k in _likeCounts) total += _likeCounts[k];
    const el = document.getElementById('statLikes');
    if (el) el.textContent = total || 0;
  } catch(e) {}

async function toggleLike(a) {
  const slug = artSlug(a);
  // 先乐观更新UI
  _likeCounts[slug] = (_likeCounts[slug] || 0) + 1;
  _myLikes[a.title] = true;
  localStorage.setItem('my_likes', JSON.stringify(_myLikes));
  updateLikeUI(a);
  let total = 0;
  for (const k in _likeCounts) total += _likeCounts[k];
  const el = document.getElementById('statLikes');
  if (el) el.textContent = total || 0;
  // 心跳动画
  const btn = document.getElementById('likeBtn');
  if (btn) { btn.classList.add('animating'); setTimeout(() => btn.classList.remove('animating'), 500); }
  // 异步同步到服务器（不阻塞UI）
  try {
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ _action: 'like', slug }),
    });
    const data = await res.json();
    if (data.ok) {
      _likeCounts[slug] = data.count;
      updateLikeUI(a);
    }
  } catch(e) {}
}

function updateLikeUI(a) {
  const slug = artSlug(a);
  const count = _likeCounts[slug] || 0;
  const liked = !!_myLikes[a.title];
  const btn = document.getElementById('likeBtn');
  const cnt = document.getElementById('likeCount');
  if (btn) {
    btn.className = 'like-btn' + (liked ? ' liked' : '');
    btn.innerHTML = '<span class="heart">' + (liked ? '💖' : '❤️') + '</span> ' + (liked ? '已赞' : '点赞');
  }
  if (cnt) {
    cnt.textContent = count >= 100000 ? '10万+' : count;
    cnt.className = 'like-count' + (count >= 100000 ? ' maxed' : '');
  }
}

function buildTOC(){

  t.innerHTML='<div style="font-weight:600;margin-bottom:.4rem;color:var(--tx);font-size:.8rem">目录</div>'+

// 异步更新评论数缓存
let _cmtCountCache = {};

function animateCounter(el, target) {
  const start = parseInt(el.textContent) || 0;
  if (start === target) return;
  const duration = 600;
  const steps = Math.min(Math.max(target - start, 1), 30);
  const stepTime = duration / steps;
  let current = start;
  const inc = (target - start) / steps;
  const timer = setInterval(() => {
    current += inc;
    if ((inc > 0 && current >= target) || (inc < 0 && current <= target)) {
      el.textContent = target;
      clearInterval(timer);
    } else {
      el.textContent = Math.round(current);
    }
  }, stepTime);
}

async function updateStats(){
  const postEl = document.getElementById('statPosts');
  const tagEl = document.getElementById('statTags');
  animateCounter(postEl, articles.length);
  const tags=new Set();articles.forEach(a=>a.tags.forEach(t=>tags.add(t)));
  animateCounter(tagEl, tags.size);
  try {
    const res = await fetch(API_BASE, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({_action:'comment_counts'})});
    const data = await res.json();
    const counts = (data.ok && data.counts) || {};
    let total = 0;
    articles.forEach(a => {
      const slug = artSlug(a);
      const c = counts[slug] || 0;
      _cmtCountCache[a.title] = c;
      total += c;
    });
    animateCounter(document.getElementById('statComments'), total);
  } catch(e) {
    console.error('Failed to load comment counts:', e);
  }
  renderCards();
}

// ===== 文章归档 =====
let curArchiveYear=null,curArchiveMonth=null;
function initArchives(){
  const years={};
  articles.forEach(a=>{
    const y=a.date.substring(0,4);
    const m=a.date.substring(0,7);
    if(!years[y])years[y]={};
    if(!years[y][m])years[y][m]=0;
    years[y][m]++;
  });
  const sorted=Object.keys(years).sort().reverse();
  renderArchives(sorted,years);
}
function renderArchives(sorted,years){
  const el=document.getElementById('sideArchives');
  if(!curArchiveYear){
    // Show years
    el.innerHTML=sorted.map(y=>{
      const count=Object.values(years[y]).reduce((a,b)=>a+b,0);
      return `<div style="display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--tx2)" onclick="pickYear('${y}')"><span>📁 ${y} 年</span><span style="color:var(--tx3)">${count} 篇 ▸</span></div>`;
    }).join('');
  } else {
    // Show months for selected year
    const months=years[curArchiveYear];
    const sortedM=Object.keys(months).sort().reverse();
    let html=`<div style="font-size:.78rem;color:var(--tx3);padding:.3rem 0;cursor:pointer;margin-bottom:.3rem" onclick="pickYear(null)">← 返回全部年份</div>`;
    html+=`<div style="font-size:.82rem;font-weight:600;color:var(--ac);padding:.3rem 0;border-bottom:1px solid var(--bdr);margin-bottom:.3rem">${curArchiveYear} 年</div>`;
    html+=sortedM.map(m=>{
      const mo=parseInt(m.split('-')[1]);
      const active=curArchiveMonth===m;
      return `<div style="display:flex;justify-content:space-between;font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:${active?'var(--ac)':'var(--tx2)'};font-weight:${active?'600':'400'}" onclick="pickMonth('${m}')"><span>${mo} 月</span><span style="color:var(--tx3)">${months[m]} 篇</span></div>`;
    }).join('');
    html+=`<div style="font-size:.78rem;color:var(--ac);padding:.4rem 0;cursor:pointer;text-align:center;margin-top:.3rem" onclick="pickMonth(null)">查看全部</div>`;
    el.innerHTML=html;
  }
}
function pickYear(y){
  curArchiveYear=y;curArchiveMonth=null;curPage=1;
  window._monthFilter=null;
  const years={};
  articles.forEach(a=>{
    const yr=a.date.substring(0,4);
    const m=a.date.substring(0,7);
    if(!years[yr])years[yr]={};
    if(!years[yr][m])years[yr][m]=0;
    years[yr][m]++;
  });
  renderArchives(Object.keys(years).sort().reverse(),years);
  renderCards();
}
function pickMonth(m){
  curArchiveMonth=m;curPage=1;
  window._monthFilter=m;
  const years={};
  articles.forEach(a=>{
    const yr=a.date.substring(0,4);
    const mo=a.date.substring(0,7);
    if(!years[yr])years[yr]={};
    if(!years[yr][mo])years[yr][mo]=0;
    years[yr][mo]++;
  });
  renderArchives(Object.keys(years).sort().reverse(),years);
  renderCards();
}

// ===== Lightbox =====
let _lbImages=[],_lbIdx=0;
function openLB(s,imgs){
  _lbImages=imgs||[s];
  _lbIdx=_lbImages.indexOf(s);
  if(_lbIdx<0)_lbIdx=0;
  _showLBImg();
  document.getElementById('lb').classList.add('on');
}
function _showLBImg(){
  const img=document.getElementById('lbImg');
  img.src=_lbImages[_lbIdx];
  const c=document.getElementById('lbCounter');
  c.textContent=_lbImages.length>1?(_lbIdx+1)+' / '+_lbImages.length:'';
  c.style.display=_lbImages.length>1?'block':'none';
  document.querySelector('.lb-prev').style.display=_lbImages.length>1?'flex':'none';
  document.querySelector('.lb-next').style.display=_lbImages.length>1?'flex':'none';
}
function navLB(d){
  if(_lbImages.length<=1)return;
  _lbIdx=(_lbIdx+d+_lbImages.length)%_lbImages.length;
  _showLBImg();
}
function closeLB(){document.getElementById('lb').classList.remove('on')}
// Touch swipe for lightbox
(function(){
  let sx=0,sy=0;
  const lb=document.getElementById('lb');
  if(!lb)return;
  lb.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  lb.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){navLB(dx<0?1:-1)}
  },{passive:true});
})();

// ===== Scroll =====
function initScroll(){
  const nav=document.getElementById('nav'),prog=document.getElementById('progress'),bt=document.getElementById('btop');
  window.addEventListener('scroll',()=>{
    const y=scrollY;
    nav.classList.toggle('scrolled',y>10);
    const h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=h>0?(y/h*100)+'%':'0%';
    bt.classList.toggle('on',y>400);
  });
  window.addEventListener('popstate',e=>{
    if(e.state&&e.state.id)showDetail(e.state.id,true);
    else showHome(true);
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('lb').classList.contains('on'))closeLB();else if(curArt)showHome();if(document.getElementById('editModal'))document.getElementById('editModal').style.display='none'}if(document.getElementById('lb').classList.contains('on')){if(e.key==='ArrowLeft')navLB(-1);if(e.key==='ArrowRight')navLB(1)}});
}
