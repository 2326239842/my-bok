<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yadong's Blog</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#222230;
--bdr:#2a2a3a;--bdr2:#3a3a50;
--tx:#eee;--tx2:#aaa;--tx3:#666;
--ac:#00e89d;--ac2:rgba(0,232,157,.12);--ac3:rgba(0,232,157,.3);
--r:12px;--r2:8px;
--font:-apple-system,BlinkMacSystemFont,'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
--mono:'SF Mono','JetBrains Mono',Consolas,monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.7}
a{color:var(--ac);text-decoration:none}
a:hover{text-decoration:underline}

/* Progress */
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--ac),#7c6aef);z-index:1001;width:0;transition:width .1s}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,3vw,2rem);background:rgba(10,10,15,.5);backdrop-filter:blur(0);transition:all .3s;border-bottom:1px solid transparent}
.nav.scrolled{backdrop-filter:blur(20px);border-bottom-color:var(--bdr)}
.nav-logo{font-size:1rem;font-weight:700;color:var(--tx);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.nav-r{display:flex;gap:1rem;align-items:center}
.nav-r button{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--tx2)}
.nav-r button:hover{color:var(--tx)}

/* Layout */
.layout{display:flex;max-width:1200px;margin:0 auto;padding:calc(52px + 2rem) clamp(1rem,3vw,2rem) 3rem;gap:2rem}
.main{flex:7;min-width:0}
.side{flex:3;min-width:260px;max-width:320px}

/* Sidebar */
.side-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;position:sticky;top:calc(52px + 1.5rem)}
.side-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#7c6aef);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto .8rem;box-shadow:0 0 30px var(--ac3)}
.side-name{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.side-bio{font-size:.82rem;color:var(--tx2);text-align:center;line-height:1.6;margin-bottom:1rem}
.side-stats{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.side-stat{background:var(--bg3);border-radius:var(--r2);padding:.6rem;text-align:center}
.side-stat-num{font-size:1.1rem;font-weight:700;color:var(--ac)}
.side-stat-lbl{font-size:.7rem;color:var(--tx3)}
.side-links{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.side-link{padding:.35rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr);transition:all .2s}
.side-link:hover{border-color:var(--ac);color:var(--ac);text-decoration:none}
.side-section{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.side-section h4{font-size:.8rem;color:var(--tx3);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.08em}
.tag-btn{padding:.3rem .7rem;border-radius:999px;font-size:.75rem;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tag-btn:hover,.tag-btn.active{background:var(--ac2);border-color:var(--ac);color:var(--ac)}

/* Search */
.search-wrap{display:none;margin-bottom:1rem}
.search-wrap.active{display:block}
.search-input{width:100%;padding:.65rem 1rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.88rem;font-family:var(--font);outline:none}
.search-input:focus{border-color:var(--ac)}
.search-input::placeholder{color:var(--tx3)}

/* Article Cards */
.articles{display:flex;flex-direction:column;gap:.8rem}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.1rem 1.3rem;cursor:pointer;transition:all .25s;opacity:0;transform:translateY(16px)}
.card.visible{opacity:1;transform:translateY(0)}
.card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.card-title{font-size:1rem;font-weight:600;flex:1}
.card-date{font-size:.72rem;color:var(--tx3);white-space:nowrap}
.card-summary{font-size:.85rem;color:var(--tx2);line-height:1.6;margin-bottom:.5rem}
.card-bottom{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.card-tag{font-size:.68rem;padding:.15rem .5rem;border-radius:999px;background:var(--ac2);color:var(--ac)}
.card-comments{font-size:.72rem;color:var(--tx3);margin-left:auto}

/* Detail */
.detail{display:none}
.detail.active{display:block}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--tx2);margin-bottom:1rem;cursor:pointer}
.back-btn:hover{color:var(--ac)}
.d-meta{margin-bottom:1.5rem}
.d-meta h1{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;margin-bottom:.4rem}
.d-meta .d-info{font-size:.8rem;color:var(--tx3);display:flex;gap:1rem;flex-wrap:wrap}
.d-content{font-size:.95rem;line-height:1.85;color:var(--tx)}
.d-content h2{font-size:1.3rem;font-weight:700;margin:1.8rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--bdr)}
.d-content h3{font-size:1.1rem;font-weight:600;margin:1.3rem 0 .5rem}
.d-content p{margin-bottom:.8rem}
.d-content pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:.8rem 1rem;overflow-x:auto;margin:1rem 0;position:relative}
.d-content code{font-family:var(--mono);font-size:.82rem}
.d-content :not(pre)>code{background:var(--bg3);padding:.12rem .35rem;border-radius:4px}
.d-content blockquote{border-left:3px solid var(--ac);padding:.6rem 1rem;margin:.8rem 0;background:var(--ac2);border-radius:0 var(--r2) var(--r2) 0;color:var(--tx2)}
.d-content img{max-width:100%;border-radius:var(--r2);cursor:zoom-in}
.d-content ul,.d-content ol{padding-left:1.3rem;margin-bottom:.8rem}
.d-content li{margin-bottom:.2rem}
.copy-btn{position:absolute;top:.4rem;right:.4rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:.2rem .5rem;font-size:.7rem;color:var(--tx2);cursor:pointer;font-family:var(--font)}
.copy-btn:hover{border-color:var(--ac);color:var(--ac)}

/* Music Player */
.music-player{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:.8rem 1rem;margin:1rem 0;transition:border-color .2s}
.music-player:hover{border-color:var(--bdr2)}
.player-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.player-title{font-size:.88rem;font-weight:600;color:var(--tx)}
.player-hint{font-size:.72rem;color:var(--tx3)}
.music-audio{width:100%;height:36px;border-radius:var(--r2)}
.music-audio::-webkit-media-controls-panel{background:var(--bg3)}
.music-audio::-webkit-media-controls-enclosure{border-radius:var(--r2);background:var(--bg2)}

/* Comments */
.comments{margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--bdr)}
.comments h3{font-size:1rem;font-weight:600;margin-bottom:1rem}
.comment-form{margin-bottom:1.5rem}
.comment-form textarea{width:100%;min-height:80px;padding:.7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-family:var(--font);font-size:.88rem;resize:vertical;outline:none}
.comment-form textarea:focus{border-color:var(--ac)}
.comment-form .row{display:flex;gap:.5rem;margin-top:.5rem}
.comment-form input{flex:1;padding:.5rem .7rem;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:.82rem;font-family:var(--font);outline:none}
.comment-form input:focus{border-color:var(--ac)}
.comment-form button{padding:.5rem 1rem;background:var(--ac);color:#0a0a0f;border:none;border-radius:var(--r2);font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.comment-form button:hover{opacity:.9}
.cmt-list{display:flex;flex-direction:column;gap:.8rem}
.cmt{background:var(--bg3);border-radius:var(--r2);padding:.8rem 1rem}
.cmt-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.cmt-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:.7rem}
.cmt-name{font-size:.82rem;font-weight:600}
.cmt-time{font-size:.68rem;color:var(--tx3);margin-left:auto}
.cmt-text{font-size:.85rem;color:var(--tx2);line-height:1.6}
.cmt-delete{font-size:.68rem;color:var(--tx3);cursor:pointer;margin-left:.5rem}
.cmt-delete:hover{color:#f44}

/* TOC */
.toc{position:fixed;top:calc(52px + 2rem);right:clamp(1rem,2vw,2rem);width:180px;font-size:.75rem;display:none;z-index:100}
.detail.active~.toc{display:block}
.toc a{display:block;padding:.2rem 0;color:var(--tx3);transition:color .2s;line-height:1.4}
.toc a:hover,.toc a.active{color:var(--ac);text-decoration:none}
.toc .h3{padding-left:.8rem}
@media(max-width:1100px){.toc{display:none!important}}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lb.on{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:var(--r2)}

/* Back top */
#btop{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--ac);color:#0a0a0f;border:none;font-size:1rem;cursor:pointer;opacity:0;transition:all .3s;z-index:1000;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#btop.on{opacity:1}
#btop:hover{box-shadow:0 0 20px var(--ac3)}

/* Responsive */
@media(max-width:768px){
  .layout{flex-direction:column;padding-top:calc(52px + 1rem)}
  .side{position:fixed;top:0;left:-300px;width:280px;height:100vh;max-width:280px;z-index:2000;overflow-y:auto;background:var(--bg);border-right:1px solid var(--bdr);transition:left .3s ease,padding .3s ease;padding:1rem;box-shadow:none;flex:none;min-width:0;pointer-events:none}
  .side.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.5);pointer-events:auto}
  .side-card{display:block;padding:0;border:none;background:none}
  .side-avatar{margin:0 auto .8rem;width:60px;height:60px;font-size:1.6rem}
  .side-name{text-align:center}
  .side-bio{text-align:center}
  .side-stats{grid-template-columns:repeat(2,1fr)}
  .side-links{justify-content:center}
  .side-section{text-align:left}
  .toc{display:none!important}
  .side-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1999}
  .side-mask.on{display:block}
  .menu-btn{display:flex!important}
}
.menu-btn{display:none;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--tx2);padding:4px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

</style>
</head>

<p>歌单这种东西其实很私人，但分享出来感觉也不错。如果你也有喜欢的歌，欢迎在评论区留言推荐给我 🎧</p>

{id:2,title:"从历史分工到现代对立：两性议题的深层溯源",date:"2026-05-18",tags:["性别研究","社会观察","进化心理学"],summary:"最近，知乎上一篇关于“计算机考试插排分配”的讨论再次点燃了两性话题的争论。表面上，这只是一个插排分配的琐事，但其背后折射出的男女思维差异、信任程度与群体互动逻辑，远比事件本身复杂得多。",content:`<p><br><h2>开篇：问题的起点</h2><p>最近，知乎上一篇关于“计算机考试插排分配”的讨论再次点燃了两性话题的争论。表面上，这只是一个插排分配的琐事，但其背后折射出的男女思维差异、信任程度与群体互动逻辑，远比事件本身复杂得多。</p><p>我认为，理解这一现象的核心，在于正视从古至今男女生产地位、生产职能及所扮演角色的本质差异。父系社会的长期延续，直接塑造了我们在性别互动上的集体潜意识。</p><h2>溯源：狩猎协作与采集精算</h2><p>远古时期，社会分工的雏形便已深植于两性的生存策略之中。</p><h3>男性的生产模式：以协作为核心的狩猎</h3><p>在漫长的进化历程中，男性多承担狩猎职能。大型狩猎活动具有高风险、高回报的不可控性，这天然地要求男性之间建立高度信任与分工协作。</p><p>“狩猎一采集理论”指出，原始社会中男女获取食物的活动方式不同，导致了空间认知能力的差异——女性因从事采集活动进化出较好的位置记忆能力，男性因进行狩猎活动则进化出较好的空间旋转能力。</p><p>长期的协作传统，加上父系社会赋予的公共生产地位，塑造了男性相对大度、顿感更强的社会化特质，其自我认同较少来源于同性间的攀比与微妙的资源戒备。</p><h3>女性的生产模式：以精算为核心的采集与管理</h3><p>与此同时，女性在父系社会中长期扮演着资源精算者的角色。面对生产物资的匮乏，女性需要更细腻地规划分配，这促使其天然养成了更强的私有主义意识和细腻的性格。</p><p>此外，进化心理学研究发现，女性更容易嫉妒同伴在资源上的优势，而男性则更容易嫉妒同伴在择偶上的优势。在等级森严的古代家庭体系中，激烈的妻妾之争更是进一步催化了女性之间的防备心理与心力耗费。</p><p>据记载，中国古代法律对妻、妾地位作出严格区分，妻的地位远高于妾，而妾不过是丈夫的生育工具——这种以“内室竞争”为核心的生存结构，与男性在公共领域的协作逻辑形成了鲜明的对照。</p><h2>现状：性别平等的“百年之遥”与认知分歧</h2><p>这些由历史分工和制度演变带来的集体潜意识，是“父系社会长时间的弊端”，绝非一朝一夕可以改变。</p><blockquote><strong>世界经济论坛发布的《2025年全球性别差距报告》</strong> 给出了一个客观的注脚：目前全球性别差距已缩小至68.8%，但按照当前的进步速度，实现完全平等仍需123年之久。</blockquote><p>更值得关注的是认知层面的分歧。一份覆盖2万样本的《中国性别观念调查报告》显示，在18-35岁群体中，67%的女性认为性别平等仍需大力推进，而同年龄段男性持此观点的仅占39%。</p><p>职场数据同样印证了这种差异：调研显示54%的职场女性表示曾遭遇过性别歧视，而男性仅为6.6%。这种认知鸿沟正是历史惯性在当代的投射。</p><p>| 维度 | 女性 | 男性 |<br>|------|------|------|<br>| 遭遇性别歧视比例 | 54% | 6.6% |<br>| 认为平等仍需大力推进 | 67% | 39% |</p><h2>困境：当下网络性别对立的三点原因</h2><p>然而，纵观整个互联网，当下的男女对立情绪却愈演愈烈。我认为根源在以下三点：</p><h3>脱离生产地位的权利追求</h3><p>随着思想逐渐开放，一部分女性开始脱离实际的“生产地位”关系去追逐抽象的“绝对权利”，违背了“地位与能力相统一”的底层逻辑，引发了男性群体的反感和对立扩大化。</p><h3>对男性贡献的全盘否定</h3><p>女性在最近几年刚刚大规模取得话语权，急切地想要提高权力。但数千年的男权社会积重难返，这种急躁导致一部分声音开始对男性的历史贡献与社会价值进行全盘否定，进一步撕裂了共识。</p><h3>资本主义陷阱的推波助澜</h3><p>我们必须警惕消费主义对两性关系的扭曲。多年前，部分资本力量利用女性心理，大幅拉高男性在物质层面的供养标准，制造出虚幻的性别提升感，使多数人背离了朴素的生活本质。</p><p>男性对此的不适，本质上是一种对资本强行绑架生活方式的集体反抗。</p><h2>总结：在争辩中走向理性</h2><p>男女在思维和角色上的这些现象，是父系社会长期弊端导致的必然结果，短时间的确难以根除。但我并不认为这种讨论是不正确的，恰恰相反，只有在客观的讨论与争辩中，我们才能寻找到真正正确的方向。</p><p>最后我们需要警醒：不能犯矫枉过正的错误。一味片面地追求脱离现实的“绝对平等”，只会违背了自然演化和生产实践所赋予两性的自然规律与协作美感。承认差异、尊重历史、警惕资本，这才是修复两性关系、达成良好布局的正确路径。<br></p>`,image:"",audio:""},
{id:3,title:"自动部署测试文章",date:"2026-05-18",tags:["测试","部署"],summary:"测试 GitHub Actions 自动部署到 Cloudflare Pages",content:`<p><br>这是一篇用于测试自动部署功能的文章。</p><h2>测试内容</h2><ul><li>✅ GitHub Actions 触发</li></ul><br><ul><li>✅ Cloudflare Pages 部署</li></ul><br><ul><li>✅ 网站自动更新</li></ul><h2>当前时间</h2><p>这篇文章生成于：2026-05-18</p><p>如果你能看到这篇文章，说明自动部署流程工作正常！<br></p>`,image:"",audio:""},
{id:4,title:"我的AI工具折腾之路",date:"2026-05-17",tags:["AI","技术","工具"],summary:"从云端API到本地部署，我的AI工具使用体验与思考",content:`<p><br><h2>前言 🚀</h2><p>最近在AI工具的使用上经历了不少折腾，从最初的云端API调用，到后来尝试本地部署，这段经历让我对AI的使用成本和技术选型有了更深的理解。今天就来记录一下我的整个探索过程。</p><h2>小米平台API的消耗困境 📊</h2><p>事情要从我的小米平台API说起。最近发现我的API调用量已经消耗了<strong>70%</strong>，这个消耗速度确实让我有些意外。</p><p>说实话，云端API的使用成本比我想象的要高得多。每次调用都需要消耗token，而现在的AI模型动辄就是几K甚至几M的上下文窗口，累积下来的消耗确实不容小觑。</p><h2>飞书连接与OpenClaw的尝试 💬</h2><p>在思考如何优化成本的同时，我也在尝试扩展更多的应用场景。比如想要连接飞书平台，通过OpenClaw来实现一些自动化的功能。</p><p>然而事与愿违，在更新OpenClaw之后，原本正常使用的小米API竟然无法继续使用了。这让我不得不重新审视API的选择和配置问题。</p><h2>DeepSeek：性价比之选 💰</h2><p>在寻找替代方案的过程中，我尝试了DeepSeek的API。说实话，DeepSeek的价格策略确实让人眼前一亮：</p><ul><li>💎 <strong>超低价格</strong>：两千多万token才花了一块钱</li></ul><br><ul><li>⚡ <strong>响应速度快</strong>：实际使用中反应非常迅速</li></ul><br><ul><li>🧠 <strong>效果超预期</strong>：生成质量出乎意料地好</li></ul><p>然而，即便是这样"便宜"的API，面对海量的token消耗，长期使用下来依然是一笔不小的开支。这让我开始思考另一个问题：<strong>能否完全本地化部署AI能力？</strong></p><h2>Ollama本地部署：回归本地化 🤖</h2><p>经过一番考量，我决定尝试在本地部署AI模型。我的方案是：</p><p>1. 在主机上安装Ollama<br>2. 部署一个体积较小的本地模型<br>3. 用本地模型处理一些简单的日常任务</p><p>这个方案的优势显而易见：<br><ul><li>✅ <strong>零成本调用</strong>：本地运行，不消耗任何API额度</li></ul><br><ul><li>✅ <strong>响应更快</strong>：本地计算，没有网络延迟</li></ul><br><ul><li>✅ <strong>隐私更安全</strong>：数据不需要上传到云端</li></ul><p>当然，本地模型的最终效果如何，还需要进一步验证和调优。这个问题还有待商榷。</p><h2>Claude Code：开发利器 🛠️</h2><p>在部署本地AI的同时，我也安装了Claude Code。通过OpenClaw来部署在Linux系统上，确实非常方便。开发效率有了明显的提升，很多重复性的编码工作现在可以交给AI来完成了。</p><h2>硬件升级的遗憾 💻</h2><p>说起来，这段时间的使用也让我有了一个"后悔"——<strong>没有给电脑升级内存</strong>。</p><p>现在的AI应用，尤其是本地部署的模型，对内存和存储的要求都不低：</p><ul><li><strong>内存不足</strong>：运行稍大一点的模型就开始吃力</li></ul><br><ul><li><strong>存储紧张</strong>：模型文件本身就非常大，再加上各种数据</li></ul><h2>AI时代存储的疯狂涨价 📈</h2><p>说到存储，这个问题不得不提。随着AI的快速发展，固态存储的价格简直是<strong>疯涨</strong>。曾经的"白菜价"SSD，如今价格已经翻了原来的数倍，让人望其项背。</p><p>不过话说回来，这也反映了市场对高性能存储的迫切需求。AI训练需要大量的高速读写，固态存储的涨价似乎也在情理之中。</p><h2>总结与思考 💡</h2><p>这一路折腾下来，我最大的感受是：<strong>AI工具的使用需要综合考虑成本、效果和便利性</strong>。</p><ul><li>对于简单的日常任务，本地模型完全可以胜任</li></ul><br><ul><li>对于复杂的专业任务，云端API仍然是首选</li></ul><br><ul><li>合理组合使用，才能达到性价比的最优解</li></ul><p>未来的AI使用之路还很长，且用且探索吧！</p><p>---</p><blockquote>技术在进步，成本在变化，保持学习和探索的心态最重要 🌟</blockquote><br></p>`,image:"",audio:""},
{id:5,title:"疲惫的一天",date:"2026-05-17",tags:["生活","随笔"],summary:"记录这疲惫但充实的一天",content:`<p><br><h2>疲惫的一天 ☕</h2><p>今天真的是疲惫的一天，从早上忙到晚上，感觉身体被掏空了。但想想，好像也做了不少事情。</p><h3>上午的忙碌</h3><p>一大早起来就开始处理各种事情，感觉时间过得特别快。连喝口水的时间都差点没有。</p><h3>下午的折腾</h3><p>下午一直在折腾那个博客的自动化部署。先是尝试配置webhook，遇到了一些问题，后来又换用了定时轮询的方式。</p><p>不过好在现在有了 blog-poller，每 2 分钟检查一次，以后再写文章就方便多了！</p><h3>晚上的放松</h3><p>终于到了晚上，可以稍微放松一下了。准备泡杯茶，看看书，早点休息。</p><p>明天又是新的一天！加油！💪<br></p>`,image:"",audio:""},
{id:6,title:"OpenClaw 使用后感：从踩坑到真香，一个普通人的 AI Agent 之旅",date:"2026-05-16",tags:["OpenClaw","AI Agent","大模型","DeepSeek","个人博客","Cloudflare","GitHub Pages","AI 思考"],summary:"从第一次满怀期待却铩羽而归，到如今将它作为日常生产力工具——聊聊我与 OpenClaw 的真实故事",content:`<p><br><blockquote>如果说 2024 年是 AI 大模型的元年，那么 2026 年就是 AI Agent 真正走入普通人生活的拐点。作为一名技术小白，我想聊聊我与 OpenClaw 的故事——从第一次满怀期待却铩羽而归，到如今将它作为日常生产力工具的真实体验。</blockquote><h2>🚀 一、初识 OpenClaw：满怀期待的第一次</h2><p>去年 OpenClaw 刚发布时，我在社交平台刷到了它的介绍——一个可以完全自主执行任务的 AI Agent，能写代码、管理文件、操作浏览器。对于一个对技术充满好奇但毫无基础的人来说，这简直是致命的吸引力。我第一时间就去下载了，然而现实很快给了我一记闷棍。</p><blockquote>⚠️ <strong>当时的困境</strong></blockquote><br><blockquote>安装教程寥寥无几，OpenClaw 优先适配 macOS 和 Linux。作为 Windows 用户，我几乎找不到针对自己系统的详细指引，网上教程大多一笔带过，仿佛 Windows 用户不配使用。</blockquote><h2>🔧 二、Windows 上的艰难安装之路</h2><p>第一次安装时我连命令行都输错了——是的，作为一个纯小白，我对终端的认知还停留在电影里黑客敲键盘的画面。通读文档后我才明白，Windows 上使用 OpenClaw 需要先装两个关键依赖：</p><ul><li><strong>Node.js</strong> — JS 运行时环境，OpenClaw 核心依赖</li></ul><br><ul><li><strong>Git</strong> — 版本控制工具，拉取和更新代码</li></ul><p>装好依赖后，还需要在 PowerShell 中解除脚本执行限制，然后运行一键安装脚本：</p><pre><code># 解除脚本执行限制<br>Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser</p><h1>一键安装</h1><br>iwr -useb https://openclaw.ai/install.ps1 | iex<br></code></pre><p>终端里终于出现安装成功的提示时，我几乎要从椅子上跳起来。但兴奋还没持续多久，新的问题就来了——</p><blockquote>🚫 <strong>初始化配置缺失</strong></blockquote><br><blockquote>安装完成后并没有出现教程里提到的配置向导。后来才了解到，这是 Windows 适配问题，需要手动启动 Gateway 服务后才能进行配置。</blockquote><h2>⚙️ 三、第一次配置：手忙脚乱中摸索</h2><p>找到更详细的教程后，我按步骤依次执行了以下命令：</p><pre><code># 1. 健康检查（推荐第一步执行）<br>openclaw doctor</p><h1>2. 启动 Gateway 网关服务</h1><br>openclaw gateway start</p><h1>3. 执行初始化配置</h1><br>openclaw onboard<br></code></pre><p><strong>第一步：openclaw doctor</strong></p><p>第一次运行就报错说没有安装相关服务组件。Windows 兼容性问题开始显现——很多在 macOS/Linux 上默认就有的东西，Windows 上需要手动处理。</p><p><strong>第二步：openclaw gateway start</strong></p><p>成功启动 Gateway 服务。它是 OpenClaw 的核心运行时，相当于控制入口和路由层，所有会话、渠道和工具都通过它连接。</p><p><strong>第三步：openclaw onboard</strong></p><p>终于进入配置向导！首次配置时很多地方出错，好在后来找到了详细的教学视频，跟着一步步操作，最终顺利完成了配置。</p><p>第一次使用时我没有配置付费 API，而是选择了阿里云百炼平台的免费 Token——每个模型赠送 100 万 Token，对初次体验来说足够了。</p><p><img src="/images/aliyun-bailian.png" alt="阿里云百炼大模型平台" loading="lazy"></p><blockquote>💡 <strong>浏览器界面打不开？</strong></blockquote><br><blockquote>选择使用 UI 时页面显示"无法连接"，排查很久才发现——我把 <code>openclaw gateway start</code> 的服务窗口给关了！Gateway 必须保持运行，浏览器界面才能正常访问。这个低级错误让我哭笑不得。</blockquote><h2>💸 四、免费 Token 的甜蜜与苦涩</h2><p>配置完成后我迫不及待地开始体验。让 OpenClaw 整理文件、从网上爬取图片（效果嘛……全是免费小图片，质量一般），但确实挺方便。然而甜蜜期很快就结束了——免费模型的 Token 开始限速，每分钟只能处理很少的请求，稍微复杂一点的任务就要等很久。</p><p><img src="/images/xiaomi-mimo.png" alt="小米百亿 Token 计划" loading="lazy"></p><p>我试着自己配置 Token，但作为纯小白，连配置在哪里都不知道。好在阿里云每个模型都提供了 100 万免费额度，我就用免费额度让 OpenClaw 自己帮我配置——没错，用 AI 来配置 AI，这操作我自己都觉得离谱。</p><blockquote>坏处也很明显：每个模型只有 100 万 Token，很快就用完了。这点额度只够聊聊天、做做简单任务，完全无法支撑长任务执行。于是第一次的 OpenClaw 体验就这样不了了之，我最终选择了卸载。</blockquote><p>---</p><h2>🔄 五、再次归来：大模型时代的必然选择</h2><p>第二次开始使用 OpenClaw 是最近。短短一年间，AI 的发展速度远超我的想象。之前最大的痛点是<strong>模型不够聪明</strong>和<strong>上下文不够长</strong>，但如今新一代大模型已经彻底改变了这个局面：</p><p>| 模型 | 厂商 | 核心优势 |<br>|------|------|----------|<br>| <strong>GPT-5.5</strong> | OpenAI | 综合能力之王，逻辑推理全面领先 |<br>| <strong>Claude Opus 4.6</strong> | Anthropic | 代码工程能力 SWE-bench 80.8% |<br>| <strong>Gemini 3.1 Pro</strong> | Google | 多模态与搜索整合，长上下文处理 |<br>| <strong>DeepSeek V4</strong> | 深度求索 | 国产性价比之王，百万 Token 仅 0.02 元 |<br>| <strong>Grok 4</strong> | xAI | 实时信息获取与联网能力 |<br>| <strong>通义千问 Qwen3</strong> | 阿里云 | 中文理解能力出色，生态完善 |<br>| <strong>MiMo V2.5</strong> | 小米 | 高性价比 Token Plan，编程助手友好 |</p><p>尤其是 <strong>DeepSeek</strong>，定价策略堪称"价格屠夫"——V4-Flash 版本缓存命中场景下，百万 Token 低至 <strong>0.02 元</strong>，一亿 Token 才两块钱左右。这种极致性价比，完美适配了 AI Agent 的发展需求。</p><blockquote>✅ <strong>价格对比感受</strong></blockquote><br><blockquote>以前用免费 Token，100 万很快就用完还限速。现在用 DeepSeek，同样价格可以买到几百倍的 Token 量，再也不用小心翼翼地"省着用"了。这才是 Agent 能够真正跑起来的基础设施。</blockquote><h2>🌐 六、实战体验：从零搭建个人网站</h2><p>就我个人体验而言，OpenClaw 最直观的价值就是——<strong>打破知识壁垒</strong>。</p><p>我对网站搭建一窍不通。DNS 解析、前端代码、GitHub 部署、Cloudflare 配置……这些名词对我来说就像外星语言。但有了 OpenClaw，我只需要告诉它"我需要搭建一个个人网站"，它就会帮我处理几乎所有事情：</p><ul><li><strong>需求沟通</strong> — 告诉 OpenClaw 我想要什么样的网站，包括页面设计和功能需求</li></ul><br><ul><li><strong>前端开发</strong> — 自动生成 HTML/CSS/JS 代码，包括 3D 樱花浮岛、粒子效果等复杂交互</li></ul><br><ul><li><strong>DNS 配置</strong> — 帮我解决域名解析和 Cloudflare 上的 DNS 设置</li></ul><br><ul><li><strong>GitHub 部署</strong> — 通过 GitHub 仓库直接上传代码，配置 Cloudflare Pages 自动部署</li></ul><br><ul><li><strong>上线运行</strong> — 网站成功上线，包括个人介绍站和博客站</li></ul><p><img src="/images/openclaw-usage.png" alt="OpenClaw 实际使用截图" loading="lazy"></p><p><img src="/images/cloudflare-dashboard.png" alt="Cloudflare 配置截图" loading="lazy"></p><p><img src="/images/github-projects.png" alt="GitHub 项目截图" loading="lazy"></p><p>全程我只需要少量基础知识。页面设计、代码编写、文件上传，OpenClaw 都能很好地完成。虽然有时结果不够完美需要精雕细琢，但<strong>三四天时间就可以完成网站的搭建、运行和各种配置</strong>。对于一个普通人而言，这在以前是无法想象的。</p><h2>📊 七、客观评价：打破知识壁垒的利器</h2><p>使用 OpenClaw 期间，我查看了它的使用数据：</p><p><img src="/images/openclaw-stats.png" alt="OpenClaw 使用统计" loading="lazy"></p><ul><li><strong>317</strong> 条消息总数</li></ul><br><ul><li><strong>14.1M</strong> Token 消耗</li></ul><br><ul><li><strong>202</strong> 次工具调用</li></ul><br><ul><li><strong>97.6%</strong> 缓存命中率</li></ul><p>这些数据背后，是我从一个完全不懂网站搭建的小白，到拥有两个运行中网站的过程。OpenClaw 调用了 140 次 <code>exec</code>（命令执行）、38 次 <code>process</code>（进程管理）、7 次 <code>write</code>（文件写入）和 7 次 <code>edit</code>（文件编辑）——这些原本需要手动完成的操作，全部由 AI Agent 自动执行了。</p><blockquote>大模型加持下的全自动工程，最主要的优点是可以<strong>打破知识壁垒，加速普通人对于新事物的学习和使用</strong>。你不需要成为程序员才能搭建网站，不需要成为设计师才能做出漂亮的页面。AI Agent 让"想法"到"实现"之间的距离，缩短到了前所未有的程度。</blockquote><h2>🤔 八、大模型的问题与冲击</h2><p>但每一次技术革命都伴随着阵痛。大模型的到来，我想百分之八十的人都没有做好准备。</p><h3>劳动方式的转变：从打工人到审核员</h3><p>搭建网站这几天，我的工作模式变成了：把需求告诉 OpenClaw → 喝着水刷着抖音等待 → 检查结果 → 提出修改意见 → 再次等待。这种模式更像是从<strong>"打工人"</strong>变成了<strong>"审核员"</strong>。AI 的工作效率毋庸置疑——一个 AI 加一个人，就能做一个团队的活。</p><blockquote>🔴 <strong>不可避免的冲击</strong></blockquote><br><blockquote>设计、编程、内容创作等职业会面临巨大市场冲击。尤其是以机械重复为主的工作岗位，会被 AI 优先替代。这不是危言耸听，而是正在发生的现实。</blockquote><h3>大模型能替代人类吗？</h3><p>我的答案是：<strong>部分能，但不能全部</strong>。大模型终究是按部就班的机器，程序是死的。就算学习能力再强，它也无法承担责任。因此，<strong>越依赖经验、越需要承担责任的行业，被替代率越低</strong>。</p><p>| 类别 | 被替代风险 | 原因 |<br>|------|-----------|------|<br>| 机械重复型工作 | 极高 | AI 擅长模式化和标准化任务 |<br>| 设计 / 编程 / 内容创作 | 较高 | AI 效率远超个人，但顶级创意仍需人类 |<br>| 需要承担责任的工作 | 较低 | 法律、医疗决策等需要人类担责 |<br>| 依赖深度经验的工作 | 很低 | 复杂判断和人际互动难以被替代 |</p><h3>失业问题的本质</h3><p>未来的 AI 是"提出建议和执行建议的行为人"，而我们则是"审核员"和"监督员"。很多岗位会被替代，失业人口会增加，生产力会极速提高。但我认为，失业的主要原因<strong>不是大模型在代替人类</strong>，而是<strong>生产力和需求的长期不平衡</strong>——需求少于生产力引起的结构性失业。</p><blockquote>解决 AI 和人类就业问题的最主要方式，不是阻止 AI 发展，而是<strong>增加需求、扩大消费</strong>，确保经济可以内外循环，让经济具备弹性。当生产力极大提升时，我们需要新的需求增长点来吸纳这些生产力。</blockquote><p>不过这个问题在最近一段时间不必过度关心。目前的需求和算力资源都是富余的，大模型也没有大规模入场，对于普通生产生活还需要一段适配期。</p><p>---</p><h2>🌟 九、写在最后：未来已来</h2><p>回顾使用 OpenClaw 的这段经历，从第一次满怀期待却铩羽而归，到如今的得心应手，我深刻感受到了 AI 技术的飞速进步。以前搭建网站需要学习 HTML、CSS、JavaScript，需要了解服务器配置、域名解析、DNS 设置……现在，你只需要会"说话"就行。</p><p>未来已来，大模型必将成为生产发展中不可或缺的力量。与其恐惧被替代，不如学会与 AI 协作，成为那个"审核员"和"监督员"。毕竟，<strong>淘汰你的不是 AI，而是会用 AI 的人</strong>。</p><blockquote>💡 <strong>写在最后的话</strong></blockquote><br><blockquote>这篇文章本身就是我用 OpenClaw 辅助完成的。从内容梳理到排版优化，AI 帮了我很多忙。但最终的观点、感受和判断，都是我自己的。这或许就是未来人机协作的最佳模式——AI 负责执行，人类负责思考和决策。</blockquote><br></p>`,image:"",audio:""},
{id:7,title:"周末的一天",date:"2026-05-16",tags:["生活","随笔"],summary:"记录这个周末的点点滴滴，从早到晚的琐碎日常。",content:`<p><br><h2>清晨</h2><br>周末的早晨总是醒得比工作日早。拉开窗帘，阳光洒进来，又是新的一天。</p><h2>上午</h2><br>泡了一杯咖啡，打开电脑看了会代码。最近在研究 Three.js，想做个3D小岛的互动页面。</p><blockquote>好的工具能让生活更高效，所以总是在造轮子的路上。</blockquote><h2>下午</h2><br>出门走了走，春天的风很舒服。路过一家新开的咖啡店，装修很有格调。</p><h3>关于设计</h3><br>好的设计不是加法，而是减法。留白、节奏、层次，这些比花哨的效果更重要。</p><h2>晚上</h2><br>回来继续写博客系统。用纯 HTML + CSS + JS 搭了一个单文件博客，零依赖。</p><pre><code>const articles = [{ id: 1, title: "周末的一天" }];<br></code></pre><br>这就是我的周末，平淡但充实。<br></p>`,image:"",audio:""},
{id:8,title:"Hello World - 我的第一篇博客",date:"2026-05-15",tags:["技术","前端"],summary:"欢迎来到我的博客！这是我的第一篇文章，记录搭建博客的过程。",content:`<p><br><h2>为什么写博客</h2><br>一直想有个自己的博客，记录学习和生活。之前用过 WordPress、Hugo，这次想试试最纯粹的方式：纯静态 HTML，一个文件搞定一切。</p><h2>技术选型</h2><br>最终选择了：<br><ul><li>HTML5 + CSS3 + 原生 JavaScript- 零 npm 依赖- Cloudflare Pages 部署</li></ul><br><h2>Hello World</h2><br>这是每程序员的第一步。从这个简单的输出开始，到搭建完整的博客系统，每一步都是学习。</p><pre><code>console.log("Hello World!");<br></code></pre><br>期待在这里记录更多有趣的故事。<br></p>`,image:"",audio:""}
];
// ===== ARTICLES_END =====

// 按日期倒序排列（最新在最上面）
articles.sort((a,b) => new Date(b.date) - new Date(a.date));

// ===== 评论系统 =====
function getComments(id){try{return JSON.parse(localStorage.getItem('cmt_'+id)||'[]')}catch{return[]}}
function saveComment(id,c){const list=getComments(id);list.push(c);localStorage.setItem('cmt_'+id,JSON.stringify(list))}
function deleteComment(id,idx){const list=getComments(id);list.splice(idx,1);localStorage.setItem('cmt_'+id,JSON.stringify(list))}
function totalComments(){let n=0;articles.forEach(a=>n+=getComments(a.id).length);return n}

// ===== 状态 =====
let curArt=null,isDark=true;

// ===== Init =====
document.addEventListener('DOMContentLoaded',()=>{
  history.scrollRestoration='manual';window.scrollTo(0,0);
  renderCards();updateStats();initScroll();initQuote();initUptime();initArchives();
});

// ===== Render Cards =====
const PER_PAGE=30;let curPage=1;
function renderCards(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const mf=window._monthFilter;
  const list=articles.filter(a=>{
    const monthOk=!mf||a.date.startsWith(mf);
    const sOk=!q||a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)||a.content.toLowerCase().includes(q);
    return monthOk&&sOk;
  });
  const totalPages=Math.ceil(list.length/PER_PAGE)||1;
  if(curPage>totalPages)curPage=totalPages;
  const paged=list.slice((curPage-1)*PER_PAGE,curPage*PER_PAGE);
  const el=document.getElementById('cards');
  el.innerHTML=paged.map((a,i)=>{
    const cmts=getComments(a.id).length;
    return `<div class="card" onclick="showDetail(${a.id})" style="animation-delay:${i*60}ms">
      <div class="card-top">
        <div class="card-title">${a.title}</div>
        <div class="card-date">📅 ${a.date}</div>
      </div>
      <div class="card-summary">${a.summary}</div>
      <div class="card-bottom">
        ${a.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}
        <span class="card-comments">💬 ${cmts}</span>
      </div>
    </div>`;
  }).join('');
  // Pagination
  let pag='';
  if(totalPages>1){
    pag='<div style="display:flex;justify-content:center;gap:.5rem;margin-top:1.5rem;flex-wrap:wrap">';
    if(curPage>1)pag+=`<button onclick="goPage(${curPage-1})" class="tag-btn">← 上一页</button>`;
    for(let p=1;p<=totalPages;p++){
      pag+=`<button onclick="goPage(${p})" class="tag-btn${p===curPage?' active':''}">${p}</button>`;
    }
    if(curPage<totalPages)pag+=`<button onclick="goPage(${curPage+1})" class="tag-btn">下一页 →</button>`;
    pag+='</div>';
  }
  el.innerHTML+=pag;
  requestAnimationFrame(()=>el.querySelectorAll('.card').forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),i*60)));
  // Side recent
  document.getElementById('sideRecent').innerHTML=articles.slice(0,4).map(a=>`<div style="font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--tx2)" onclick="showDetail(${a.id})">${a.title}</div>`).join('');
}
function goPage(p){curPage=p;renderCards();window.scrollTo({top:0,behavior:'smooth'})}

// ===== Detail =====
function showDetail(id,noPush){
  const a=articles.find(x=>x.id===id);if(!a)return;curArt=a;
  document.getElementById('homeView').style.display='none';
  const d=document.getElementById('detailView');
  d.className='detail active';
  const cmts=getComments(a.id);
  d.innerHTML=`
    <div class="back-btn" onclick="showHome()">← 返回</div>
    <div class="d-meta">
      <h1>${a.title}</h1>
      <div class="d-info"><span>📅 ${a.date}</span><span>🏷️ ${a.tags.join(', ')}</span><span>💬 ${cmts.length} 条评论</span></div>
    </div>
    <div class="d-content" id="dContent">${a.content}</div>
    <div class="comments">
      <h3>💬 评论 (${cmts.length})</h3>
      <div class="comment-form">
        <textarea id="cmtText" placeholder="写下你的评论..."></textarea>
        <div class="row">
          <input id="cmtName" placeholder="你的名字" value="${localStorage.getItem('cmt_name')||''}">
          <button onclick="postComment(${a.id})">发表</button>
        </div>
      </div>
      <div class="cmt-list" id="cmtList">${renderCmts(a.id)}</div>
    </div>`;
  // Code copy
  d.querySelectorAll('pre').forEach(pre=>{
    const w=document.createElement('div');w.className='code-wrap';w.style.position='relative';
    pre.parentNode.insertBefore(w,pre);w.appendChild(pre);
    const b=document.createElement('button');b.className='copy-btn';b.textContent='复制';
    b.onclick=e=>{e.stopPropagation();navigator.clipboard.writeText(pre.textContent).then(()=>{b.textContent='✓';setTimeout(()=>b.textContent='复制',1200)})};
    w.appendChild(b);
  });
  d.querySelectorAll('.d-content img').forEach(img=>{img.style.cursor='zoom-in';img.onclick=()=>openLB(img.src)});
  buildTOC();
  scrollTo({top:0,behavior:'smooth'});
  if(!noPush) history.pushState({id:id},'',location.pathname+'#/post/'+id);
}

function renderCmts(id){
  return getComments(id).map((c,i)=>`<div class="cmt">
    <div class="cmt-top"><div class="cmt-avatar">👤</div><div class="cmt-name">${esc(c.name)}</div><div class="cmt-time">${c.time}</div><span class="cmt-delete" onclick="delCmt(${id},${i})">删除</span></div>
    <div class="cmt-text">${esc(c.text)}</div>
  </div>`).join('')||'<div style="font-size:.85rem;color:var(--tx3)">暂无评论，来说点什么吧 ✍️</div>';
}

function postComment(id){
  const text=document.getElementById('cmtText').value.trim();
  const name=document.getElementById('cmtName').value.trim()||'匿名';
  if(!text)return;
  localStorage.setItem('cmt_name',name);
  saveComment(id,{name,text,time:new Date().toLocaleString('zh-CN')});
  document.getElementById('cmtText').value='';
  document.getElementById('cmtList').innerHTML=renderCmts(id);
  updateStats();
}

function delCmt(id,idx){deleteComment(id,idx);document.getElementById('cmtList').innerHTML=renderCmts(id);updateStats()}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function showHome(noPush){
  curArt=null;
  document.getElementById('homeView').style.display='block';
  document.getElementById('detailView').className='detail';
  document.getElementById('toc').innerHTML='';
  renderCards();
  if(!noPush) history.pushState({id:null},'',location.pathname+'#/');
}

// ===== TOC =====
function buildTOC(){
  const c=document.getElementById('dContent');const t=document.getElementById('toc');
  const hs=c.querySelectorAll('h2,h3');if(hs.length<2){t.innerHTML='';return}
  t.innerHTML='<div style="font-weight:600;margin-bottom:.4rem;color:var(--tx);font-size:.8rem">目录</div>'+
    [...hs].map((h,i)=>{h.id='h'+i;return`<a class="${h.tagName==='H3'?'h3':''}" href="#h${i}" onclick="event.preventDefault();document.getElementById('h${i}').scrollIntoView({behavior:'smooth',block:'start'})">${h.textContent}</a>`}).join('');
  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){t.querySelectorAll('a').forEach(a=>a.classList.remove('active'));const l=t.querySelector(`a[href="#${e.target.id}"]`);if(l)l.classList.add('active')}}),{rootMargin:'-20% 0px -70% 0px'});
  hs.forEach(h=>obs.observe(h));
}

// ===== Search =====
function toggleSearch(){document.getElementById('searchWrap').classList.toggle('active');if(document.getElementById('searchWrap').classList.contains('active'))document.getElementById('searchInput').focus()}
function toggleSide(){document.getElementById('side').classList.toggle('open');document.getElementById('sideMask').classList.toggle('on')}

// ===== Theme =====
function toggleTheme(){
  isDark=!isDark;
  const s=document.documentElement.style;
  s.setProperty('--bg',isDark?'#0a0a0f':'#f5f5f5');
  s.setProperty('--bg2',isDark?'#12121a':'#fff');
  s.setProperty('--bg3',isDark?'#1a1a25':'#f0f0f0');
  s.setProperty('--bg4',isDark?'#222230':'#e0e0e0');
  s.setProperty('--bdr',isDark?'#2a2a3a':'#ddd');
  s.setProperty('--bdr2',isDark?'#3a3a50':'#ccc');
  s.setProperty('--tx',isDark?'#eee':'#1a1a1a');
  s.setProperty('--tx2',isDark?'#aaa':'#555');
  s.setProperty('--tx3',isDark?'#666':'#999');
  document.querySelector('.nav-r button:last-child').textContent=isDark?'🌙':'☀️';
}

// ===== Stats =====
function updateStats(){
  document.getElementById('statPosts').textContent=articles.length;
  const tags=new Set();articles.forEach(a=>a.tags.forEach(t=>tags.add(t)));
  document.getElementById('statTags').textContent=tags.size;
  document.getElementById('statComments').textContent=totalComments();
}

// ===== 站点运行时间 =====
const SITE_START=new Date('2026-05-15');
function initUptime(){
  function update(){
    const now=new Date();
    const diff=now-SITE_START;
    const days=Math.floor(diff/(1000*60*60*24));
    const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const mins=Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById('sideUptime').innerHTML=`<span style="color:var(--ac)">●</span> 已运行 <b>${days}</b> 天 <b>${hours}</b> 时 <b>${mins}</b> 分`;
  }
  update();setInterval(update,60000);
}

// ===== 文章归档 =====
let curArchiveYear=null,curArchiveMonth=null;
function initArchives(){
  const years={};
  articles.forEach(a=>{
    const y=a.date.substring(0,4);
    const m=a.date.substring(0,7);
    if(!years[y])years[y]={};
    if(!years[y][m])years[y][m]=0;
    years[y][m]++;
  });
  const sorted=Object.keys(years).sort().reverse();
  renderArchives(sorted,years);
}
function renderArchives(sorted,years){
  const el=document.getElementById('sideArchives');
  if(!curArchiveYear){
    // Show years
    el.innerHTML=sorted.map(y=>{
      const count=Object.values(years[y]).reduce((a,b)=>a+b,0);
      return `<div style="display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--tx2)" onclick="pickYear('${y}')"><span>📁 ${y} 年</span><span style="color:var(--tx3)">${count} 篇 ▸</span></div>`;
    }).join('');
  } else {
    // Show months for selected year
    const months=years[curArchiveYear];
    const sortedM=Object.keys(months).sort().reverse();
    let html=`<div style="font-size:.78rem;color:var(--tx3);padding:.3rem 0;cursor:pointer;margin-bottom:.3rem" onclick="pickYear(null)">← 返回全部年份</div>`;
    html+=`<div style="font-size:.82rem;font-weight:600;color:var(--ac);padding:.3rem 0;border-bottom:1px solid var(--bdr);margin-bottom:.3rem">${curArchiveYear} 年</div>`;
    html+=sortedM.map(m=>{
      const mo=parseInt(m.split('-')[1]);
      const active=curArchiveMonth===m;
      return `<div style="display:flex;justify-content:space-between;font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:${active?'var(--ac)':'var(--tx2)'};font-weight:${active?'600':'400'}" onclick="pickMonth('${m}')"><span>${mo} 月</span><span style="color:var(--tx3)">${months[m]} 篇</span></div>`;
    }).join('');
    html+=`<div style="font-size:.78rem;color:var(--ac);padding:.4rem 0;cursor:pointer;text-align:center;margin-top:.3rem" onclick="pickMonth(null)">查看全部</div>`;
    el.innerHTML=html;
  }
}
function pickYear(y){
  curArchiveYear=y;curArchiveMonth=null;curPage=1;
  window._monthFilter=null;
  const years={};
  articles.forEach(a=>{
    const yr=a.date.substring(0,4);
    const m=a.date.substring(0,7);
    if(!years[yr])years[yr]={};
    if(!years[yr][m])years[yr][m]=0;
    years[yr][m]++;
  });
  renderArchives(Object.keys(years).sort().reverse(),years);
  renderCards();
}
function pickMonth(m){
  curArchiveMonth=m;curPage=1;
  window._monthFilter=m;
  const years={};
  articles.forEach(a=>{
    const yr=a.date.substring(0,4);
    const mo=a.date.substring(0,7);
    if(!years[yr])years[yr]={};
    if(!years[yr][mo])years[yr][mo]=0;
    years[yr][mo]++;
  });
  renderArchives(Object.keys(years).sort().reverse(),years);
  renderCards();
}

// ===== Lightbox =====
function openLB(s){document.getElementById('lbImg').src=s;document.getElementById('lb').classList.add('on')}

// ===== Scroll =====
function initScroll(){
  const nav=document.getElementById('nav'),prog=document.getElementById('progress'),bt=document.getElementById('btop');
  window.addEventListener('scroll',()=>{
    const y=scrollY;
    nav.classList.toggle('scrolled',y>10);
    const h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=h>0?(y/h*100)+'%':'0%';
    bt.classList.toggle('on',y>400);
  });
  window.addEventListener('popstate',e=>{
    if(e.state&&e.state.id)showDetail(e.state.id,true);
    else showHome(true);
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('lb').classList.contains('on'))document.getElementById('lb').classList.remove('on');else if(curArt)showHome()}});
}
</script>
