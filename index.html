<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yadong's Blog</title>
<style>
/* ===== Reset ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--bg-card:#161616;--bg-card-hover:#1c1c1c;
  --border:#222;--border-hover:#333;
  --text:#e8e8e8;--text-sec:#999;--text-muted:#555;
  --accent:#00f0a8;--accent-soft:rgba(0,240,168,.1);
  --accent-glow:rgba(0,240,168,.25);
  --radius:12px;--radius-sm:8px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  --mono:'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace;
  --max-w:860px;--nav-h:56px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ===== Reading Progress ===== */
#progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:1001;width:0;transition:width .1s}

/* ===== Nav ===== */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2rem);background:rgba(13,13,13,.6);backdrop-filter:blur(0px);transition:backdrop-filter .3s,border-color .3s;border-bottom:1px solid transparent}
.nav.scrolled{backdrop-filter:blur(20px);border-bottom-color:var(--border)}
.nav-title{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{font-size:.85rem;color:var(--text-sec);transition:color .2s}
.nav-links a:hover{color:var(--text);text-decoration:none}
#theme-toggle{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-sec);transition:color .2s}
#theme-toggle:hover{color:var(--text)}
#search-toggle{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text-sec)}

/* ===== Hero ===== */
.hero{padding:calc(var(--nav-h) + 3rem) clamp(1rem,4vw,2rem) 2rem;max-width:var(--max-w);margin:0 auto}
.hero h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:800;letter-spacing:-.03em;margin-bottom:.5rem}
.hero p{color:var(--text-sec);font-size:1rem}

/* ===== Search Bar ===== */
.search-wrap{max-width:var(--max-w);margin:0 auto;padding:0 clamp(1rem,4vw,2rem);display:none}
.search-wrap.active{display:block}
.search-input{width:100%;padding:.75rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.9rem;font-family:var(--font);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-muted)}

/* ===== Tags ===== */
.tags-bar{max-width:var(--max-w);margin:1rem auto;padding:0 clamp(1rem,4vw,2rem);display:flex;gap:.5rem;flex-wrap:wrap}
.tag-btn{padding:.35rem .85rem;border-radius:999px;font-size:.78rem;font-weight:500;background:var(--bg-card);border:1px solid var(--border);color:var(--text-sec);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tag-btn:hover,.tag-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

/* ===== Article Grid ===== */
.articles{max-width:var(--max-w);margin:1rem auto;padding:0 clamp(1rem,4vw,2rem) 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.article-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;opacity:0;transform:translateY(20px)}
.article-card.visible{opacity:1;transform:translateY(0)}
.article-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:var(--border-hover)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg-card-hover)}
.card-img.lazy{filter:blur(10px);transition:filter .5s}
.card-img.loaded{filter:blur(0)}
.card-body{padding:1.1rem 1.2rem}
.card-date{font-size:.75rem;color:var(--text-muted);margin-bottom:.4rem}
.card-title{font-size:1rem;font-weight:600;margin-bottom:.4rem;line-height:1.4}
.card-summary{font-size:.85rem;color:var(--text-sec);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;gap:.35rem;margin-top:.7rem;flex-wrap:wrap}
.card-tag{font-size:.7rem;padding:.15rem .5rem;border-radius:999px;background:var(--accent-soft);color:var(--accent)}

/* ===== Article Detail ===== */
.detail{display:none;max-width:var(--max-w);margin:0 auto;padding:calc(var(--nav-h) + 2rem) clamp(1rem,4vw,2rem) 4rem}
.detail.active{display:block}
.detail-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--text-sec);margin-bottom:1.5rem;cursor:pointer}
.detail-back:hover{color:var(--accent);text-decoration:none}
.detail-meta{margin-bottom:1.5rem}
.detail-meta h1{font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:800;letter-spacing:-.02em;margin-bottom:.5rem}
.detail-meta .meta-line{font-size:.82rem;color:var(--text-muted);display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.detail-cover{width:100%;border-radius:var(--radius);margin-bottom:1.5rem;max-height:400px;object-fit:cover}
.detail-content{font-size:1rem;line-height:1.85;color:var(--text)}
.detail-content h2{font-size:1.4rem;font-weight:700;margin:2rem 0 .8rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.detail-content h3{font-size:1.15rem;font-weight:600;margin:1.5rem 0 .6rem}
.detail-content p{margin-bottom:1rem}
.detail-content img{max-width:100%;border-radius:var(--radius-sm);cursor:pointer;transition:transform .3s}
.detail-content img:hover{transform:scale(1.01)}
.detail-content pre{background:#1a1a1a;border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;overflow-x:auto;margin:1rem 0;position:relative;font-size:.85rem}
.detail-content code{font-family:var(--mono);font-size:.85rem}
.detail-content :not(pre)>code{background:#1a1a1a;padding:.15rem .4rem;border-radius:4px;font-size:.82rem}
.detail-content blockquote{border-left:3px solid var(--accent);padding:.8rem 1rem;margin:1rem 0;background:var(--accent-soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--text-sec)}
.detail-content ul,.detail-content ol{padding-left:1.5rem;margin-bottom:1rem}
.detail-content li{margin-bottom:.3rem}
.detail-content table{width:100%;border-collapse:collapse;margin:1rem 0}
.detail-content th,.detail-content td{padding:.5rem .8rem;border:1px solid var(--border);text-align:left;font-size:.9rem}
.detail-content th{background:var(--bg-card);font-weight:600}

/* Audio Player */
.audio-player{margin:1.5rem 0;padding:1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:1rem}
.audio-player audio{flex:1;height:36px}

/* Code Copy */
.code-wrap{position:relative}
.copy-btn{position:absolute;top:.5rem;right:.5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:.25rem .6rem;font-size:.72rem;color:var(--text-sec);cursor:pointer;transition:all .2s;font-family:var(--font);z-index:1}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.copied{border-color:var(--accent);color:var(--accent)}

/* TOC Sidebar */
.toc-sidebar{position:fixed;top:calc(var(--nav-h) + 1rem);right:clamp(1rem,3vw,3rem);width:200px;max-height:calc(100vh - var(--nav-h) - 2rem);overflow-y:auto;font-size:.78rem;display:none;z-index:100}
.detail.active ~ .toc-sidebar{display:block}
.toc-sidebar a{display:block;padding:.25rem 0;color:var(--text-muted);transition:color .2s;line-height:1.4}
.toc-sidebar a:hover,.toc-sidebar a.active{color:var(--accent);text-decoration:none}
.toc-sidebar .toc-h3{padding-left:1rem}
@media(max-width:1100px){.toc-sidebar{display:none!important}}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:var(--radius-sm)}

/* Back to Top */
#back-top{position:fixed;bottom:2rem;right:2rem;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#0d0d0d;border:none;font-size:1.1rem;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;z-index:1000;display:flex;align-items:center;justify-content:center}
#back-top.visible{opacity:1;transform:translateY(0)}
#back-top:hover{box-shadow:0 0 20px var(--accent-glow)}

/* Page Load Animation */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:fadeInUp .5s ease forwards}

/* Footer */
.footer{text-align:center;padding:2rem;color:var(--text-muted);font-size:.78rem;border-top:1px solid var(--border)}

/* ===== Responsive ===== */
@media(max-width:768px){
  .articles{grid-template-columns:1fr}
  .nav-links .hide-mobile{display:none}
  .toc-sidebar{display:none!important}
  .detail-content pre{font-size:.8rem;padding:.8rem}
}
@media(min-width:1400px){
  .articles{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- Reading Progress -->
<div id="progress"></div>

<!-- Nav -->
<nav class="nav" id="nav">
  <a href="#" class="nav-title" onclick="showHome();return false">Yadong's Blog</a>
  <div class="nav-links">
    <button id="search-toggle" onclick="toggleSearch()" title="搜索">🔍</button>
    <button id="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    <a href="#about" class="hide-mobile">关于</a>
  </div>
</nav>

<!-- Search -->
<div class="search-wrap" id="searchWrap">
  <input class="search-input" id="searchInput" type="text" placeholder="搜索文章标题或内容..." oninput="filterArticles()">
</div>

<!-- Tags -->
<div class="tags-bar" id="tagsBar"></div>

<!-- Home: Article List -->
<div id="homePage">
  <div class="hero page-enter">
    <h1>📝 我的博客</h1>
    <p>记录想法、技术与生活。</p>
  </div>
  <div class="articles" id="articleGrid"></div>
</div>

<!-- Detail -->
<div class="detail" id="detailPage"></div>

<!-- TOC Sidebar -->
<div class="toc-sidebar" id="tocSidebar"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Back to Top -->
<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- Footer -->
<div class="footer" id="footer">© 2026 Yadong's Blog · Made with ❤️</div>

<script>
// ===== Article Data =====
const articles = [
  {
    "id": 1,
    "title": "Hello World - 我的第一篇博客",
    "date": "2026-05-15",
    "tags": [
      "技术",
      "前端"
    ],
    "summary": "欢迎来到我的博客！这是我的第一篇文章，记录搭建博客的过程。",
    "content": "<p><br><h2>为什么写博客</h2></p><p>一直想有个自己的博客，记录学习和生活。之前用过 WordPress、Hugo，这次想试试最纯粹的方式：纯静态 HTML，一个文件搞定一切。</p><p><h2>技术选型</h2></p><p>最终选择了：</p><p><ul><li>HTML5 + CSS3 + 原生 JavaScript</li></ul><br><ul><li>零 npm 依赖</li></ul><br><ul><li>Cloudflare Pages 部署</li></ul></p><p><h2>Hello World</h2></p><p>这是每程序员的第一步。从这个简单的输出开始，到搭建完整的博客系统，每一步都是学习。</p><p><pre><code class=\"language-javascript\">console.log(\"Hello World!\");<br></code></pre></p><p>期待在这里记录更多有趣的故事。<br></p>",
    "image": "",
    "audio": ""
  }
];

// ===== State =====
let currentTag = null;
let currentArticle = null;
let isDark = true;

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  initTags();
  renderArticles();
  initScrollEffects();
});

// ===== Tags =====
function initTags() {
  const tagSet = new Set();
  articles.forEach(a => a.tags.forEach(t => tagSet.add(t)));
  const bar = document.getElementById('tagsBar');
  bar.innerHTML = '<button class="tag-btn active" onclick="selectTag(null)">全部</button>';
  [...tagSet].sort().forEach(t => {
    bar.innerHTML += `<button class="tag-btn" onclick="selectTag('${t}')">${t}</button>`;
  });
}

function selectTag(tag) {
  currentTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', 
    (tag === null && b.textContent === '全部') || b.textContent === tag
  ));
  renderArticles();
}

// ===== Render Articles =====
function renderArticles(filter = '') {
  const grid = document.getElementById('articleGrid');
  const q = filter.toLowerCase();
  const list = articles.filter(a => {
    const tagOk = !currentTag || a.tags.includes(currentTag);
    const searchOk = !q || a.title.toLowerCase().includes(q) || a.summary.toLowerCase().includes(q) || a.content.toLowerCase().includes(q);
    return tagOk && searchOk;
  });
  
  grid.innerHTML = list.map((a, i) => `
    <div class="article-card" onclick="showArticle(${a.id})" style="animation-delay:${i * 80}ms">
      ${a.image ? `<img class="card-img lazy" data-src="${a.image}" alt="${a.title}">` : ''}
      <div class="card-body">
        <div class="card-date">${a.date}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-summary">${a.summary}</div>
        <div class="card-tags">${a.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');

  // Staggered fade-in
  requestAnimationFrame(() => {
    grid.querySelectorAll('.article-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 80);
    });
  });

  // Lazy load images
  lazyLoadImages();
}

// ===== Lazy Load =====
function lazyLoadImages() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const img = e.target;
        if (img.dataset.src) {
          img.src = img.dataset.src;
          img.onload = () => img.classList.add('loaded');
          img.removeAttribute('data-src');
        }
        observer.unobserve(img);
      }
    });
  }, { rootMargin: '200px' });
  document.querySelectorAll('.card-img.lazy').forEach(img => observer.observe(img));
}

// ===== Show Article =====
function showArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  currentArticle = a;
  
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('tagsBar').style.display = 'none';
  document.getElementById('searchWrap').classList.remove('active');
  
  const detail = document.getElementById('detailPage');
  detail.className = 'detail active page-enter';
  detail.innerHTML = `
    <a class="detail-back" onclick="showHome()">← 返回列表</a>
    <div class="detail-meta">
      <h1>${a.title}</h1>
      <div class="meta-line">
        <span>📅 ${a.date}</span>
        <span>🏷️ ${a.tags.join(', ')}</span>
      </div>
    </div>
    ${a.image ? `<img class="detail-cover" src="${a.image}" alt="${a.title}" onclick="openLightbox(this.src)">` : ''}
    ${a.audio ? `
    <div class="audio-player">
      <span>🎧</span>
      <audio controls preload="metadata"><source src="${a.audio}"></audio>
    </div>` : ''}
    <div class="detail-content" id="detailContent">${a.content}</div>
  `;

  // Add code copy buttons
  detail.querySelectorAll('pre').forEach(pre => {
    const wrap = document.createElement('div');
    wrap.className = 'code-wrap';
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制';
    btn.onclick = (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(pre.textContent).then(() => {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
      });
    };
    wrap.appendChild(btn);
  });

  // Add click-to-zoom on content images
  detail.querySelectorAll('.detail-content img').forEach(img => {
    img.style.cursor = 'zoom-in';
    img.onclick = () => openLightbox(img.src);
  });

  // Build TOC
  buildTOC();
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== Show Home =====
function showHome() {
  currentArticle = null;
  document.getElementById('homePage').style.display = 'block';
  document.getElementById('tagsBar').style.display = 'flex';
  document.getElementById('detailPage').className = 'detail';
  document.getElementById('tocSidebar').innerHTML = '';
  renderArticles();
}

// ===== TOC =====
function buildTOC() {
  const content = document.getElementById('detailContent');
  const sidebar = document.getElementById('tocSidebar');
  const headings = content.querySelectorAll('h2, h3');
  if (headings.length < 2) { sidebar.innerHTML = ''; return; }
  
  sidebar.innerHTML = '<div style="font-weight:600;margin-bottom:.5rem;color:var(--text)">目录</div>' +
    [...headings].map((h, i) => {
      h.id = 'toc-' + i;
      const cls = h.tagName === 'H3' ? 'toc-h3' : '';
      return `<a class="${cls}" href="#toc-${i}" onclick="event.preventDefault();document.getElementById('toc-${i}').scrollIntoView({behavior:'smooth',block:'start'})">${h.textContent}</a>`;
    }).join('');

  // Active TOC highlight
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        sidebar.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        const link = sidebar.querySelector(`a[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  headings.forEach(h => obs.observe(h));
}

// ===== Search =====
function toggleSearch() {
  const wrap = document.getElementById('searchWrap');
  wrap.classList.toggle('active');
  if (wrap.classList.contains('active')) {
    document.getElementById('searchInput').focus();
  }
}

function filterArticles() {
  renderArticles(document.getElementById('searchInput').value);
}

// ===== Theme =====
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.style.setProperty('--bg', isDark ? '#0d0d0d' : '#f5f5f5');
  document.documentElement.style.setProperty('--bg-card', isDark ? '#161616' : '#fff');
  document.documentElement.style.setProperty('--bg-card-hover', isDark ? '#1c1c1c' : '#fafafa');
  document.documentElement.style.setProperty('--border', isDark ? '#222' : '#e0e0e0');
  document.documentElement.style.setProperty('--border-hover', isDark ? '#333' : '#ccc');
  document.documentElement.style.setProperty('--text', isDark ? '#e8e8e8' : '#1a1a1a');
  document.documentElement.style.setProperty('--text-sec', isDark ? '#999' : '#666');
  document.documentElement.style.setProperty('--text-muted', isDark ? '#555' : '#999');
  document.getElementById('theme-toggle').textContent = isDark ? '🌙' : '☀️';
}

// ===== Lightbox =====
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

// ===== Scroll Effects =====
function initScrollEffects() {
  const nav = document.getElementById('nav');
  const progress = document.getElementById('progress');
  const backTop = document.getElementById('back-top');

  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    // Nav blur
    nav.classList.toggle('scrolled', y > 10);
    // Progress bar
    const h = document.documentElement.scrollHeight - window.innerHeight;
    progress.style.width = h > 0 ? (y / h * 100) + '%' : '0%';
    // Back to top
    backTop.classList.toggle('visible', y > 400);
  });

  // Keyboard shortcut: Escape to go back
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('lightbox').classList.contains('active')) closeLightbox();
      else if (currentArticle) showHome();
    }
  });
}
</script>
</body>
</html>
