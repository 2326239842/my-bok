{{ if .Site.Params.comments }}
<section class="comments" style="margin-top:2rem;padding:1.5rem;background:var(--entry-content-bg,#f8f9fa);border-radius:8px">
  <h2 style="font-size:1.2rem;margin-bottom:.5rem">💬 评论区</h2>
  <p style="color:var(--entry-content-color,#666);font-size:.85rem;margin-bottom:1rem">欢迎留言交流，支持匿名评论</p>
  
  <!-- 评论列表 -->
  <div id="cmtList" style="margin-bottom:1.2rem"></div>
  
  <!-- 评论表单 -->
  <div style="background:var(--entry-content-bg,#fff);border:1px solid #e0e0e0;border-radius:8px;padding:1rem">
    <textarea id="cmtContent" placeholder="写下你的评论..." style="width:100%;min-height:80px;padding:.6rem;border:1px solid #ddd;border-radius:6px;font-family:inherit;font-size:.9rem;resize:vertical;outline:none;background:#fff;color:#333" onfocus="this.style.borderColor='#4a90d9'" onblur="this.style.borderColor='#ddd'"></textarea>
    <div style="display:flex;gap:.5rem;margin-top:.6rem;align-items:center">
      <input id="cmtName" placeholder="你的名字（选填）" style="flex:1;padding:.45rem .6rem;border:1px solid #ddd;border-radius:6px;font-size:.85rem;outline:none;background:#fff;color:#333" onfocus="this.style.borderColor='#4a90d9'" onblur="this.style.borderColor='#ddd'">
      <button onclick="postComment()" style="padding:.45rem 1rem;background:#4a90d9;color:#fff;border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit" onmouseover="this.style.background='#3a7bc8'" onmouseout="this.style.background='#4a90d9'">发表</button>
    </div>
  </div>

  <script>
  (function(){
    const slug = '{{ .File.ContentBaseName }}';
    const API = '/api/comments';
    
    // 加载评论
    fetch(API + '?slug=' + slug)
      .then(r => r.json())
      .then(data => {
        if (data.ok && data.comments.length > 0) {
          renderComments(data.comments);
        } else {
          document.getElementById('cmtList').innerHTML = '<p style="color:#999;font-size:.85rem">暂无评论，来说点什么吧 ✍️</p>';
        }
      });

    function renderComments(list) {
      const el = document.getElementById('cmtList');
      el.innerHTML = list.map(c => {
        const d = new Date(c.time);
        const time = d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
        const initial = (c.name || '匿名')[0];
        return '<div style="background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:.8rem 1rem;margin-bottom:.6rem">' +
          '<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem">' +
            '<div style="width:28px;height:28px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:#4a90d9;font-weight:600">' + initial + '</div>' +
            '<span style="font-size:.85rem;font-weight:600;color:#333">' + esc(c.name || '匿名') + '</span>' +
            '<span style="font-size:.72rem;color:#999;margin-left:auto">' + time + '</span>' +
          '</div>' +
          '<div style="font-size:.88rem;color:#555;line-height:1.6;padding-left:2.1rem">' + esc(c.content) + '</div>' +
        '</div>';
      }).join('');
    }

    window.postComment = function() {
      var content = document.getElementById('cmtContent').value.trim();
      var name = document.getElementById('cmtName').value.trim();
      if (!content) return alert('请输入评论内容');
      
      fetch(API, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ slug: slug, name: name || '匿名', content: content })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          document.getElementById('cmtContent').value = '';
          // 重新加载评论
          return fetch(API + '?slug=' + slug).then(r => r.json());
        }
      })
      .then(data => {
        if (data && data.ok) renderComments(data.comments);
      });
    };

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  })();
  </script>
</section>
{{ end }}
