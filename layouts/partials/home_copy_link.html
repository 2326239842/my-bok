{{- /* 首页一键复制链接功能 */ -}}
{{- if .IsHome }}
<div class="home-copy-container">
    <div class="copy-notice">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M13 7h-2v4H7v2h4v4h2v-4h4v-2h-4V7zm-1-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
        </svg>
        <span>想分享博客？点击复制链接</span>
    </div>
    <button class="home-copy-btn" onclick="copyHomeLink()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
        <span class="btn-text">复制博客链接</span>
    </button>
</div>

<style>
.home-copy-container {
    text-align: center;
    margin: 2rem 0;
    padding: 1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    color: white;
}

.copy-notice {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1rem;
    font-size: 16px;
    font-weight: 500;
}

.copy-notice svg {
    color: #fbbf24;
}

.home-copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.home-copy-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    border-color: rgba(255, 255, 255, 0.5);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
}

.home-copy-btn:active {
    transform: translateY(0);
}

.home-copy-btn.copied {
    background: #10b981;
    border-color: #059669;
}

.home-copy-btn svg {
    color: inherit;
}

.btn-text {
    transition: opacity 0.2s ease;
}

@media (max-width: 768px) {
    .home-copy-container {
        margin: 1rem;
        padding: 1.5rem 1rem;
    }
    
    .copy-notice {
        font-size: 14px;
    }
    
    .home-copy-btn {
        width: 100%;
        justify-content: center;
        padding: 12px 20px;
    }
}
</style>

<script>
function copyHomeLink() {
    const button = event.currentTarget;
    const btnText = button.querySelector('.btn-text');
    const homeUrl = "{{ .Site.BaseURL | safeURL }}";
    
    // 尝试复制链接
    navigator.clipboard.writeText(homeUrl).then(function() {
        // 复制成功
        const originalText = btnText.textContent;
        btnText.textContent = '已复制!';
        button.classList.add('copied');
        
        // 2秒后恢复原状
        setTimeout(function() {
            btnText.textContent = originalText;
            button.classList.remove('copied');
        }, 2000);
    }).catch(function(err) {
        // 如果剪贴板API不可用，使用传统方法
        const textArea = document.createElement('textarea');
        textArea.value = homeUrl;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        
        const originalText = btnText.textContent;
        btnText.textContent = '已复制!';
        button.classList.add('copied');
        
        setTimeout(function() {
            btnText.textContent = originalText;
            button.classList.remove('copied');
        }, 2000);
    });
}
</script>
{{- end }}
